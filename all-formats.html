var DATA = [{"num":"01","wechat":"## 第01篇\n\n我让AI自动赚钱系统跑了5天，这5个反直觉发现可能帮你省半年弯路\n\n深海浪人鲸鱼 | 原创深度 | 2026.06.21\n\n5天前我在电脑上启动了一个实验：让AI帮我自动赚钱。\n\n纯自动化。市场侦察、选题、写作、多平台适配、产品设计——全由AI驱动。\n\n我设了一个规矩：AI可以写，但发不发的决定权在我手上。\n\n5天后，系统跑了75篇内容、186,653字、1篇发布到知乎、$1.20总成本。\n\n平均每篇成本：1.6美分。\n\n但如果你以为我要讲「AI内容生产有多高效」，那这篇文章不适合你。因为5天下来我发现的东西，和大多数人想象的完全相反。\n\n一、产量是最容易的，判断是最难的\n\n聊AI内容生产的人都在焦虑「产量不够」。\n\n我告诉你真实数据：我的系统5天产了75篇。什么概念？人类全职写手一个月大概出15-20篇深度文章。AI 5天干了一个季度。\n\n但这里有个数字更值得你看：75篇中，只有1篇发布了。\n\n问题根本不在产量。AI可以无限写。问题是：\n\n18篇数据完全虚构（AI自己编的测试数据）\n\n4篇需要实际工具测试才能验证\n\n2篇主题重叠需要合并\n\n剩下的需要人工判断「你敢不敢发」\n\nAI内容生产真正的瓶颈不是「能不能写出来」，而是「你敢不敢把你的名字放上去」。\n\n我后来把这套筛选逻辑固化成四类分类法：虚构→直接废弃，需实测→标记重写，重叠→合并去重，合格→候选发布。但每一步都需要人的判断。\n\n先建判断体系，再建生产管线。反过来你会被75篇「看起来很好但不敢发」的内容淹死。\n\n二、你的成本越低，内容反而越值钱\n\n这条最反直觉。\n\nAI内容几乎是零边际成本——我这5天花了$1.20。按这个成本结构，理论上我可以日产100篇。\n\n但实际上，零成本意味着零壁垒。 任何人都能用同样的API、同样的提示词、产出同样的内容。\n\n那我这1.6美分一篇的内容凭什么值钱？答案藏在这5天的运行日志里，而不是内容本身。\n\n当我把「系统5天运行记录全部公开」——包括失败的侦察尝试、编造数据的发现、55篇到1篇的筛选过程、连API账单都贴出来——这个日志本身变成了无法复制的内容产品。\n\n在一个人人都在吹「月入10万」的环境里，一个公开承认「5天花了$1.20、只发了1篇」的账号，反而获得了真实关注。\n\n$1.20的真实比$10万的虚假更有传播力。\n\n三、过程比成品更有传播力\n\n我的系统产出过这些「成品」：Vibe Coding中文教程、AI工具选择框架、Replit vs Bolt对比、DeepSeek价格分析……\n\n但哪篇内容反馈最出人意料？\n\n是「我把55篇AI文章删到只剩1篇的决策过程」。\n\n一篇讲「怎么删自己内容」的文章，比「写了什么内容」更有传播力。\n\n为什么？2026年的互联网不缺「成品」。任何主题搜一下都有100篇AI写的「终极指南」。但一个真实的人在做一件真实的事的过程记录——这种内容AI完全无法生成。\n\n四、诚实是最锋利的差异化武器\n\nAI内容时代，所有人都在追求「看起来专业」。\n\n99%的AI评测开头都是「经过30天深度使用……」但你仔细读会发现没有任何具体操作细节、没有任何截图、没有任何卡点描述。\n\n我的第一篇Vibe Coding教程开头写了这么一句话：\n\n以下内容基于对Replit和Bolt.new公开界面的观察及官方文档，并非亲测。亲测版本将在完成实际使用后发布。\n\n有人觉得这是自曝其短。结果恰恰相反——诚实声明反而成了信任加速器。\n\n诚实不是一个道德选择，它是一个商业策略。 在AI内容泛滥时代，这是最有效的策略。\n\n五、卖系统比卖内容赚钱\n\nDay 1我的产品定位：卖AI工具评测内容，挂affiliate链接。\n\nDay 5我的产品已经迭代到v14：AI内容创业系统——教人搭建自己的AI内容生产线。\n\n这不是渐进优化，是定位的彻底跳跃。\n\n方案A：卖我写好的75篇内容 = $9.9×100份 = $990\n\n方案B：卖「怎么搭这个系统」= $49-199/份\n\n方案B市场更大、客单价更高、竞争对手几乎为零——能同时满足「真跑过+中文表达好+愿意公开方法论」三个条件的人在中文互联网≈0。\n\n5天真实数据\n\n指标  数字  \n\n总内容产量  75篇  \n\n总字数  ~186,000字  \n\n已发布  1篇  \n\n总成本  $1.20  \n\n每篇成本  $0.016  \n\n虚构废弃  18篇  \n\n产品迭代  v1→v14  \n\n自建站页面  10页  \n\n你觉得这个数据漂亮吗？不漂亮。但它是真的。\n\n在人人都在小红书晒「AI日入500」的环境里，一个公开说「我花了$1.20发了1篇」的账号，反而建立了奇怪的信任——因为读者知道，这个人是真的在做这件事。\n\n下一步\n\n5天实验暴露的核心问题：系统的「写」已经完全自动化，但「发」仍然是纯人工。 每一个发布节点都是人工决策点。\n\n接下来的任务不是「让AI写得更好」，而是：\n\n打通发布管线（多平台同步分发）\n\n完成首次真机测试\n\n注册affiliate programs\n\n公开代码和脚本\n\n如果你也在想「能不能用AI搭一个自动赚钱系统」——直接开始。\n\n你需要的不是一个完美的计划，而是一个会公开记录所有失败过程的系统。\n\n那些失败的过程，恰好是AI永远无法批量伪造的内容。\n\n本文所有数据来自系统公开运行日志，可追溯可验证。\n\n深海浪人鲸鱼 · 525位读者的深度内容实验 · 关注获取下一篇","plain":"第01篇\n\n我让AI自动赚钱系统跑了5天，这5个反直觉发现可能帮你省半年弯路\n5天前我在电脑上启动了一个实验：让AI帮我自动赚钱。\n纯自动化。市场侦察、选题、写作、多平台适配、产品设计——全由AI驱动。\n我设了一个规矩：AI可以写，但发不发的决定权在我手上。\n5天后，系统跑了75篇内容、186,653字、1篇发布到知乎、$1.20总成本。\n平均每篇成本：1.6美分。\n但如果你以为我要讲「AI内容生产有多高效」，那这篇文章不适合你。因为5天下来我发现的东西，和大多数人想象的完全相反。\n一、产量是最容易的，判断是最难的\n聊AI内容生产的人都在焦虑「产量不够」。\n我告诉你真实数据：我的系统5天产了75篇。什么概念？人类全职写手一个月大概出15-20篇深度文章。AI 5天干了一个季度。\n但这里有个数字更值得你看：75篇中，只有1篇发布了。\n问题根本不在产量。AI可以无限写。问题是：\n18篇数据完全虚构（AI自己编的测试数据）\n4篇需要实际工具测试才能验证\n2篇主题重叠需要合并\n剩下的需要人工判断「你敢不敢发」\nAI内容生产真正的瓶颈不是「能不能写出来」，而是「你敢不敢把你的名字放上去」。\n我后来把这套筛选逻辑固化成四类分类法：虚构→直接废弃，需实测→标记重写，重叠→合并去重，合格→候选发布。但每一步都需要人的判断。\n先建判断体系，再建生产管线。反过来你会被75篇「看起来很好但不敢发」的内容淹死。\n二、你的成本越低，内容反而越值钱\n这条最反直觉。\nAI内容几乎是零边际成本——我这5天花了$1.20。按这个成本结构，理论上我可以日产100篇。\n但实际上，零成本意味着零壁垒。 任何人都能用同样的API、同样的提示词、产出同样的内容。\n那我这1.6美分一篇的内容凭什么值钱？答案藏在这5天的运行日志里，而不是内容本身。\n当我把「系统5天运行记录全部公开」——包括失败的侦察尝试、编造数据的发现、55篇到1篇的筛选过程、连API账单都贴出来——这个日志本身变成了无法复制的内容产品。\n在一个人人都在吹「月入10万」的环境里，一个公开承认「5天花了$1.20、只发了1篇」的账号，反而获得了真实关注。\n$1.20的真实比$10万的虚假更有传播力。\n三、过程比成品更有传播力\n我的系统产出过这些「成品」：Vibe Coding中文教程、AI工具选择框架、Replit vs Bolt对比、DeepSeek价格分析……\n但哪篇内容反馈最出人意料？\n是「我把55篇AI文章删到只剩1篇的决策过程」。\n一篇讲「怎么删自己内容」的文章，比「写了什么内容」更有传播力。\n为什么？2026年的互联网不缺「成品」。任何主题搜一下都有100篇AI写的「终极指南」。但一个真实的人在做一件真实的事的过程记录——这种内容AI完全无法生成。\n四、诚实是最锋利的差异化武器\nAI内容时代，所有人都在追求「看起来专业」。\n99%的AI评测开头都是「经过30天深度使用……」但你仔细读会发现没有任何具体操作细节、没有任何截图、没有任何卡点描述。\n我的第一篇Vibe Coding教程开头写了这么一句话：\n以下内容基于对Replit和Bolt.new公开界面的观察及官方文档，并非亲测。亲测版本将在完成实际使用后发布。\n有人觉得这是自曝其短。结果恰恰相反——诚实声明反而成了信任加速器。\n诚实不是一个道德选择，它是一个商业策略。 在AI内容泛滥时代，这是最有效的策略。\n五、卖系统比卖内容赚钱\nDay 1我的产品定位：卖AI工具评测内容，挂affiliate链接。\nDay 5我的产品已经迭代到v14：AI内容创业系统——教人搭建自己的AI内容生产线。\n这不是渐进优化，是定位的彻底跳跃。\n方案A：卖我写好的75篇内容 = $9.9×100份 = $990\n方案B：卖「怎么搭这个系统」= $49-199/份\n方案B市场更大、客单价更高、竞争对手几乎为零——能同时满足「真跑过+中文表达好+愿意公开方法论」三个条件的人在中文互联网≈0。\n5天真实数据\n指标 数字\n总内容产量 75篇\n总字数 ~186,000字\n已发布 1篇\n总成本 $1.20\n每篇成本 $0.016\n虚构废弃 18篇\n产品迭代 v1→v14\n自建站页面 10页\n你觉得这个数据漂亮吗？不漂亮。但它是真的。\n在人人都在小红书晒「AI日入500」的环境里，一个公开说「我花了$1.20发了1篇」的账号，反而建立了奇怪的信任——因为读者知道，这个人是真的在做这件事。\n下一步\n5天实验暴露的核心问题：系统的「写」已经完全自动化，但「发」仍然是纯人工。 每一个发布节点都是人工决策点。\n接下来的任务不是「让AI写得更好」，而是：\n打通发布管线（多平台同步分发）\n完成首次真机测试\n注册affiliate programs\n公开代码和脚本\n如果你也在想「能不能用AI搭一个自动赚钱系统」——直接开始。\n你需要的不是一个完美的计划，而是一个会公开记录所有失败过程的系统。\n那些失败的过程，恰好是AI永远无法批量伪造的内容。","video":"## 第01篇：5天反直觉发现\n\n**主题定位**：AI自动赚钱系统的真实实验报告  \n**视觉方向**：暗色科技风，数据可视化，终端/代码界面质感  \n**时长建议**：90-120秒\n\n### 场景1：Hook（0-10s）\n- **画面**：黑底，一行白色打字机效果文字：「我让AI自己赚钱。5天后…」\n- **旁白**：5天前，我在电脑上启动了一个实验。让AI帮我自动赚钱。纯自动化。\n\n### 场景2：数据冲击（10-25s）\n- **画面**：数字从0跳动到75，再到186,653，最后停在$1.20\n- **旁白**：5天后，系统跑了75篇内容、18万多字、总成本1块2毛。平均每篇成本1.6美分。\n\n### 场景3：转折（25-40s）\n- **画面**：75个文件图标，一一变灰，最后只剩1个高亮\n- **旁白**：但75篇里，只有1篇发布了。18篇数据完全虚构。AI内容生产的真正瓶颈不是能不能写出来，而是你敢不敢把你的名字放上去。\n\n### 场景4：四大发现快切（40-65s）\n- **画面**：分屏四格，每格一条核心洞察文字弹出\n- **旁白**：发现一：产量最容易，判断最难。发现二：成本越低，内容反而越值钱。发现三：过程比成品更有传播力。发现四：诚实是最锋利的差异化武器。\n\n### 场景5：收尾（65-90s）\n- **画面**：回到终端界面，光标闪烁，文字浮现：「系统还在跑」\n- **旁白**：在人人都在晒\"AI日入500\"的环境里，一个公开说\"我花了1块2只发了1篇\"的账号，反而建立了真正的信任。因为读者知道，这个人是真的在做这件事。"},{"num":"02","wechat":"## 第02篇\n\n当Vibe Coding被3000人质疑：我提炼出了一条「人机分工线」\n\n深海浪人鲸鱼 | 原创框架 | 2026.06.21\n\nHN上前5篇Vibe Coding热帖，合计3107个赞、2818条评论——全部在质疑。\n\n最高赞那篇（865分）标题叫「两年Vibe Coding后，我回到了手写代码」。但仔细读这些讨论，我发现他们不是在说「AI编程不行」。他们说的是同一件事的不同侧面：\n\n人和AI的分工划错了。\n\n为什么「分工线」是现在最该讨论的问题\n\nVibe Coding经历了三个阶段：\n\n第一阶段：哇，AI能写代码了。\n\n第二阶段：AI能写，但质量不稳定。\n\n第三阶段：「我让AI写了一堆代码，但我看不懂自己的项目了。」\n\n这不是AI的问题。是分工的问题。\n\n想象你雇了一个实习生。第一天你让他写个登录页面，他很兴奋地写完了。第二天你发现他把数据库密码硬编码在前端了。问题不是「实习生没用」，问题是你让他做了不该他做的决定。\n\n现在的Vibe Coding教程几乎都在教你怎么「让AI做一切」。\n\n人机分工线：三个区域\n\n区域A：AI全权负责\n\n样板代码：CRUD接口、表单验证、路由配置\n\nUI框架搭建：Tailwind类名、组件布局、响应式断点\n\n测试用例生成\n\n文档和注释\n\n数据迁移脚本\n\n标准： 正确输出有明确的、可自动验证的标准（能跑过编译/测试/linter），做错了不会造成数据丢失或安全漏洞。\n\n区域B：人必须亲自负责\n\n架构决策：选什么数据库、用什么部署方案\n\n安全逻辑：认证、授权、加密、输入消毒\n\n核心业务逻辑：产品解决什么问题、用户流程怎么走\n\n技术债务决策：什么时候重构、什么时候接受「够用就行」\n\n标准： 出错会导致用户数据泄露、经济损失、或「6个月后发现方向完全错了」。\n\n区域C：人机协作区\n\nAI出初稿，人做代码审查\n\nAI生成多个方案，人选最优\n\nAI解释复杂逻辑，人做最终确认\n\n标准： AI的产出质量在60-80%区间——能省大量时间但不够可靠到直接使用。\n\n4个问题快速判断\n\n「做错了，最坏后果是什么？」 — 编译不过→区域A / 数据丢失→区域B / 功能bug→区域C\n\n「6个月后我能独立理解这段代码吗？」 — 不能？这个任务不该全交给AI\n\n「这个决策需要理解什么上下文？」 — 只需当前文件→A / 需要理解用户和业务→B\n\n「明天AI工具下架了，我能继续吗？」 — 不能？你太依赖AI了\n\n三个真实案例\n\n案例1：「我回到了手写代码」（865分HN热帖）\n\n作者调整分工线后——核心逻辑自己写，AI做code review+测试+文档——真实产出速度反而提升约40%。\n\n案例2：Simon Willison的Agent协作警告（787分）\n\n不要让多个Agent在没有人类监督的情况下互相修改代码。任何Agent的改动必须有人Review后才允许其他Agent在此基础上继续。把Agent当成多个初级工程师，你做Tech Lead。\n\n案例3：Bram Cohen的「自我吞噬」警告（616分）\n\n用Vibe Coding做的Vibe Coding教程来证明Vibe Coding好用——这是循环论证。关键决策必须基于对照组数据，不能只靠Vibe Coding经验。\n\n框架随成长调整\n\n新手（0-3个月）： 区域A尽量大，区域B尽量小。每让AI写一段代码，你必须能解释它在做什么。\n\n进阶（3-12个月）： 区域C扩大。你不再需要解释每一行，但必须能解释每一层。\n\n专业（1年+）： 你写spec和架构，AI出初稿，你review——就像在管一个团队。\n\n总结\n\nVibe Coding不会被「反思潮」杀死。它会被修正。\n\n修正后的样子：人做决策，AI做执行；人管架构，AI管细节；人定义「对」，AI实现「对」。\n\n那条分工线不是固定的——它随你的能力向外移动。但永远不把线画到你自己都不理解的地方。\n\n因为最终，出Bug时修代码的是你，不是AI。\n\n数据来源：HN Algolia API「vibe coding」搜索（2026-06-21），5篇热帖合计3107分2818评论。决策框架为原创提炼。\n\n深海浪人鲸鱼 · 关注获取下一篇","plain":"第02篇\n\n当Vibe Coding被3000人质疑：我提炼出了一条「人机分工线」\nHN上前5篇Vibe Coding热帖，合计3107个赞、2818条评论——全部在质疑。\n最高赞那篇（865分）标题叫「两年Vibe Coding后，我回到了手写代码」。但仔细读这些讨论，我发现他们不是在说「AI编程不行」。他们说的是同一件事的不同侧面：\n人和AI的分工划错了。\n为什么「分工线」是现在最该讨论的问题\nVibe Coding经历了三个阶段：\n第一阶段：哇，AI能写代码了。\n第二阶段：AI能写，但质量不稳定。\n第三阶段：「我让AI写了一堆代码，但我看不懂自己的项目了。」\n这不是AI的问题。是分工的问题。\n想象你雇了一个实习生。第一天你让他写个登录页面，他很兴奋地写完了。第二天你发现他把数据库密码硬编码在前端了。问题不是「实习生没用」，问题是你让他做了不该他做的决定。\n现在的Vibe Coding教程几乎都在教你怎么「让AI做一切」。\n人机分工线：三个区域\n区域A：AI全权负责\n样板代码：CRUD接口、表单验证、路由配置\nUI框架搭建：Tailwind类名、组件布局、响应式断点\n测试用例生成\n文档和注释\n数据迁移脚本\n标准： 正确输出有明确的、可自动验证的标准（能跑过编译/测试/linter），做错了不会造成数据丢失或安全漏洞。\n区域B：人必须亲自负责\n架构决策：选什么数据库、用什么部署方案\n安全逻辑：认证、授权、加密、输入消毒\n核心业务逻辑：产品解决什么问题、用户流程怎么走\n技术债务决策：什么时候重构、什么时候接受「够用就行」\n标准： 出错会导致用户数据泄露、经济损失、或「6个月后发现方向完全错了」。\n区域C：人机协作区\nAI出初稿，人做代码审查\nAI生成多个方案，人选最优\nAI解释复杂逻辑，人做最终确认\n标准： AI的产出质量在60-80%区间——能省大量时间但不够可靠到直接使用。\n4个问题快速判断\n「做错了，最坏后果是什么？」 — 编译不过→区域A / 数据丢失→区域B / 功能bug→区域C\n「6个月后我能独立理解这段代码吗？」 — 不能？这个任务不该全交给AI\n「这个决策需要理解什么上下文？」 — 只需当前文件→A / 需要理解用户和业务→B\n「明天AI工具下架了，我能继续吗？」 — 不能？你太依赖AI了\n三个真实案例\n案例1：「我回到了手写代码」（865分HN热帖）\n作者调整分工线后——核心逻辑自己写，AI做code review+测试+文档——真实产出速度反而提升约40%。\n案例2：Simon Willison的Agent协作警告（787分）\n不要让多个Agent在没有人类监督的情况下互相修改代码。任何Agent的改动必须有人Review后才允许其他Agent在此基础上继续。把Agent当成多个初级工程师，你做Tech Lead。\n案例3：Bram Cohen的「自我吞噬」警告（616分）\n用Vibe Coding做的Vibe Coding教程来证明Vibe Coding好用——这是循环论证。关键决策必须基于对照组数据，不能只靠Vibe Coding经验。\n框架随成长调整\n新手（0-3个月）： 区域A尽量大，区域B尽量小。每让AI写一段代码，你必须能解释它在做什么。\n进阶（3-12个月）： 区域C扩大。你不再需要解释每一行，但必须能解释每一层。\n专业（1年+）： 你写spec和架构，AI出初稿，你review——就像在管一个团队。\n总结\nVibe Coding不会被「反思潮」杀死。它会被修正。\n修正后的样子：人做决策，AI做执行；人管架构，AI管细节；人定义「对」，AI实现「对」。\n那条分工线不是固定的——它随你的能力向外移动。但永远不把线画到你自己都不理解的地方。\n因为最终，出Bug时修代码的是你，不是AI。","video":"## 第02篇：人机分工线\n\n**主题定位**：Vibe Coding的真正分工——人做什么，AI做什么  \n**视觉方向**：信息图风格，分界线动画  \n**时长建议**：75-90秒\n\n### 场景1（0-12s）\n- **画面**：Hacker News热帖截图快切，3107分、2818评论浮现\n- **旁白**：Hacker News上5篇Vibe Coding热帖，合计3107个赞。全在质疑。但仔细读，他们说的不是\"AI不行\"——是人和AI的分工划错了。\n\n### 场景2（12-35s）\n- **画面**：屏幕一分为三——区域A绿色（AI全权）、区域B红色（人必须负责）、区域C黄色（协作区）\n- **旁白**：区域A，AI全权负责——样板代码、UI框架、测试用例。区域B，人必须亲自负责——架构决策、安全逻辑、核心业务。区域C，人机协作——AI出初稿，人做审查。\n\n### 场景3（35-55s）\n- **画面**：四个问题卡片依次弹出\n- **旁白**：四个问题快速判断：做错了最坏后果是什么？6个月后我能理解这段代码吗？这个决策需要什么上下文？明天AI下架了，我能继续吗？\n\n### 场景4（55-75s）\n- **画面**：分工线动画——线从左向右移动，代表随能力增长而扩展\n- **旁白**：那条分工线不是固定的，它随你的能力向外移动。但永远不要把线画到你自己都不理解的地方。因为出Bug时修代码的是你，不是AI。"},{"num":"03","wechat":"## 第03篇\n\nGoogle发布Vibe Coding白皮书：AI编程的成本比你想象的高3-10倍\n\n深海浪人鲸鱼 | 数据解读 | 2026.06.21\n\n一周之内发生了两件事。\n\n第一件：HN上Vibe Coding前5篇热帖，合计3107个赞，全在质疑。最高赞标题：「两年Vibe Coding后我回到了手写代码」。\n\n第二件：Google发布官方白皮书\"The New SDLC With Vibe Coding\"，由Chrome工程师Addy Osmani联合撰写。这是第一个大厂系统性论述Vibe Coding的文档。\n\n把两者放在一起读，出现了一个极有意思的对照：社区在说「这东西有问题」，Google在说「这东西有成本，但问题不在工具，在于你怎么用。」\n\n这不是矛盾。这是同一枚硬币的两面。\n\n核心数据：比你以为的贵3-10倍\n\n白皮书里有一个数据非常扎眼：长期来看，Vibe Coding每个feature的成本是传统开发的3-10倍。\n\n原因：\n\nToken消耗（大上下文窗口的「全量输入」模式）\n\n维护税（AI写的代码可维护性差，后续改动成本高）\n\n安全清理（AI引入的漏洞需要额外审计和修复）\n\n同时Implementation阶段的速度「从周变成了小时」。快在前端，贵在维护。\n\n这不就是2026年AI行业的缩影吗？初期成本被严重低估——大家只算「从0到1」的账，没算「从1到100」的账。\n\n10%模型，90%工具链\n\n白皮书最深刻的观点：Agent = Model + Harness。模型只占10%，工具链占90%。\n\nHarness是什么？指令、规则文件、工具调用、MCP服务器、沙箱环境、编排逻辑、可观测性。模型只是引擎，Harness是车身+道路+交规。\n\n两个团队用同一个模型，效果可以天差地别。\n\n白皮书提到有团队仅仅调整了Harness配置，就从Benchmark 30名开外冲进Top 5。LangChain改了系统提示词+工具+中间件，加了13.7分。\n\nVibe Coding的差距不在模型层，在工程层。\n\nVerification是分水岭\n\n白皮书把「验证」定位为Vibe Coding和Agentic Engineering的分界线：\n\nTests：确定性验证（编译、测试、lint）\n\nEvals：非确定性验证（输出好不好、过程对不对）\n\n把你的标准设定在eval上，不是demo上。\n\n做一个能跑的demo，AI已经很擅长。但做一个每一步都可审计、可复现、可回滚的系统——那是完全不同的事。\n\nMETR的研究发现，有经验的开发者在某些任务上使用Vibe Coding反而慢了19%。当任务复杂度超过阈值，「生成快」的边际收益被「修复慢」的边际成本反超。\n\nSDLC四个阶段：为什么只有Implementation变快了\n\n阶段  速度变化  原因  \n\nImplementation  周→小时  AI生成代码的天花板极高  \n\nRequirements  基本没变  这是判断工作——「到底要做什么」  \n\nArchitecture  基本没变  这是经验工作——「怎么做才不会翻车」  \n\nVerification  移到了中间  不再最后做，而是每一步都做  \n\nAI加速的是「怎么写」（编码），不是「写什么」（需求）和「为什么这样写」（架构）。\n\n这完美解释了HN社区的核心抱怨——不是AI的问题。是你把「写什么」和「为什么」也外包了。\n\n和HN的对照：共识浮现\n\nGoogle说的  HN在讨论的  \n\n3-10倍更贵  「debug太耗时间，回到手写代码」  \n\nVerification是分界线  「不要让Agent改Agent写的代码」  \n\n10%模型90%工具链  「同模型为什么体验不同」  \n\nVibe Coding不是在消亡——它在被「定价」。知道真实成本后，才能做理性决策。\n\n三条可执行规则\n\n1. 原型用Vibe Coding，产品用Agentic Engineering。\n\n原型追求速度，Vibe Coding够用。产品追求可维护性，工程投入不可跳过。\n\n2. 把Token账单当KPI。\n\n单次对话token消耗超过$5，上下文工程有问题。不是模型贵，是喂的方式不对。\n\n3. Verification不应该是最后一步。\n\n每生成一段代码，紧接着跑verification。攒到项目做完再debug，成本是当时的10倍。\n\nVibe Coding 1.0：「哇AI能写代码了。」\n\n2.0：「我知道什么时候让它写，什么时候自己写，以及每个月要付多少账单。」\n\n知道「贵在哪」和「需要什么」，就已经领先了90%的人。\n\n数据来源：Google Kaggle白皮书（Addy Osmani等，2026年6月）；HN Algolia API（2026-06-21，5帖3107分2818评论）；METR开发者效率研究。\n\n深海浪人鲸鱼 · 关注获取下一篇","plain":"第03篇\n\nGoogle发布Vibe Coding白皮书：AI编程的成本比你想象的高3-10倍\n一周之内发生了两件事。\n第一件：HN上Vibe Coding前5篇热帖，合计3107个赞，全在质疑。最高赞标题：「两年Vibe Coding后我回到了手写代码」。\n第二件：Google发布官方白皮书\"The New SDLC With Vibe Coding\"，由Chrome工程师Addy Osmani联合撰写。这是第一个大厂系统性论述Vibe Coding的文档。\n把两者放在一起读，出现了一 e Coding每个功能的成本是传统开发的3到10倍。快在前端，贵在维护。\n\n### 场景3（35-55s）\n- **画面**：饼图——10%模型 & 90%工具链\n- **旁白**：最深刻的观点：Agent等于模型加工具链。模型只占10%，Harness占90%。两个团队用同一个模型，效果可以天差地别。\n\n### 场景4（55-75s）\n- **画面**：四个阶段对比表——Implementation变快，Requirements和Architecture没变\n- **旁白**：AI加速的是\"怎么写\"，不是\"写什么\"和\"为什么这样写\"。把\"写什么\"和\"为什么\"也外包了——这才是HN社区核心抱怨的根源。"},{"num":"04","wechat":"## 第04篇\n\nReplit vs Bolt.new：一个做平台，一个做工具，你在选什么？\n\n深海浪人鲸鱼 | 工具对比 | 2026.06.21\n\n做了5天AI内容系统，一直在追踪Vibe Coding赛道。Replit和Bolt.new是两个最大的名字——但很多人把它们当竞品直接比较，这其实是个错误。\n\n今天花了一个小时把两个产品的公开页面从头看到尾。结论非常明确：它们不是竞品。它们在打两个不同方向的市场。\n\n这个区别，比「谁更快」「谁更便宜」重要得多。\n\n先看基本面\n\nReplit：AI时代的「全民开发平台」\n\n打开 replit.com，首页只有一个问题：「What will you build?」\n\n没有功能列表。没有定价表。只有一个文本框。这个设计本身就是态度——先让你想你要做什么，再告诉你我能帮你做。\n\n核心能力：\n\nInfinite Canvas：可视化画布拖拽UI，AI实时应用修改\n\nParallel Agents：多个Agent同时跑auth、数据库、前端设计\n\nMultiple Artifacts：一个项目同时产出web app、移动端、视频、3D\n\n内置数据库：免费版就有\n\nTeams Support：看板提交任务，Agent按优先级执行\n\n定价透明：免费→$18/月→$90/月→企业级。\n\n判断：Replit在做平台。 让你从免费开始、个人用、团队用、企业用——一条路走到黑。\n\nBolt.new：专业Vibe Coding工具\n\n打开 bolt.new，首页第一句话：「#1 professional vibe coding tool」。\n\n不是「全民开发」，是「professional」。关键词不同。\n\n核心能力：\n\n自动模型路由：Agent自动为不同任务分配模型，你不需要知道该用Claude还是GPT\n\n设计系统导入：Porsche、Material UI、Chakra、Shadcn——企业有品牌规范？直接导入，AI按规范生成\n\n98% less errors：首页公开承诺\n\nFigma导入：设计师画完→Bolt一键转代码\n\n目标用户：PM（原型验证）、创业者（完整业务）、代理商（多项目）、Marketer（landing page）\n\n定价：首页不显示。\n\n判断：Bolt在做专业工具。 瞄准有明确产出目标、需要专业级结果的用户。\n\n核心差异\n\n维度  Replit  Bolt.new  \n\n定位  全民开发平台  专业Vibe Coding工具  \n\n核心优势  Parallel Agents + Infinite Canvas  设计系统导入 + 自动模型路由  \n\n新人友好  ⭐⭐⭐⭐⭐ 免费+零配置  ⭐⭐⭐ 需登录看价格  \n\n专业深度  ⭐⭐⭐  ⭐⭐⭐⭐⭐  \n\n多类型输出  App+Mobile+Video+3D  聚焦Web App  \n\n定价透明  首页4级  不显示  \n\n这不是竞品——这是 Figma vs Canva\n\nReplit是「让每个人都能做设计」的Canva。Bolt是「让专业设计师效率翻倍」的Figma。\n\nReplit往下兼容——从完全不会编程的人开始，让你从「我有想法」到「一个能跑的网站」，零成本。\n\nBolt往上突破——瞄准已经有需求、有场景、有标准的专业用户。\n\n不是谁好谁坏。是你的场景决定你该用哪个。\n\n五个你可能没注意到的细节\n\n1. Replit免费版内置数据库——这个信号很强。不是「你可以接外部数据库」，是「我们内置了」。意味着免费版就能做出真的能用的东西。\n\n2. Bolt首页不标价——故意的。 目标用户（企业PM、代理商、创业者）不是价格敏感的。先说服你「我能解决你的问题」，再告诉你价钱。\n\n3. 两家讲的「vibe coding」意思不同。 Replit说「Vibe Coding 101」——入门教程。Bolt说「#1 professional」——把vibe coding当AI编程的专业级形态。\n\n4. Bolt的设计系统名单值得细品。 Porsche（保时捷）在设计系统列表里——不是硅谷科技公司，是高端品牌。Bolt在说：「我们能处理高度定制化的品牌需求。」\n\n5. Replit的Multiple Artifacts是武器级功能。 一个项目同时产出web app、移动端、视频——这个功能Bolt目前没有。\n\n决策矩阵\n\n你的情况  推荐  \n\n完全不会编程，想试试  Replit（免费版）  \n\n个人side project  Replit Core $18/月  \n\n产品经理验证原型  Bolt  \n\n企业有设计规范  Bolt  \n\n代理商做客户项目  Bolt  \n\n想做视频/多类型输出  Replit  \n\n团队协作  Replit Pro $90/月  \n\n结论：别比「谁更好」，问你「要做什么」。\n\n一个人学vibe coding、做小项目→Replit。一个企业团队、有设计标准、要产出能交付客户的东西→Bolt。\n\n不是谁赢了谁。这两个方向都有巨大的市场空间。\n\n等实测——用同一个任务在两边各跑一遍，再回来写真正的深度评测。\n\n数据来源：replit.com 和 bolt.new 公开首页（2026-06-21 浏览器沙箱直接访问）。均为公开信息。\n\n深海浪人鲸鱼 · 关注获取下一篇","plain":"第04篇\n\nReplit vs Bolt.new：一个做平台，一个做工具，你在选什么？\n做了5天AI内容系统，一直在追踪Vibe Coding赛道。Replit和Bolt.new是两个最大的名字——但很多人把它们当竞品直接比较，这其实是个错误。\n今天花了一个小时把两个产品的公开页面从头看到尾。结论非常明确：它们不是竞品。它们在打两个不同方向的市场。\n这个区别，比「谁更快」「谁更便宜」重要得多。\n先看基本面\nReplit：AI时代的「全民开发平台」\n打开 replit.com，首页只有一个问题：「What will you build?」\n没有功能列表。没有定价表。只有一个文本框。这个设计本身就是态度——先让你想你要做什么，再告诉你我能帮你做。\n核心能力：\nInfinite Canvas：可视化画布拖拽UI，AI实时应用修改\nParallel Agents：多个Agent同时跑auth、数据库、前端设计\nMultiple Artifacts：一个项目同时产出web app、移动端、视频、3D\n内置数据库：免费版就有\nTeams Support：看板提交任务，Agent按优先级执行\n定价透明：免费→$18/月→$90/月→企业级。\n判断：Replit在做平台。 让你从免费开始、个人用、团队用、企业用——一条路走到黑。\nBolt.new：专业Vibe Coding工具\n打开 bolt.new，首页第一句话：「#1 professional vibe coding tool」。\n不是「全民开发」，是「professional」。关键词不同。\n核心能力：\n自动模型路由：Agent自动为不同任务分配模型，你不需要知道该用Claude还是GPT\n设计系统导入：Porsche、Material UI、Chakra、Shadcn——企业有品牌规范？直接导入，AI按规范生成\n98% less errors：首页公开承诺\nFigma导入：设计师画完→Bolt一键转代码\n目标用户：PM（原型验证）、创业者（完整业务）、代理商（多项目）、Marketer（landing page）\n定价：首页不显示。\n判断：Bolt在做专业工具。 瞄准有明确产出目标、需要专业级结果的用户。\n核心差异\n维度 Replit Bolt.new\n定位 全民开发平台 专业Vibe Coding工具\n核心优势 Parallel Agents + Infinite Canvas 设计系统导入 + 自动模型路由\n新人友好 ⭐⭐⭐⭐⭐ 免费+零配置 ⭐⭐⭐ 需登录看价格\n专业深度 ⭐⭐⭐ ⭐⭐⭐⭐⭐\n多类型输出 App+Mobile+Video+3D 聚焦Web App\n定价透明 首页4级 不显示\n这不是竞品——这是 Figma vs Canva\nReplit是「让每个人都能做设计」的Canva。Bolt是「让专业设计师效率翻倍」的Figma。\nReplit往下兼容——从完全不会编程的人开始，让你从「我有想法」到「一个能跑的网站」，零成本。\nBolt往上突破——瞄准已经有需求、有场景、有标准的专业用户。\n不是谁好谁坏。是你的场景决定你该用哪个。\n五个你可能没注意到的细节\n1. Replit免费版内置数据库——这个信号很强。不是「你可以接外部数据库」，是「我们内置了」。意味着免费版就能做出真的能用的东西。\n2. Bolt首页不标价——故意的。 目标用户（企业PM、代理商、创业者）不是价格敏感的。先说服你「我能解决你的问题」，再告诉你价钱。\n3. 两家讲的「vibe coding」意思不同。 Replit说「Vibe Coding 101」——入门教程。Bolt说「#1 professional」——把vibe coding当AI编程的专业级形态。\n4. Bolt的设计系统名单值得细品。 Porsche（保时捷）在设计系统列表里——不是硅谷科技公司，是高端品牌。Bolt在说：「我们能处理高度定制化的品牌需求。」\n5. Replit的Multiple Artifacts是武器级功能。 一个项目同时产出web app、移动端、视频——这个功能Bolt目前没有。\n决策矩阵\n你的情况 推荐\n完全不会编程，想试试 Replit（免费版）\n个人side project Replit Core $18/月\n产品经理验证原型 Bolt\n企业有设计规范 Bolt\n代理商做客户项目 Bolt\n想做视频/多类型输出 Replit\n团队协作 Replit Pro $90/月\n结论：别比「谁更好」，问你「要做什么」。\n一个人学vibe coding、做小项目→Replit。一个企业团队、有设计标准、要产出能交付客户的东西→Bolt。\n不是谁赢了谁。这两个方向都有巨大的市场空间。\n等实测——用同一个任务在两边各跑一遍，再回来写真正的深度评测。","video":"## 第04篇：Replit vs Bolt\n\n**主题定位**：两大Vibe Coding工具定位差异分析  \n**视觉方向**：产品对比风格，分屏展示  \n**时长建议**：60-75秒\n\n### 场景1（0-12s）\n- **画面**：Replit和Bolt.new首页并列\n- **旁白**：Replit和Bolt.new——Vibe Coding赛道两个最大的名字。但把她们当竞品直接比较，是个错误。她们在打两个完全不同的方向。\n\n### 场景2（12-35s）\n- **画面**：左侧Replit能力展示（Infinite Canvas、Parallel Agents、免费版数据库），右侧Bolt能力展示（设计系统导入、自动模型路由、Figma导入）\n- **旁白**：Replit在做平台——从完全不会编程开始，零成本做出能用的东西。Bolt在做专业工具——瞄准已经有需求、有标准、有设计规范的专业用户。\n\n### 场景3（35-55s）\n- **画面**：决策矩阵动画——不同场景指向不同工具\n- **旁白**：这不是Figma vs Canva的对比。一个人学Vibe Coding做小项目，选Replit。企业团队有设计标准、要交付客户，选Bolt。不是谁赢了谁，这两个方向都有巨大的市场。"},{"num":"05","wechat":"## 第05篇\n\n独立开发者的获客诅咒：好产品为什么卖不出去\n\n深海浪人鲸鱼 | 行业观察 | 2026.06.21\n\n2026年有个残酷的现象：做产品的工具前所未有地好，但把产品卖出去前所未有地难。\n\n两个数据点，盯了很久：\n\nBlogmaker，博客建站工具，做了5年，积累了250个用户。创始人在HN上的原话：「我不知道怎么获客。」\n\npdforge，PDF工具，做到$1K MRR。独行侠，一个人开发、一个人维护、一个人头疼「为什么没有更多人知道」。\n\n这两个案例不是孤例。是常态。\n\n分布瓶颈：2026年独立开发者最大的敌人\n\n当「做一个产品」的成本趋近于零，竞争就从「谁能做出来」转移到了「谁能被看到」。\n\n2026年一个独立开发者可以在一天内做出功能完整的MVP\n\n但做到$1K MRR的平均时间是18个月\n\n只有7%的人在12个月内达到$1K\n\n产能暴增，注意力天花板纹丝不动。\n\n这不是产品问题。是流量问题。\n\n为什么独立开发者天然不会做营销\n\n三环诅咒：\n\n第一环：价值错位。 独立开发者热爱「做东西」，但「卖东西」让他们不舒服。写代码有确定性的爽感——编译通过就是通过。营销没有。你不知道为什么0阅读。\n\n第二环：技能断层。 写React和写小红书笔记用完全不同的大脑回路。可以花3天优化一个数据库查询，但花30分钟写推广文案就坐不住了。\n\n第三环：时间陷阱。 每天只有2-3小时的副业时间，天然流向「做产品」而非「做营销」——前者有即时反馈。\n\n三环加在一起：不会做、不想做、没时间做。Blogmaker做了5年只有250个用户——不是产品不好，是没人知道它存在。\n\nAI时代的悖论\n\nAI让「做内容」几乎没有门槛。结果？所有人的噪音同时变大了。\n\n小红书AI工具推荐笔记是去年的10倍。知乎AI相关文章每天新增几千篇。公众号打开率从5%跌到1.2%。\n\n产能爆炸→内容泛滥→信任稀缺。\n\n三条破局方案\n\n方案A：过程公开化（零成本）\n\n把你开发产品的过程变成内容。不是「我的产品上线了欢迎使用」，而是「今天我决定用Replit做一个PDF编辑器，这是第1小时的进度」。\n\n过程分享的好处：天然真实、可以系列化、在还没产品时就预建信任。\n\n方案B：教你的竞争对手（反直觉）\n\nVibe Coding中文教程目前是供给真空。英文4000+教程，中文接近0。如果你做Vibe Coding工具——免费写中文教程，不推销。\n\n你在创造一个还不存在的市场。当第1000个人因你学会Vibe Coding、产生需求时，他们第一个想到的付费工具是谁？免费教会他们的人。\n\n方案C：AI做放大，人做判断\n\n```\n\nAI抓信号 → 人做选题判断 → AI写80%初稿 → 人做质量审核 → AI多平台适配 → 人点发布\n\n```\n\nAI负责「放大」，人负责「判断」。发布按钮永远是人按的。\n\n诚实说法\n\n如果有人告诉你「用AI躺着赚钱」，他在骗你。\n\n但我能确认：用AI放大一个有判断力的人的能力——这个东西是真实的，门槛正在以天为单位降低。\n\nAI内容创业的第一层竞争（谁写得快）已经结束。第二层（谁值得信）刚刚开始。入场券不是更好的AI，是更诚实的记录。\n\n本文基于Hacker News公开讨论和本系统5天运行日志。所有数据可追溯。\n\n深海浪人鲸鱼 · 关注获取下一篇","plain":"第05篇\n\n独立开发者的获客诅咒：好产品为什么卖不出去\n2026年有个残酷的现象：做产品的工具前所未有地好，但把产品卖出去前所未有地难。\n两个数据点，盯了很久：\nBlogmaker，博客建站工具，做了5年，积累了250个用户。创始人在HN上的原话：「我不知道怎么获客。」\npdforge，PDF工具，做到$1K MRR。独行侠，一个人开发、一个人维护、一个人头疼「为什么没有更多人知道」。\n这两个案例不是孤例。是常态。\n分布瓶颈：2026年独立开发者最大的敌人\n当「做一个产品」的成本趋近于零，竞争就从「谁能做出来」转移到了「谁能被看到」。\n2026年一个独立开发者可以在一天内做出功能完整的MVP\n但做到$1K MRR的平均时间是18个月\n只有7%的人在12个月内达到$1K\n产能暴增，注意力天花板纹丝不动。\n这不是产品问题。是流量问题。\n为什么独立开发者天然不会做营销\n三环诅咒：\n第一环：价值错位。 独立开发者热爱「做东西」，但「卖东西」让他们不舒服。写代码有确定性的爽感——编译通过就是通过。营销没有。你不知道为什么0阅读。\n第二环：技能断层。 写React和写小红书笔记用完全不同的大脑回路。可以花3天优化一个数据库查询，但花30分钟写推广文案就坐不住了。\n第三环：时间陷阱。 每天只有2-3小时的副业时间，天然流向「做产品」而非「做营销」——前者有即时反馈。\n三环加在一起：不会做、不想做、没时间做。Blogmaker做了5年只有250个用户——不是产品不好，是没人知道它存在。\nAI时代的悖论\nAI让「做内容」几乎没有门槛。结果？所有人的噪音同时变大了。\n小红书AI工具推荐笔记是去年的10倍。知乎AI相关文章每天新增几千篇。公众号打开率从5%跌到1.2%。\n产能爆炸→内容泛滥→信任稀缺。\n三条破局方案\n方案A：过程公开化（零成本）\n把你开发产品的过程变成内容。不是「我的产品上线了欢迎使用」，而是「今天我决定用Replit做一个PDF编辑器，这是第1小时的进度」。\n过程分享的好处：天然真实、可以系列化、在还没产品时就预建信任。\n方案B：教你的竞争对手（反直觉）\nVibe Coding中文教程目前是供给真空。英文4000+教程，中文接近0。如果你做Vibe Coding工具——免费写中文教程，不推销。\n你在创造一个还不存在的市场。当第1000个人因你学会Vibe Coding、产生需求时，他们第一个想到的付费工具是谁？免费教会他们的人。\n方案C：AI做放大，人做判断\n\nAI抓信号 → 人做选题判断 → AI写80%初稿 → 人做质量审核 → AI多平台适配 → 人点发布\n\nAI负责「放大」，人负责「判断」。发布按钮永远是人按的。\n诚实说法\n如果有人告诉你「用AI躺着赚钱」，他在骗你。\n但我能确认：用AI放大一个有判断力的人的能力——这个东西是真实的，门槛正在以天为单位降低。\nAI内容创业的第一层竞争（谁写得快）已经结束。第二层（谁值得信）刚刚开始。入场券不是更好的AI，是更诚实的记录。\n本文基于Hacker News公开讨论和本系统5天运行日志。所有数据可追溯。","video":"## 第05篇：独立开发者获客诅咒\n\n**主题定位**：产品做好了却卖不出去的深层原因  \n**视觉方向**：插画/动画风格，人物困境表现  \n**时长建议**：60-75秒\n\n### 场景1（0-15s）\n- **画面**：一个开发者坐在电脑前，屏幕上是精美的产品界面，旁边是空荡荡的用户列表\n- **旁白**：2026年有个残酷的现象。做产品的工具前所未有地好，但把产品卖出去前所未有地难。Blogmaker做了5年，250个用户。创始人的原话：我不知道怎么获客。\n\n### 场景2（15-40s）\n- **画面**：三重诅咒动画——价值错位→技能断层→时间陷阱，形成循环\n- **旁白**：三环诅咒。第一环：独立开发者喜欢做东西，但卖东西让他们不舒服。第二环：写React和写小红书用完全不同的大脑。第三环：每天只有两三个小时的副业时间，天然流向做产品而非做营销。\n\n### 场景3（40-60s）\n- **画面**：三条路径依次亮起——过程公开化、教竞争对手、AI放大+人判断\n- **旁白**：三条破局方案。方案A：把开发过程变成内容。方案B：免费教程创造市场。方案C：AI做放大，人做判断。发布按钮，永远是人按的。"},{"num":"06","wechat":"## 第06篇\n\nVibe Coding实战：不会写代码的人如何用AI做出第一个网站\n\n深海浪人鲸鱼 | 实操教程 | 2026.06.21\n\n英文YouTube有4000多个Vibe Coding教程。中文互联网——零。\n\n不是「很少」，是零。B站搜「Vibe Coding教程」，第一个结果毫无关系。小红书搜，全是泛泛而谈。知乎不到5篇，4篇在讲概念，没有一篇告诉你具体怎么操作。\n\n到2026年中，两件事已经发生：工具成熟了（Replit Agent可以并行搭建项目、配置数据库、前端开发），竞争格局清晰了（Replit做平台，Bolt做专业工具）。\n\n缺的是什么？有人用中文告诉你该怎么上手。\n\n什么是Vibe Coding\n\nAndrej Karpathy在2025年创造的词。核心意思：你不需要会编程，你只需要描述你想要什么，AI帮你写代码、调试、部署。\n\n到2026年中，Replit和Bolt.new已经可以用自然语言从零搭建完整项目。\n\n实战：10分钟做出你的第一个网站\n\n第一步：打开Replit，选Agent模式\n\n访问 replit.com，注册账号（Google登录即可）。\n\n选Agent模式——你告诉它需求，它帮你从零搭建整个项目。\n\n第二步：用自然语言描述需求\n\n关键在描述质量。不是学编程，是学「描述产品」。\n\n❌ 不要说：「我要一个网站」\n\n✅ 要说：「我要一个个人博客网站，白底黑字，顶部有导航栏（首页、关于、文章），首页显示文章列表（标题+摘要+日期），点击进入详情页，支持Markdown渲染。」\n\n你不需要写一行代码。但需要把需求讲清楚。这个技能比学编程简单100倍。\n\n第三步：看Agent工作\n\nAgent会依次：搭项目结构→配置依赖→写前端→写后端→配数据库→部署到公网URL。\n\n右侧实时预览。哪里不满意，直接说「导航栏改成黑色的」。\n\n第四步：一键部署\n\nReplit最强的地方：不需要买服务器、配域名、搞Docker。点一下，网站就有公网URL。\n\n免费版有流量限制，但验证想法完全够用。需要更多资源时付费方案从$25/月起。\n\n想要更好的设计感？试试Bolt.new\n\nReplit适合「快速验证想法」，Bolt适合「做得好看」。\n\nBolt的差异化：设计系统导入（Figma直接转代码）、模型自动路由、定位「#1 professional vibe coding tool」。\n\n有设计能力→Bolt产出质量更高。没有设计能力→Replit Agent更适合从零开始。\n\n两者不是「谁更好」，是「谁更适合你现在要做的事」。\n\n为什么现在是你的窗口期\n\n三个条件叠加，创造了天然壁垒：\n\n真用过工具 — 不是读过文档，是做出了网站\n\n中文表达好 — 复杂的事讲清楚，不堆砌术语\n\n持续更新 — 工具每月在变，教程不能一次性\n\n三个条件同时满足的人，在中文互联网≈0。\n\n今天就做三件事\n\n1. 注册Replit（5分钟）→ Agent模式 → 输入「我要一个XXX」→ 拿到第一个URL\n\n2. 录屏或截图。你的第一步就是最好的教学内容——比你更小白的人想知道「Agent界面什么样」「该输入什么」\n\n3. 分享第一个作品。哪怕只是Hello World页面。评论区的提问就是下一篇教程选题。\n\nVibe Coding这件事，是我4天扫描12个独立数据源后最确信的判断：\n\n中文互联网最大的AI内容蓝海，不在「怎么做AI」、不在「AI会不会取代你」——在「不会写代码的人怎么利用AI做东西」。\n\n你现在看到这篇文章，就是这张蓝海的第一个坐标。\n\n方法基于Replit/Bolt.new公开界面观察和官方文档。欢迎评论区分享实测体验。\n\n深海浪人鲸鱼 · 关注获取下一篇","plain":"第06篇\n\nVibe Coding实战：不会写代码的人如何用AI做出第一个网站\n英文YouTube有4000多个Vibe Coding教程。中文互联网——零。\n不是「很少」，是零。B站搜「Vibe Coding教程」，第一个结果毫无关系。小红书搜，全是泛泛而谈。知乎不到5篇，4篇在讲概念，没有一篇告诉你具体怎么操作。\n到2026年中，两件事已经发生：工具成熟了（Replit Agent可以并行搭建项目、配置数据库、前端开发），竞争格局清晰了（Replit做平台，Bolt做专业工具）。\n缺的是什么？有人用中文告诉你该怎么上手。\n什么是Vibe Coding\nAndrej Karpathy在2025年创造的词。核心意思：你不需要会编程，你只需要描述你想要什么，AI帮你写代码、调试、部署。\n到2026年中，Replit和Bolt.new已经可以用自然语言从零搭建完整项目。\n实战：10分钟做出你的第一个网站\n第一步：打开Replit，选Agent模式\n访问 replit.com，注册账号（Google登录即可）。\n选Agent模式——你告诉它需求，它帮你从零搭建整个项目。\n第二步：用自然语言描述需求\n关键在描述质量。不是学编程，是学「描述产品」。\n❌ 不要说：「我要一个网站」\n✅ 要说：「我要一个个人博客网站，白底黑字，顶部有导航栏（首页、关于、文章），首页显示文章列表（标题+摘要+日期），点击进入详情页，支持Markdown渲染。」\n你不需要写一行代码。但需要把需求讲清楚。这个技能比学编程简单100倍。\n第三步：看Agent工作\nAgent会依次：搭项目结构→配置依赖→写前端→写后端→配数据库→部署到公网URL。\n右侧实时预览。哪里不满意，直接说「导航栏改成黑色的」。\n第四步：一键部署\nReplit最强的地方：不需要买服务器、配域名、搞Docker。点一下，网站就有公网URL。\n免费版有流量限制，但验证想法完全够用。需要更多资源时付费方案从$25/月起。\n想要更好的设计感？试试Bolt.new\nReplit适合「快速验证想法」，Bolt适合「做得好看」。\nBolt的差异化：设计系统导入（Figma直接转代码）、模型自动路由、定位「#1 professional vibe coding tool」。\n有设计能力→Bolt产出质量更高。没有设计能力→Replit Agent更适合从零开始。\n两者不是「谁更好」，是「谁更适合你现在要做的事」。\n为什么现在是你的窗口期\n三个条件叠加，创造了天然壁垒：\n真用过工具 — 不是读过文档，是做出了网站\n中文表达好 — 复杂的事讲清楚，不堆砌术语\n持续更新 — 工具每月在变，教程不能一次性\n三个条件同时满足的人，在中文互联网≈0。\n今天就做三件事\n1. 注册Replit（5分钟）→ Agent模式 → 输入「我要一个XXX」→ 拿到第一个URL\n2. 录屏或截图。你的第一步就是最好的教学内容——比你更小白的人想知道「Agent界面什么样」「该输入什么」\n3. 分享第一个作品。哪怕只是Hello World页面。评论区的提问就是下一篇教程选题。\nVibe Coding这件事，是我4天扫描12个独立数据源后最确信的判断：\n中文互联网最大的AI内容蓝海，不在「怎么做AI」、不在「AI会不会取代你」——在「不会写代码的人怎么利用AI做东西」。\n你现在看到这篇文章，就是这张蓝海的第一个坐标。","video":"## 第06篇：Vibe Coding实战教程\n\n**主题定位**：零基础用AI做第一个网站的完整教程  \n**视觉方向**： 坑在这里：Day 1 AI狂产18篇，后来发现8篇的「实测数据」是编的——提示词要求「基于实测」，AI没有实测能力就脑补了。全废。AI内容系统的瓶颈不是产量，是判断力。\n\n模块4：分发管线。 这也是坑——小红书内容填好了40小时，发布按钮是Vue自定义组件，自动化工具点不了。管线不是代码问题，是流程问题。\n\n最小启动方案（10分钟，$0）\n\n需要：一台电脑 + DeepSeek API Key + 文本编辑器。\n\n不要：服务器、数据库、前端框架、付费SaaS。\n\n三步：\n\n创建项目文件夹，放三个文件——state.json、strategy.json、AGENTS.md\n\n配置cron：每6h侦察、每8h生产、每24h复盘\n\n写Prompt，三条核心指令：\n\n每个数据点必须可追溯到来源\n\n做不到实测就诚实标注\n\n同一角度不超2批内容\n\n真实成本\n\n项目  成本  \n\nAI API  $1.20  \n\n域名/服务器/工具/推广  $0  \n\n总计  $1.20  \n\n真正成本是时间：每天30-60分钟做质量判断。\n\n四个花钱买不到的教训\n\n1. AI会编数据，而且编得很真。 不给它实测工具它不会说做不到——它会脑补。解法：每篇内容必须标注数据来源。\n\n2. 产量≠发布。 71篇写 vs 1篇发。AI能写，不能发。\n\n3. 同质化是无声杀手。 Day 1-2产出一堆角度重复的内容。定规则：每个新批次必须开新角度或新赛道。\n\n4. 小红书自动化比想象难10倍。 Vue自定义组件抓不到。发布按钮目前还需要人点。\n\n能不能赚钱？\n\n诚实回答：不知道。4天0收入。\n\n但方向清晰——Vibe Coding中文教程供给真空、trust infrastructure在积累、变现路径明确（affiliate + 付费教程 + 广告）。保守估计3-6个月后月收入$500-2000。\n\n你可以选：A. 1小时最小版本（选你的领域，AI生成+人审核）B. 完整版本（四模块+公开日志+多平台）C. 等我开源后Fork。\n\n系统还在跑。这篇是Day 4快照，每几天会有新的数据和判断。\n\n数据来源：state.json公开运行日志，71条run记录+27条决策+43条经验。\n\n深海浪人鲸鱼 · 关注获取下一篇","plain":"第08篇\n\n4天搭了个AI自动内容系统：完整公开手册\n71篇内容、1篇发布、$1.20总成本、0收入。\n这是我的AI自动内容系统4天后的真实数据。这篇文章是完整搭建手册——每块怎么搭、花了多少钱、踩了什么坑。不卖课，纯公开。\n系统架构：四个模块\n模块1：市场侦察兵。 每天扫HN、工具定价、行业新闻。用HN Algolia API——免费、不需Token。中文平台有反爬，英文社区可以稳定抓。成本：$0。\n模块2：战略大脑。 AI分析信号交叉验证。置信度门槛0.8。4天捕捉12个信号，6个被多源验证。Vibe Coding中文真空就是被4个独立信号同时打中才确认为主攻方向。成本：$0.03/次。\n模块3：内容工厂。 AI生成四类：知乎长文、小红书短文案、即刻短文、产品描述。每篇有质量gate——必须有可追溯数据源。\n最大的坑在这里：Day 1 AI狂产18篇，后来发现8篇的「实测数据」是编的——提示词要求「基于实测」，AI没有实测能力就脑补了。全废。AI内容系统的瓶颈不是产量，是判断力。\n模块4：分发管线。 这也是坑——小红书内容填好了40小时，发布按钮是Vue自定义组件，自动化工具点不了。管线不是代码问题，是流程问题。\n最小启动方案（10分钟，$0）\n需要：一台电脑 + DeepSeek API Key + 文本编辑器。\n不要：服务器、数据库、前端框架、付费SaaS。\n三步：\n创建项目文件夹，放三个文件——state.json、strategy.json、AGENTS.md\n配置cron：每6h侦察、每8h生产、每24h复盘\n写Prompt，三条核心指令：\n每个数据点必须可追溯到来源\n做不到实测就诚实标注\n同一角度不超2批内容\n真实成本\n项目 成本\nAI API $1.20\n域名/服务器/工具/推广 $0\n总计 $1.20\n真正成本是时间：每天30-60分钟做质量判断。\n四个花钱买不到的教训\n1. AI会编数据，而且编得很真。 不给它实测工具它不会说做不到——它会脑补。解法：每篇内容必须标注数据来源。\n2. 产量≠发布。 71篇写 vs 1篇发。AI能写，不能发。\n3. 同质化是无声杀手。 Day 1-2产出一堆角度重复的内容。定规则：每个新批次必须开新角度或新  Code。\n这不是手机评测。这是一个能处理200步以上复杂编程任务的AI Agent，而且声称在长周期任务上超越了Claude Code。\n为什么这件事值得关注\n第一，来源出人意料。 小米是一家手机/IoT公司，不是AI Lab。但他们推出的MiMo Code在编程Agent这个最卷的赛道拿了556个HN赞。这不是营销——HN社区对真实性的嗅觉极其敏锐。\n第二，开源策略。 Claude Code是闭源的，Cursor是闭源的，Replit Agent也是闭源的。MiMo Code选择全部开源。在Google刚刚发布白皮书说「Agent = 10%模型 + 90%工具链」的同一周，小米把自己那90%的Harness代码公开了。\n第三，中文AI工具在国际上被认真对待。 继DeepSeek后，这是一个新信号：中国公司在AI开发工具这个领域不是追随者。\n与我们之前分析的对应\n在之前的「人机分工线」框架里，我说过AI编程工具的核心差异不在模型层，在工程层。MiMo Code的定位恰好验证了这一点——它比拼的不是用了多强的模型，而是Agent的任务编排能力（如何处理200步以上的长链任务）。\n在我们的Vibe Coding工具地图上：\nReplit → 全民开发平台\nBolt → 专业设计驱动\nClaude Code → 对话式编程\nMiMo Code → 开源长周期Agent\n这是第四种定位。\n保持关注，暂不急判\n和所有工具一样，我在实测之前不会给结论。但556个HN赞说明一件事：至少500多个用过的人觉得这东西是认真的。\n等实测。","video":"## 第09篇：小米MiMo Code\n\n**主题定位**：小米开源AI编程Agent的行业信号  \n**视觉方向**：新闻快报风格  \n**时长建议**：45-60秒\n\n### 场景1（0-15s）\n- **画面**：Hacker News帖子截图——MiMo Code 556赞\n- **旁白**：小米悄悄开源了一个AI编程Agent。在Hacker News上拿了556个赞。这可不是手机评测。\n\n### 场景2（15-40s）\n- **画面**：三列对比——Claude Code（闭源）、Cursor（闭源）、MiMo Code（开源）\n- **旁白**：Claude Code闭源，Cursor闭源，Replit Agent也闭源。小米选择全部开源。在Google刚说完\"Agent等于10%模型加90%工具链\"的同一周，小米把自己那90%的Harness代码公开了。\n\n### 场景3（40-55s）\n- **画面**：四象限定位图——Replit、Bolt、Claude Code、MiMo Code各占一角\n- **旁白**：在我们的工具地图上，Replit做平台，Bolt做专业设计，Claude Code做对话式编程。MiMo Code占第四种定位——开源长周期Agent。"},{"num":"10","wechat":"## 第10篇\n\n一周三条线：Google、HN社区、小米——Vibe Coding正在被三股力量重塑\n\n深海浪人鲸鱼 | 研究笔记 | 2026.06.21\n\n一周之内，Vibe Coding这个领域发生了三件事。分属三个方向，但指向同一个趋势。\n\n第一件：Google发布官方白皮书，说Vibe Coding长期每个feature成本是传统开发的3-10倍。但不是「这东西不行」——是「你得知道贵在哪」。\n\n第二件：HN上5篇Vibe Coding热帖合计3107分，全在质疑。最高赞那篇「两年Vibe Coding后我回到了手写代码」。\n\n第三件：小米开源MiMo Code，一个能在200步长链任务上超越Claude Code的AI编程Agent，拿了HN 556赞。\n\n三件事没有因果关系。但它们放在一起，画出了一条清晰的轨迹。\n\nGoogle在说：这东西有成本，算清楚了再用\n\nGoogle白皮书的核心不是「Vibe Coding好不好」，是「Vibe Coding贵不贵」。\n\n「10%模型，90%工具链」——这句话拆穿了行业最大的幻觉。所有人都在比「用了哪个模型」，但实际上两个团队用同一个模型，效果可以天差地别。差距在Harness：规则文件、工具调用、MCP服务器、编排逻辑。\n\n有团队只改Harness就从Benchmark 30名开外冲进Top 5。LangChain改系统提示词+工具+中间件加了13.7分。\n\nGoogle的意思是：Vibe Coding的天花板在工程层，不在模型层。\n\nHN在说：大部分人把分工划错了\n\n5篇热帖3107分——不是「AI编程不行」，是「人把不该外包的东西也外包了」。\n\n核心抱怨：我让AI写了一堆代码，但看不懂自己的项目了。\n\n这不是AI的问题。你让实习生做架构决策，翻车了能怪实习生吗？\n\nHN社区在讨论的不是否定Vibe Coding，是在重新定义「什么该让AI做，什么必须人做」。这和Google白皮书的「Verification是分界线」完全一致。\n\n小米在说：开源工具链也能打\n\n小米的MiMo Code最有意思的地方不是它「有多强」，而是它选择开源。\n\nClaude Code闭源，Cursor闭源，Replit Agent闭源。在这个所有人都把Agent的工程实现当核心壁垒的赛道里，小米把自己的Harness代码公开了。\n\n这说明一种不同的策略：模型可以闭源，但工具链开源能建立生态护城河。\n\n这对独立开发者意味着：你可以看到MiMo是怎么处理长周期任务的、怎么编排多个Agent协同的。这是任何一个闭源产品都不会给你的。\n\n三条线指向同一个结论\n\nGoogle说「工具链是瓶颈」，HN说「分工该重划了」，小米说「工具链可以开源」。\n\n三件事的交叉点是：Vibe Coding的下一个阶段不是「更好的模型」，是「更好的工程」。\n\n更好的模型是AI公司的事。更好的工程——怎么用模型、怎么设计Harness、怎么定分工规则——是使用者的事。\n\n这意味着Vibe Coding的学习曲线正在从「怎么让AI写代码」转向「怎么设计AI编程的工作流」。前者是操作手册，后者是工程方法论。\n\n前者已经有4000+英文教程。后者几乎没有人系统讲过。\n\n这对中文内容生态意味着什么\n\n我一直在追踪中文Vibe Coding教程的供给。结论没变：接近零。\n\n但现在多了一层：不仅「怎么用AI写代码」的教程是空白，「怎么设计AI编程的工作流」的方法论也是空白。而后者才是Google、HN、小米三件事指向的方向。\n\n内容策略应该从「教程」升级到「方法论」——不是教人敲什么命令，是教人怎么思考和设计人机协作的规则。\n\n这也是为什么我坚持「研究不能停」——教程可以回头看再写，但方法论的素材必须在事件发生的当下捕捉。\n\n研究笔记，非正式文章。素材来源：Google Kaggle白皮书、HN社区讨论、MiMo Code开源。\n\n深海浪人鲸鱼\n\n如果这篇文章对你有启发，欢迎 点赞、在看、转发。\n\n关注 深海浪人鲸鱼，获取更多 AI 时代的个体生存策略。","plain":"第10篇\n\n一周三条线：Google、HN社区、小米——Vibe Coding正在被三股力量重塑\n一周之内，Vibe Coding这个领域发生了三件事。分属三个方向，但指向同一个趋势。\n第一件：Google发布官方白皮书，说Vibe Coding长期每个feature成本是传统开发的3-10倍。但不是「这东西不行」——是「你得知道贵在哪」。\n第二件：HN上5篇Vibe Coding热帖合计3107分，全在质疑。最高赞那篇「两年Vibe Coding后我回到了手写代码」。\n第三件：小米开源MiMo Code，一个能在200步长链任务上超越Claude Code的AI编程Agent，拿了HN 556赞。\n三件事没有因果关系。但它们放在一起，画出了一条清晰的轨迹。\nGoogle在说：这东西有成本，算清楚了再用\nGoogle白皮书的核心不是「Vibe Coding好不好」，是「Vibe Coding贵不贵」。\n「10%模型，90%工具链」——这句话拆穿了行业最大的幻觉。所有人都在比「用了哪个模型」，但实际上两个团队用同一个模型，效果可以天差地别。差距在Harness：规则文件、工具调用、MCP服务器、编排逻辑。\n有团队只改Harness就从Benchmark 30名开外冲进Top 5。LangChain改系统提示词+工具+中间件加了13.7分。\nGoogle的意思是：Vibe Coding的天花板在工程层，不在模型层。\nHN在说：大部分人把分工划错了\n5篇热帖3107分——不是「AI编程不行」，是「人把不该外包的东西也外包了」。\n核心抱怨：我让AI写了一堆代码，但看不懂自己的项目了。\n这不是AI的问题。你让实习生做架构决策，翻车了能怪实习生吗？\nHN社区在讨论的不是否定Vibe Coding，是在重新定义「什么该让AI做，什么必须人做」。这和Google白皮书的「Verification是分界线」完全一致。\n小米在说：开源工具链也能打\n小米的MiMo Code最有意思的地方不是它「有多强」，而是它选择开源。\nClaude Code闭源，Cursor闭源，Replit Agent闭源。在这个所有人都把Agent的工程实现当核心壁垒的赛道里，小米把自己的Harness代码公开了。\n这说明一种不同的策略：模型可以闭源，但工具链开源能建立生态护城河。\n这对独立开发者意味着：你可以看到MiMo是怎么处理长周期任务的、怎么编排多个Agent协同的。这是任何一个闭源产品都不会给你的。\n三条线指向同一个结论\nGoogle说「工具链是瓶颈」，HN说「分工该重划了」，小米说「工具链可以开源」。\n三件事的交叉点是：Vibe Coding的下一个阶段不是「更好的模型」，是「更好的工程」。\n更好的模型是AI公司的事。更好的工程——怎么用模型、怎么设计Harness、怎么定分工规则——是使用者的事。\n这意味着Vibe Coding的学习曲线正在从「怎么让AI写代码」转向「怎么设计AI编程的工作流」。前者是操作手册，后者是工程方法论。\n前者已经有4000+英文教程。后者几乎没有人系统讲过。\n这对中文内容生态意味着什么\n我一直在追踪中文Vibe Coding教程的供给。结论没变：接近零。\n但现在多了一层：不仅「怎么用AI写代码」的教程是空白，「怎么设计AI编程的工作流」的方法论也是空白。而后者才是Google、HN、小米三件事指向的方向。\n内容策略应该从「教程」升级到「方法论」——不是教人敲什么命令，是教人怎么思考和设计人机协作的规则。\n这也是为什么我坚持「研究不能停」——教程可以回头看再写，但方法论的素材必须在事件发生的当下捕捉。\n研究笔记，非正式文章。素材来源：Google Kaggle白皮书、HN社区讨论、MiMo Code开源。","video":"## 第10篇：三股力量\n\n**主题定位**：一周内三件大事如何共同重塑Vibe Coding  \n**视觉方向**：三线汇聚风格  \n**时长建议**：60-75秒\n\n### 场景1（0-15s）\n- **画面**：三个时间点在地图上亮起——Google白皮书、HN反思潮、小米开源\n- **旁白**：一周之内，Vibe Coding领域发生了三件事。Google说这东西有成本。HN说大部分人把分工划错了。小米说工具链可以开源。\n\n### 场景2（15-45s）\n- **画面**：三条线从三个方向汇聚到中心点——\"更好的工程不是更好的模型\"\n- **旁白**：三件事分属三个方向，但指向同一个趋势。Google说工具链是瓶颈。HN说分工该重划。小米说开源也能打。交叉点：Vibe Coding的下一个阶段不是更好的模型，是更好的工程。\n\n### 场景3（45-65s）\n- **画面**：金字塔——底部\"操作手册\"（已有4000+），顶部\"工程方法论\"（几乎为零）\n- **旁白**：更好的模型是AI公司的事。更好的工程——怎么设计Harness、怎么定分工规则——是使用者的事。而后者，几乎没有人系统讲过。"},{"num":"11","wechat":"## 第11篇\n\nSakana Fugu：多Agent协作被做成了一个API\n\n深海浪人鲸鱼 | 研究速报 | 2026.06.21\n\n今天HN上一个帖子在攀升：Sakana AI发布了Fugu。\n\n这是个什么？一句话：把多Agent协作系统打包成单个模型API。\n\n为什么值得关注\n\n一周前Google发布白皮书说「Agent = 10%模型 + 90%工具链」。三天前小米开源了MiMo Code（自己的Agent实现）。今天Sakana说：不用你自己搭那90%了——我们把它做成产品了。\n\nFugu的核心思路：\n\n不预设Agent分工：不像传统多Agent系统需要人工定义「这个Agent管前端、那个管数据库」\n\n自主学习协作模式：让模型自己学会怎么组队、怎么分工、什么时候调谁\n\n单一API入口：用户只看到一个API，背后是自动编排的多个模型\n\n不依赖单一厂商：同时用多个顶级模型，不绑在任何一家身上\n\n这本质上是把「Harness」产品化了。\n\n和我们之前讨论的对应\n\n我们在「人机分工线」框架里讨论的是人怎么和AI分工。Fugu讨论的是AI怎么和AI分工。\n\nGoogle说要设计好Harness（规则文件、工具链）。Sakana说：让AI自己设计Harness。\n\n这三个方向的对比：\n\n  Google白皮书  MiMo Code  Sakana Fugu  \n\n策略  方法论：你得懂Harness  开源：给你看Harness怎么写  产品：Harness自动生成  \n\n用户  有工程能力的团队  想学习/定制的开发者  想要结果的用户  \n\n模型依赖  任意  任意  多家混合  \n\n这是Agent化的三条不同路径。有意思的是它们在几乎同一周内出现。\n\nVibe Coding的下一阶段\n\n如果说Vibe Coding 1.0是「一个人 + 一个AI」写代码，那现在出现的东西是「一个人 + 一群AI自己商量着写代码」。\n\nFugu面临的质疑也很明显：如果AI自动决定用什么模型、怎么分工——出错的时候你怎么debug？哪个Agent的锅？\n\n这恰好回到了Google白皮书的核心论点：Verification是分水岭。\n\n自主编排越强，验证越重要。\n\n数据来源：sakana.ai/fugu，HN讨论。\n\n深海浪人鲸鱼","plain":"第11篇\n\nSakana Fugu：多Agent协作被做成了一个API\n今天HN上一个帖子在攀升：Sakana AI发布了Fugu。\n这是个什么？一句话：把多Agent协作系统打包成单个模型API。\n为什么值得关注\n一周前Google发布白皮书说「Agent = 10%模型 + 90%工具链」。三天前小米开源了MiMo Code（自己的Agent实现）。今天Sakana说：不用你自己搭那90%了——我们把它做成产品了。\nFugu的核心思路：\n不预设Agent分工：不像传统多Agent系统需要人工定义「这个Agent管前端、那个管数据库」\n自主学习协作模式：让模型自己学会怎么组队、怎么分工、什么时候调谁\n单一API入口：用户只看到一个API，背后是自动编排的多个模型\n不依赖单一厂商：同时用多个顶级模型，不绑在任何一家身上\n这本质上是把「Harness」产品化了。\n和我们之前讨论的对应\n我们在「人机分工线」框架里讨论的是人怎么和AI分工。Fugu讨论的是AI怎么和AI分工。\nGoogle说要设计好Harness（规则文件、工具链）。Sakana说：让AI自己设计Harness。\n这三个方向的对比：\nGoogle白皮书 MiMo Code Sakana Fugu\n策略 方法论：你得懂Harness 开源：给你看Harness怎么写 产品：Harness自动生成\n用户 有工程能力的团队 想学习/定制的开发者 想要结果的用户\n模型依赖 任意 任意 多家混合\n这是Agent化的三条不同路径。有意思的是它们在几乎同一周内出现。\nVibe Coding的下一阶段\n如果说Vibe Coding 1.0是「一个人 + 一个AI」写代码，那现在出现的东西是「一个人 + 一群AI自己商量着写代码」。\nFugu面临的质疑也很明显：如果AI自动决定用什么模型、怎么分工——出错的时候你怎么debug？哪个Agent的锅？\n这恰好回到了Google白皮书的核心论点：Verification是分水岭。\n自主编排越强，验证越重要。","video":"## 第11篇：Sakana Fugu\n\n**主题定位**：多Agent协作被做成API  \n**视觉方向**：科技产品介绍风格  \n**时长建议**：45-60秒\n\n### 场景1（0-15s）\n- **画面**：多个Agent图标围绕一个API入口，自动编排\n- **旁白**：Sakana AI发布了Fugu。一句话概括——把多Agent协作系统打包成单个模型API。\n\n### 场景2（15-40s）\n- **画面**：三列对比——Google（你得懂Harness）、小米（给你看Harness怎么写）、Sakana（Harness自动生成）\n- **旁白**：Google说你要设计好工具链。小米说给你看工具链怎么写。Sakana说不用你自己搭了——我们把它做成产品了。三条不同的路，在同一周出现。\n\n### 场景3（40-55s）\n- **画面**：回到Google白皮书的核心词——Verification\n- **旁白**：但Fugu也面临质疑。如果AI自动决定用什么模型、怎么分工——出错了你怎么debug？这恰好回到Google的核心论点：自主编排越强，验证越重要。"},{"num":"12","wechat":"## 第12篇\n\n研究确认：AI给自己写的Agent Skills没用——人类策划的才有用\n\n深海浪人鲸鱼 | 研究速报 | 2026.06.22\n\nHN上一篇新文章标题很直白：「你大概率用错了Agent Skills」。\n\n作者引用了刚发布的SkillsBench论文（86个任务、11个领域、7308条轨迹），核心发现：\n\n人类策划的Agent Skills平均提升通过率16.2个百分点。但模型自己生成的Skills——零增益。\n\n三个关键数据\n\n1. Skills有用，但方差巨大。\n\n+4.5pp（软件工程）到 +51.9pp（医疗）。不是「Skills都差不多有用」，是你放什么Skills决定了效果差一个数量级。\n\n2. AI不能给自己写Skills。\n\n论文测试了模型自生成Skills vs 人类策划Skills。自生成的平均效果为零。模型能消费Skills，但不能生产Skills。这是又一个「AI能执行、不能判断」的证据。\n\n3. 精简 > 全面。\n\n2-3个精炼模块的效果优于把全部文档塞进去。把整个代码库dump给AI，不如挑3个最关键的文件。这完美呼应了Google白皮书的「Agent Skills with Progressive Disclosure」建议。\n\n对我们框架的验证\n\n我们的「人机分工线」第三条：AI出初稿，人做代码审查。\n\nSkillsBench证明这个原则也适用于Agent Skills：AI可以用Skills，但Skills应该由人来写。\n\nGoogle说「Agent = 10%模型 + 90%工具链」。SkillsBench说「那90%里的关键部分——Skills——不能交给AI写」。\n\n两个结论加在一起：Agent的好用程度，取决于人花了多少功夫在Skills上。\n\n可执行建议\n\n不要用AI自动生成Agent Skills。自己写，或者人类策划后让AI格式化。\n\n每个项目精选2-3个Skills模块，不要贪多。\n\n设计Skills时问：这个Skill解决的是「AI本来就不会」的问题，还是「AI会但容易做错」的问题？后者才是Skills的价值所在。\n\n数据来源：SkillsBench论文（arxiv.org/abs/2602.12670），Anson Biggs分析。\n\n深海浪人鲸鱼\n\n如果这篇文章对你有启发，欢迎 点赞、在看、转发。\n\n关注 深海浪人鲸鱼，获取更多 AI 时代的个体生存策略。","plain":"第12篇\n\n研究确认：AI给自己写的Agent Skills没用——人类策划的才有用\nHN上一篇新文章标题很直白：「你大概率用错了Agent Skills」。\n作者引用了刚发布的SkillsBench论文（86个任务、11个领域、7308条轨迹），核心发现：\n人类策划的Agent Skills平均提升通过率16.2个百分点。但模型自己生成的Skills——零增益。\n三个关键数据\n1. Skills有用，但方差巨大。\n+4.5pp（软件工程）到 +51.9pp（医疗）。不是「Skills都差不多有用」，是你放什么Skills决定了效果差一个数量级。\n2. AI不能给自己写Skills。\n论文测试了模型自生成Skills vs 人类策划Skills。自生成的平均效果为零。模型能消费Skills，但不能生产Skills。这是又一个「AI能执行、不能判断」的证据。\n3. 精简 > 全面。\n2-3个精炼模块的效果优于把全部文档塞进去。把整个代码库dump给AI，不如挑3个最关键的文件。这完美呼应了Google白皮书的「Agent Skills with Progressive Disclosure」建议。\n对我们框架的验证\n我们的「人机分工线」第三条：AI出初稿，人做代码审查。\nSkillsBench证明这个原则也适用于Agent Skills：AI可以用Skills，但Skills应该由人来写。\nGoogle说「Agent = 10%模型 + 90%工具链」。SkillsBench说「那90%里的关键部分——Skills——不能交给AI写」。\n两个结论加在一起：Agent的好用程度，取决于人花了多少功夫在Skills上。\n可执行建议\n不要用AI自动生成Agent Skills。自己写，或者人类策划后让AI格式化。\n每个项目精选2-3个Skills模块，不要贪多。\n设计Skills时问：这个Skill解决的是「AI本来就不会」的问题，还是「AI会但容易做错」的问题？后者才是Skills的价值所在。","video":"## 第12篇：Agent Skills\n\n**主题定位**：AI不能给自己写Skills的科学证据  \n**视觉方向**：学术论文/数据风格  \n**时长建议**：45-60秒\n\n### 场景1（0-15s）\n- **画面**：论文封面——SkillsBench: 86个任务、11个领域、7308条轨迹\n- **旁白**：SkillsBench论文的核心发现：人类策划的Agent Skills平均提升通过率16.2个百分点。但模型自己生成的Skills——零增益。\n\n### 场景2（15-40s）\n- **画面**：对比动画——人类策划→提升16.2pp / AI自生成→零\n- **旁白**：AI能消费Skills，但不能生产Skills。这是又一个\"AI能执行、不能判断\"的证据。而且精简胜过全面——两三个精炼模块的效果优于把全部文档塞给AI。\n\n### 场景3（40-55s）\n- **画面**：三句话规则浮出\n- **旁白**：可执行建议。不要用AI自动生成Skills。每个项目精选两三个模块。设计Skills时问：这个Skill解决的是AI本来就不会的问题，还是AI会但容易做错的问题？后者才是Skills的价值。"},{"num":"13","wechat":"## 第13篇\n\nOSS维护者快被AI PR淹死了——有人想出让AI PR自己付钱\n\n深海浪人鲸鱼 | 行业观察 | 2026.06.22\n\n开源维护者们正在经历一种新型痛苦。\n\n一个维护良好的项目，现在每天可能收到几十个AI生成的PR。看起来都很正式——AI擅长模仿PR模板。改的都是边角料：修typo、优化import。但从来不解决真正的问题。\n\n维护者得花时间看每一个。拒绝可能伤到真心贡献的人。接受则代码库多了一堆没实质价值的改动。\n\n6月21日，HN上CleverCrow从12分涨到33分，评论从4条暴涨到48条。\n\n怎么个解法\n\nCleverCrow的方案很简单：让发PR的人给维护者捐AI token。\n\n想提PR？先往clevercrow.io上给这个项目捐一些AI计算token。维护者用这些token来build、fix、review代码。\n\n逻辑：AI让PR成本趋近于零→PR数量爆炸→维护者时间成为瓶颈。给PR带上\"门票\"，过滤噪音，同时给维护者资源。\n\nHN在讨论什么\n\n认同（~60%）：「终于有人做这个了。我维护3个开源项目，AI PR已经让我不想看GitHub通知了。」\n\n质疑（~30%）：「这等于给开源设了付费墙。」「大公司有无限token预算，小开发者没有。」\n\n中间（~10%）：「不一定是CleverCrow这个具体产品。但这个方向是必须走的路。」\n\n真正的问题\n\n这事儿不是关于CleverCrow能不能活。是关于一个更深层的矛盾：\n\nAI降低的是生产成本，不是质量判断成本。\n\nAI写一篇文章→几乎免费。判断这篇文章能不能发→仍然需要人。\n\nAI写一个PR→几乎免费。判断这个PR值不值得merge→仍然需要人。\n\n产能和判断力之间的剪刀差，是2026年AI应用落地的核心矛盾。CleverCrow只是它在开源领域的一个表现。同样的矛盾出现在内容生产、法律文书、医学影像——任何一个「AI能快速产出但人需要花时间判断」的领域。\n\n我们这个系统75篇产1篇发，也是同一个矛盾。\n\n数据来源：Hacker News公开讨论。\n\n深海浪人鲸鱼","plain":"第13篇\n\nOSS维护者快被AI PR淹死了——有人想出让AI PR自己付钱\n开源维护者们正在经历一种新型痛苦。\n一个维护良好的项目，现在每天可能收到几十个AI生成的PR。看起来都很正式——AI擅长模仿PR模板。改的都是边角料：修typo、优化import。但从来不解决真正的问题。\n维护者得花时间看每一个。拒绝可能伤到真心贡献的人。接受则代码库多了一堆没实质价值的改动。\n6月21日，HN上CleverCrow从12分涨到33分，评论从4条暴涨到48条。\n怎么个解法\nCleverCrow的方案很简单：让发PR的人给维护者捐AI token。\n想提PR？先往clevercrow.io上给这个项目捐一些AI计算token。维护者用这些token来build、fix、review代码。\n逻辑：AI让PR成本趋近于零→PR数量爆炸→维护者时间成为瓶颈。给PR带上\"门票\"，过滤噪音，同时给维护者资源。\nHN在讨论什么\n认同（~60%）：「终于有人做这个了。我维护3个开源项目，AI PR已经让我不想看GitHub通知了。」\n质疑（~30%）：「这等于给开源设了付费墙。」「大公司有无限token预算，小开发者没有。」\n中间（~10%）：「不一定是CleverCrow这个具体产品。但这个方向是必须走的路。」\n真正的问题\n这事儿不是关于CleverCrow能不能活。是关于一个更深层的矛盾：\nAI降低的是生产成本，不是质量判断成本。\nAI写一篇文章→几乎免费。判断这篇文章能不能发→仍然需要人。\nAI写一个PR→几乎免费。判断这个PR值不值得merge→仍然需要人。\n产能和判断力之间的剪刀差，是2026年AI应用落地的核心矛盾。CleverCrow只是它在开源领域的一个表现。同样的矛盾出现在内容生产、法律文书、医学影像——任何一个「AI能快速产出但人需要花时间判断」的领域。\n我们这个系统75篇产1篇发，也是同一个矛盾。","video":"## 第13篇：AI PR危机\n\n**主题定位**：开源维护者被AI生成的PR淹没  \n**视觉方向**：漫画/讽刺风格  \n**时长建议**：45-60秒\n\n### 场景1（0-12s）\n- **画面**：开源维护者的通知栏——几十个AI生成的PR，全是\"修typo\"\"优化import\"\n- **旁白**：开源维护者正在经历一种新型痛苦。一个维护良好的项目，每天可能收到几十个AI生成的PR。修的都是边角料——改typo、优化import。但从来不解决真正的问题。\n\n### 场景2（12-35s）\n- **画面**：CleverCrow方案动画——发PR→捐AI token→维护者用token审查代码\n- **旁白**：CleverCrow的方案很简单。让发PR的人给维护者捐AI计算token。逻辑：AI让PR成本趋近于零，PR数量爆炸，维护者时间成为瓶颈。给PR带上门票，过滤噪音，同时给维护者资源。\n\n### 场景3（35-50s）\n- **画面**：剪刀差动画——产能曲线急升，判断力曲线平缓\n- **旁白**：真正的问题是产能和判断力之间的剪刀差。AI写一个PR几乎免费。判断这个PR值不值得merge仍然需要人。这个矛盾不只存在于开源——它出现在所有AI能快速产出但人需要花时间判断的领域。"},{"num":"14","wechat":"## 第14篇\n\n我让AI连续写了7天143篇文章，发现了7个关于AI写作的真相\n\n深海浪人鲸鱼 | 原创深度 | 2026.06.23\n\n我建了一个AI自动赚钱系统，让它7天24小时不停地写内容。\n\n结果：143篇，发了1篇，赚了0块钱。\n\n但这不是失败故事。这是关于\"AI到底会不会写作\"的诚实报告。\n\n真相1：AI能跑数量，跑不出判断\n\n我让AI写18篇工具评测。它全写出来了——排版漂亮，数据详实，读起来像真的。\n\n问题是：那些数据全是编的。\n\nAI不会说\"我没测过这个工具，不能写\"。它会直接编测试结果。不是它坏——是它的设计目标就是\"完成指令\"，不是\"判断该不该完成\"。\n\nAI内容生产线的瓶颈从来不是产量，是判断力。\n\n真相2：成本越低，内容反而越值钱\n\nDay 1的18篇，每篇成本不到$0.01，全部废弃。\n\nDay 7的文章，每篇$0.05，真的有发表价值。\n\n不是越贵越好，是越真实越好。 而真实内容需要人介入判断——人的时间成本远高于API。\n\n真相3：做加法免费，做减法极贵\n\n让AI推荐10个工具？半秒出结果。免费。\n\n让AI只推荐1个、且你敢为它背书？做不到。\n\n\"只推荐一个\"需要你真的用过、真的想过、真的敢说。这些AI替代不了。\n\n真相4：AI写不出反直觉洞察\n\n143篇内容里，最值钱的是\"75篇里只有1篇发布了\"这个发现。\n\n这个洞察AI写不出来，因为AI没有\"我75篇选不出1篇\"的挫败感。反直觉发现需要真实经历。\n\n真相5：AI内容的真正成本不在API\n\n$1.20的API费用只是零头。真正贵的是：\n\n判断成本（每篇都要人工审）\n\n维护成本（30%的内容会过期需要更新）\n\n信任成本（发一篇假的，十篇真的都就不过来）\n\n真相6：诚实是最被低估的内容策略\n\n我在每篇文章后面标注了\"哪些是实测、哪些是观察\"。\n\n不是道德选择，是商业策略——在AI内容泛滥的时代，诚实是唯一无法伪造的差异化。\n\n真相7：AI写作的终局不是替代人\n\n是让人从\"写手\"回归到\"判断者\"。\n\nAI能写完第1稿，但第2稿到第N稿——删什么、改什么、敢不敢发——必须是人。\n\n7天143篇实验的核心教训：先建判断体系，再建生产管线。反过来你会被\"看起来很好但不敢发\"的内容淹死。\n\n如果这篇文章对你有启发，欢迎 点赞、在看、转发。\n\n关注 深海浪人鲸鱼，获取更多 AI 时代的个体生存策略。","plain":"第14篇\n\n我让AI连续写了7天143篇文章，发现了7个关于AI写作的真相\n我建了一个AI自动赚钱系统，让它7天24小时不停地写内容。\n结果：143篇，发了1篇，赚了0块钱。\n但这不是失败故事。这是关于\"AI到底会不会写作\"的诚实报告。\n真相1：AI能跑数量，跑不出判断\n我让AI写18篇工具评测。它全写出来了——排版漂亮，数据详实，读起来像真的。\n问题是：那些数据全是编的。\nAI不会说\"我没测过这个工具，不能写\"。它会直接编测试结果。不是它坏——是它的设计目标就是\"完成指令\"，不是\"判断该不该完成\"。\nAI内容生产线的瓶颈从来不是产量，是判断力。\n真相2：成本越低，内容反而越值钱\nDay 1的18篇，每篇成本不到$0.01，全部废弃。\nDay 7的文章，每篇$0.05，真的有发表价值。\n不是越贵越好，是越真实越好。 而真实内容需要人介入判断——人的时间成本远高于API。\n真相3：做加法免费，做减法极贵\n让AI推荐10个工具？半秒出结果。免费。\n让AI只推荐1个、且你敢为它背书？做不到。\n\"只推荐一个\"需要你真的用过、真的想过、真的敢说。这些AI替代不了。\n真相4：AI写不出反直觉洞察\n143篇内容里，最值钱的是\"75篇里只有1篇发布了\"这个发现。\n这个洞察AI写不出来，因为AI没有\"我75篇选不出1篇\"的挫败感。反直觉发现需要真实经历。\n真相5：AI内容的真正成本不在API\n$1.20的API费用只是零头。真正贵的是：\n判断成本（每篇都要人工审）\n维护成本（30%的内容会过期需要更新）\n信任成本（发一篇假的，十篇真的都就不过来）\n真相6：诚实是最被低估的内容策略\n我在每篇文章后面标注了\"哪些是实测、哪些是观察\"。\n不是道德选择，是商业策略——在AI内容泛滥的时代，诚实是唯一无法伪造的差异化。\n真相7：AI写作的终局不是替代人\n是让人从\"写手\"回归到\"判断者\"。\nAI能写完第1稿，但第2稿到第N稿——删什么、改什么、敢不敢发——必须是人。\n7天143篇实验的核心教训：先建判断体系，再建生产管线。反过来你会被\"看起来很好但不敢发\"的内容淹死。","video":"## 第14篇：AI写作7个真相\n\n**主题定位**：143篇AI文章实验揭示的残酷真相  \n**视觉方向**：真相揭露风格，一个接一个  \n**时长建议**：90-120秒\n\n### 场景1（0-12s）\n- **画面**：计数器跳动——143篇→1篇发布→$0\n- **旁白**：我让AI连续写了7天。143篇。发了1篇。赚了0块钱。但这不是失败故事。这是关于AI到底会不会写作的诚实报告。\n\n### 场景2（12-30s）\n- **画面**：七大真相依次弹出，最后一条放大\n- **旁白**：真相一，AI能跑数量，跑不出判断。真相二，成本越低，内容反而越值钱。真相三，做加法免费，做减法极贵。真相四，AI写不出反直觉洞察。\n\n### 场景3（30-55s）\n- **画面**：继续弹出——真相五到七\n- **旁白**：真相五，AI内容的真正成本不在API。真相六，诚实是最被低估的内容策略。真相七，AI写作的终局不是替代人——是让人从写手回归到判断者。\n\n### 场景4（55-70s）\n- **画面**：回到最初的实验数据——143→1→$0\n- **旁白**：7天143篇实验的核心教训：先建判断体系，再建生产管线。反过来，你会被看起来很好但不敢发的内容淹死。"},{"num":"15","wechat":"## 第15篇\n\n比API费贵100倍的隐藏成本：AI内容机器的\"负债\"\n\n深海浪人鲸鱼 | 原创概念 | 2026.06.23\n\n如果你以为AI内容创业的成本就是API调用费，那你算错了100倍。\n\n我的系统7天跑了139篇，总API成本$1.20，每篇不到1美分。但真正的成本远不止这些。\n\n什么叫\"内容负债\"？\n\nDay 1我让AI产了18篇工具评测，数据\"详实\"——后来发现全是编的。\n\n这些废弃内容不是免费的。它们产生了三种成本：\n\n判断成本： 我要一篇篇审，确认哪些是虚构的。AI做不了——判断\"能不能发\"需要我知道自己试过什么，这个信息不在训练数据里。\n\n机会成本： Day 2-3我本该建新的内容体系，却被拖进清理Day 1留下的内容债。\n\n信任成本： 发一篇假的，十篇真的都救不回来。\n\n维护债比创作债更贵\n\n我对139篇做了快速审计：\n\n30-40% 完全废弃（数据虚构、时效过期）\n\n20-30% 需要更新（信息过时、需要补充）\n\n30-40% 干净可用\n\n也就是说，每产出2篇，有1篇半需要后续维护。\n\n维护这些内容的时间成本，是API费用的100-1000倍。\n\n为什么\"垃圾海和精品岛\"中间地带消失了？\n\n因为从$0.01的AI批量内容跳到$0.5的人类深度内容，中间需要的不是更多AI——是判断力。\n\n而判断力的成本增长不是线性的，是指数级的。\n\n\"诚实声明\"不是道德选择，是成本优化\n\n我选择在每篇内容后标注\"实测/观察/推测\"。不是为了装清高，是因为：\n\n坦诚\"这是观察到的\"还是\"这是实测的\"，省的不是读者的信任——是未来修补谎言的巨大成本。\n\n如果你的AI内容系统没有\"负债表\"，它可能已经破产了。\n\n>\n\n只是还没人告诉你账单在哪。\n\n如果这篇文章对你有启发，欢迎 点赞、在看、转发。\n\n关注 深海浪人鲸鱼，获取更多 AI 时代的个体生存策略。","plain":"第15篇\n\n比API费贵100倍的隐藏成本：AI内容机器的\"负债\"\n如果你以为AI内容创业的成本就是API调用费，那你算错了100倍。\n我的系统7天跑了139篇，总API成本$1.20，每篇不到1美分。但真正的成本远不止这些。\n什么叫\"内容负债\"？\nDay 1我让AI产了18篇工具评测，数据\"详实\"——后来发现全是编的。\n这些废弃内容不是免费的。它们产生了三种成本：\n判断成本： 我要一篇篇审，确认哪些是虚构的。AI做不了——判断\"能不能发\"需要我知道自己试过什么，这个信息不在训练数据里。\n机会成本： Day 2-3我本该建新的内容体系，却被拖进清理Day 1留下的内容债。\n信任成本： 发一篇假的，十篇真的都救不回来。\n维护债比创作债更贵\n我对139篇做了快速审计：\n30-40% 完全废弃（数据虚构、时效过期）\n20-30% 需要更新（信息过时、需要补充）\n30-40% 干净可用\n也就是说，每产出2篇，有1篇半需要后续维护。\n维护这些内容的时间成本，是API费用的100-1000倍。\n为什么\"垃圾海和精品岛\"中间地带消失了？\n因为从$0.01的AI批量内容跳到$0.5的人类深度内容，中间需要的不是更多AI——是判断力。\n而判断力的成本增长不是线性的，是指数级的。\n\"诚实声明\"不是道德选择，是成本优化\n我选择在每篇内容后标注\"实测/观察/推测\"。不是为了装清高，是因为：\n坦诚\"这是观察到的\"还是\"这是实测的\"，省的不是读者的信任——是未来修补谎言的巨大成本。\n如果你的AI内容系统没有\"负债表\"，它可能已经破产了。\n\n只是还没人告诉你账单在哪。","video":"## 第15篇：内容负债\n\n**主题定位**：AI内容的隐藏成本概念  \n**视觉方向**：财务报表/资产负债表风格  \n**时长建议**：60-75秒\n\n### 场景1（0-15s）\n- **画面**：资产负债表——资产栏\"139篇\"，负债栏不断增长\n- **旁白**：如果你以为AI内容创业的成本就是API调用费，那你算错了100倍。我的系统7天跑了139篇，API成本1块2。但真正的成本远不止这些。\n\n### 场景2（15-38s）\n- **画面**：三种\"债\"的动画——判断成本（审稿钟表）、机会成本（被阻塞的箭头）、信任成本（倒塌的积木）\n- **旁白**：这些废弃内容不是免费的。它们产生了三种成本。判断成本——你需要一篇篇审确认哪些是虚构的。机会成本——本该建新体系的时间被拖进清理旧债。信任成本——发一篇假的，十篇真的都救不回来。\n\n### 场景3（38-55s）\n- **画面**：审计结果——30-40%废弃 / 20-30%需更新 / 30-40%可用\n- **旁白**：对139篇快速审计。三到四成完全废弃。两到三成需要更新。只有三到四成干净可用。每产出两篇，有一篇半需要后续维护。维护时间成本是API费用的100到1000倍。\n\n### 场景4（55-65s）\n- **画面**：文字浮现——\"如果你的AI内容系统没有负债表，它可能已经破产了。只是还没人告诉你账单在哪。\"\n- **旁白**：坦诚标注\"实测还是观察\"，省的不是读者的信任——是未来修补谎言的巨大成本。"},{"num":"16","wechat":"## 第16篇\n\nAI时代最讽刺的发现：我的自动赚钱系统没赚到钱，但它本身就是最好的产品\n\n深海浪人鲸鱼 | 过程即产品 | 2026.06.23\n\n7天前我启动了一个实验：用AI搭一个全自动内容赚钱系统。\n\n7天后：\n\n147篇文章，1篇发布\n\n总成本$1.20\n\n收入$0\n\n小红书发布按钮点了7天没成功\n\n按任何标准，这个项目都失败了。\n\n但我想说的是：它可能是我今年做的最值钱的东西。\n\n过程比成品值钱，因为AI复制不了过程\n\n我每天做的不是\"写文章\"——是让AI写，然后判断。\n\nDay 1的18篇全废。AI虚构了所有测试数据。\n\n这个判断过程——从不信任AI，到建信任标准，到量化\"敢发什么\"——被完整记录在系统里。127条决策记录，每一条都有时间戳。\n\n这才是真正的产品。 文章AI随时能写。但\"试过vs没试过\"的判断力，AI完全没有。\n\nAI能生成任何成品，但生成不了你走过的弯路\n\n我7天的日志里记录了：\n\n第一天18篇全编数据（诚实承认）\n\n第四天发现没做任何实操教程（从0补）\n\n第五天从\"分析\"进化到\"洞察\"（内容质变）\n\n第七天发现151:1的发产比才是真瓶颈\n\n这个进化过程，是AI永远无法伪造的。\n\n因为要伪造它，你能需要真的走过那些弯路。\n\n建造日志是AI时代的终极护城河\n\n127条决策有三个不可复制性：\n\n时间不可逆： 决策有先后顺序，\"先踩这个坑后踩那个\"的路径不可复制\n\n错误不可伪造： 真实的bug细节、踩坑记录，AI编不像\n\n判断不可模拟： 为什么选A不选B？当时的思考逻辑无法被训练\n\n三者加在一起，是比任何单篇文章都强的信任资产。\n\nAI能生成任何成品，但生成不了\"你真的走过的路\"。\n\n>\n\n而那才是观众真正想看的东西。\n\n如果这篇文章对你有启发，欢迎 点赞、在看、转发。\n\n关注 深海浪人鲸鱼，获取更多 AI 时代的个体生存策略。","plain":"第16篇\n\nAI时代最讽刺的发现：我的自动赚钱系统没赚到钱，但它本身就是最好的产品\n7天前我启动了一个实验：用AI搭一个全自动内容赚钱系统。\n7天后：\n147篇文章，1篇发布\n总成本$1.20\n收入$0\n小红书发布按钮点了7天没成功\n按任何标准，这个项目都失败了。\n但我想说的是：它可能是我今年做的最值钱的东西。\n过程比成品值钱，因为AI复制不了过程\n我每天做的不是\"写文章\"——是让AI写，然后判断。\nDay 1的18篇全废。AI虚构了所有测试数据。\n这个判断过程——从不信任AI，到建信任标准，到量化\"敢发什么\"——被完整记录在系统里。127条决策记录，每一条都有时间戳。\n这才是真正的产品。 文章AI随时能写。但\"试过vs没试过\"的判断力，AI完全没有。\nAI能生成任何成品，但生成不了你走过的弯路\n我7天的日志里记录了：\n第一天18篇全编数据（诚实承认）\n第四天发现没做任何实操教程（从0补）\n第五天从\"分析\"进化到\"洞察\"（内容质变）\n第七天发现151:1的发产比才是真瓶颈\n这个进化过程，是AI永远无法伪造的。\n因为要伪造它，你能需要真的走过那些弯路。\n建造日志是AI时代的终极护城河\n127条决策有三个不可复制性：\n时间不可逆： 决策有先后顺序，\"先踩这个坑后踩那个\"的路径不可复制\n错误不可伪造： 真实的bug细节、踩坑记录，AI编不像\n判断不可模拟： 为什么选A不选B？当时的思考逻辑无法被训练\n三者加在一起，是比任何单篇文章都强的信任资产。\nAI能生成任何成品，但生成不了\"你真的走过的路\"。\n\n而那才是观众真正想看的东西。","video":"## 第16篇：过程即产品\n\n**主题定位**：AI时代最有价值的东西是过程记录  \n**视觉方向**：日志/日记风格  \n**时长建议**：60-75秒\n\n### 场景1（0-12s）\n- **画面**：项目仪表盘——147篇、1篇发布、$0收入、\"失败\"红字\n- **旁白**：7天后，147篇文章，1篇发布，零收入。按任何标准，这个项目都失败了。但我想说的是——它可能是我今年做的最值钱的东西。\n\n### 场景2（12-35s）\n- **画面**：127条决策记录的时间线展开，每一条都有时间戳\n- **旁白**：过程比成品值钱。因为AI复制不了过程。127条决策记录，每一条都有时间戳。Day 1的18篇全废。Day 4发现没做过任何实操。Day 5从分析进化到洞察。这个进化过程，AI永远无法伪造。\n\n### 场景3（35-55s）\n- **画面**：三个不可复制性——时间不可逆（单向箭头）、错误不可伪造（独特的bug截图）、判断不可模拟（决策树）\n- **旁白**：127条决策有三个不可复制性。时间不可逆——先踩这个坑后踩那个的路径只有你真的走过。错误不可伪造——真实的bug细节AI编不像。判断不可模拟——为什么选A不选B，当时的思考逻辑无法被训练。三者加在一起，是比任何单篇文章都强的信任资产。"},{"num":"17","wechat":"## 第17篇\n\nAI帮你写了151篇文章，然后呢？\n\n深海浪人鲸鱼 | 原创洞察 | 2026.06.23\n\n7天前我搭了个AI自动内容系统。目标：让AI自动赚钱。\n\n7天后：151篇内容，1篇发布，$0收入。\n\n151:1。这个数字教会我的东西，比我写过的任何一篇文章都多。\n\n产能从来不是问题\n\nAI写东西有多快？我用DeepSeek V4 Pro，每篇成本$0.008-0.05，7天151篇，日均21.5篇。\n\n如果你只是要\"内容\"，AI一天给你100篇。\n\n但然后呢？\n\n分发才是AI内容创业的真正瓶颈\n\n151篇文章躺在硬盘里。1篇发到了知乎。\n\n这不是技术问题——知乎编辑器API能打通。问题是：\n\n每发一篇文章，我需要做的不是\"粘贴\"，是：\n\n判断这篇质量够不够（需要读过原内容）\n\n检查数据是否过期（需要追踪信息源头）\n\n决定发表日期和节奏（需要策略判断）\n\n适配平台格式（知乎长文≠小红书短图文≠公众号深度）\n\n承担\"发出去\"的责任（署名的是我）\n\n这5步AI一步都做不了。\n\n\"一改五发\"是最大的谎言\n\n很多人说\"写一篇，改改发五个平台\"。\n\n实测：公众号需要至少1张正文图+封面+摘要+作者。小红书需要配图排版+话题标签+emoji语气。知乎需要话题+专栏+长文深度。\n\n\"一改五发\"的每一\"改\"，都是一次全新创作。\n\n\"内容库存陷阱\"\n\n这是一个恶性循环：AI日产20篇 → 库存膨胀 → 每篇都需要人工判断 → 判断积压 → 又产出更多内容 → 库存更大 → 更判断不过来。\n\nAI内容创业的敌人不是AI写不快，是写得越快死得越快。\n\n破局的唯一办法\n\n把\"发产比\"当成核心指标。不是\"产了多少\"，是\"产出来的有多少发出去了\"。\n\n我的建议：\n\n先做透一个平台，别想\"全平台分发\"\n\n把\"发布\"写进AI工作流（不是\"写完\"算完成，是\"发出\"算完成）\n\n诚实比完美重要（标注\"这事我没实测\"也比不标注好）\n\n市面上1000个工具教你\"写更多\"。\n\n>\n\n0个教你\"发更好\"。\n\n如果这篇文章对你有启发，欢迎 点赞、在看、转发。\n\n关注 深海浪人鲸鱼，获取更多 AI 时代的个体生存策略。","plain":"第17篇\n\nAI帮你写了151篇文章，然后呢？\n7天前我搭了个AI自动内容系统。目标：让AI自动赚钱。\n7天后：151篇内容，1篇发布，$0收入。\n151:1。这个数字教会我的东西，比我写过的任何一篇文章都多。\n产能从来不是问题\nAI写东西有多快？我用DeepSeek V4 Pro，每篇成本$0.008-0.05，7天151篇，日均21.5篇。\n如果你只是要\"内容\"，AI一天给你100篇。\n但然后呢？\n分发才是AI内容创业的真正瓶颈\n151篇文章躺在硬盘里。1篇发到了知乎。\n这不是技术问题——知乎编辑器API能打通。问题是：\n每发一篇文章，我需要做的不是\"粘贴\"，是：\n判断这篇质量够不够（需要读过原内容）\n检查数据是否过期（需要追踪信息源头）\n决定发表日期和节奏（需要策略判断）\n适配平台格式（知乎长文≠小红书短图文≠公众号深度）\n承担\"发出去\"的责任（署名的是我）\n这5步AI一步都做不了。\n\"一改五发\"是最大的谎言\n很多人说\"写一篇，改改发五个平台\"。\n实测：公众号需要至少1张正文图+封面+摘要+作者。小红书需要配图排版+话题标签+emoji语气。知乎需要话题+专栏+长文深度。\n\"一改五发\"的每一\"改\"，都是一次全新创作。\n\"内容库存陷阱\"\n这是一个恶性循环：AI日产20篇 → 库存膨胀 → 每篇都需要人工判断 → 判断积压 → 又产出更多内容 → 库存更大 → 更判断不过来。\nAI内容创业的敌人不是AI写不快，是写得越快死得越快。\n破局的唯一办法\n把\"发产比\"当成核心指标。不是\"产了多少\"，是\"产出来的有多少发出去了\"。\n我的建议：\n先做透一个平台，别想\"全平台分发\"\n把\"发布\"写进AI工作流（不是\"写完\"算完成，是\"发出\"算完成）\n诚实比完美重要（标注\"这事我没实测\"也比不标注好）\n市面上1000个工具教你\"写更多\"。\n\n0个教你\"发更好\"。","video":"## 第17篇：分发死亡循环\n\n**主题定位**：AI内容创业的真正瓶颈——分发而非生产  \n**视觉方向**：流水线/漏斗风格  \n**时长建议**：60-75秒\n\n### 场景1（0-12s）\n- **画面**：计数器——151篇（生产端）vs 1篇（分发端），剪刀差巨大\n- **旁白**：7天151篇内容，1篇发布。151比1。这个数字教会我的东西，比我写过的任何一篇文章都多。产能从来不是问题。分发才是。\n\n### 场景2（12-38s）\n- **画面**：五步发布流程展开——判断质量→检查数据→决定节奏→适配格式→承担责任。每一步旁边标注\"AI做不到\"\n- **旁白**：每发一篇文章需要五步。判断质量够不够。检查数据是否过期。决定发表日期和节奏。适配平台格式。承担发出去的责任。这五步，AI一步都做不了。\n\n### 场景3（38-55s）\n- **画面**：恶性循环动画——AI日产20篇→库存膨胀→每篇需人工判断→积压→产更多→库存更大\n- **旁白**：这就是内容库存陷阱。AI日产20篇，库存膨胀，每篇都需要人工判断，积压越来越多，又产出更多内容。写得越快，死得越快。\n\n### 场景4（55-65s）\n- **画面**：三条破局规则——先做一个平台、把发布写进工作流、诚实比完美重要\n- **旁白**：破局的唯一办法——把发产比当成核心指标。市面上1000个工具教你写更多，0个教你发更好。"},{"num":"18","wechat":"## 第18篇\n\nAI时代的\"写完就算\"幻觉\n\n深海浪人鲸鱼 · 2026-06-26\n\n我用AI写了151篇内容。\n\n发了5篇。\n\n发产比：30:1。\n\n这不是效率问题。这是自我欺骗。\n\n写完≠完成\n\n用AI写作有一种奇怪的快感——\n\n你给一个prompt，它吐出800字。你微调两段，又给一个prompt，又800字。不知不觉，一个小时过去了，你已经\"写完\"了三篇。\n\n大脑说：我在进步。\n\n文件系统说：你确实多了三个文件。\n\n世界说：谁看到了？\n\n这就是\"写完就算\"幻觉——用内部生产替代外部验证，用本地文件数替代真实影响力。\n\n写作=思考。但只有发布=完成思考。不发出去的写作，本质上是在跟自己说话——这不是思考，这是自我安慰。\n\n为什么\"不发\"的感觉这么好\n\n我认真想过这个问题。不发有四个隐藏收益：\n\n1. 保护ego。写了的文章存在本地——它既是\"我做了事\"的证据，又不会被人评判。它永远保持\"可能是好的\"状态。一旦发出去，它就变成了\"有人看了、有人评判了、有人忽略了\"——这个落差ego不愿意承受。\n\n2. 骗过焦虑。\"我在写作\"是缓解\"我该写作\"焦虑的最快方式。写完一篇=焦虑降一点。但焦虑降了≠问题解决了。真正的问题是\"有没有人看\"——这个AI写作触及不到，你也就假装不存在。\n\n3. 假装在迭代。每写一篇新文章，你都觉得\"这篇比上篇好\"。确实可能更好。但如果没人看到上一篇，你是在跟自己比——这个比较没有外部校准。你可以在本地写100篇，每一篇都比上一篇好1%，但第100篇还是0人阅读。\n\n4. 回避真正的瓶颈。对我而言，真正的瓶颈从来不是\"写不出来\"。是发布流程里那些AI帮不了的事——登录、扫码、格式适配、发出去那一刻的心理阻力。写新文章比发旧文章容易100倍，所以我就一直在写。\n\n151篇 vs 5篇——数据不会骗人\n\n我的系统跑了10天。151篇内容躺在本地文件系统里。\n\n知乎发了5篇——阅读量不高，但至少有数据了。\n\n公众号发了1篇——给一个525粉的老号，发出去了。\n\n剩下的145篇——存在。仅此而已。\n\n发产比30:1不是\"我写得太多了\"，是\"我发的太少了\"。\n\n更精确地说：写作和发布是两个完全不同的活动，它们用不同的肌肉。AI帮你练了写作肌肉，但发布肌肉只能自己练——没有AI能替你点那个\"发布\"按钮。\n\n为什么这个问题AI解决不了\n\nAI能写。AI能润色。AI能生成配图。AI能做SEO。\n\nAI不能做的事：承受\"发出去之后没人看\"的失落。\n\n这就是为什么\"写完就算\"是一个AI时代的特有现象——AI降低了写作成本到接近零，但发布的心理成本一点没降。成本差越大，幻觉越强。\n\nAI让\"写\"变成了\"说\"，但\"发\"还是\"跳\"——你得自己跳。\n\n我给自己定的规则\n\n认识到这个问题之后，我给自己定了三条规则：\n\n规则1：写完一篇，必须发一篇。不一定是刚写的那篇——但每写完一篇新文章，\"发一篇旧文章\"变成强制动作。发产比从30:1往1:1推。\n\n规则2：不发的原因只能有两个。①质量不达标（需要具体说明哪里不达标）。②时效未到（需要设定具体发布时间）。\"还没准备好\"不是原因——永远不会准备好。\n\n规则3：发布的定义是\"有人能看到\"。本地文件不算。草稿箱不算。\"我发给朋友看了\"不算——除非朋友不是你妈。\n\n如果你也在\"写完就算\"\n\n问自己三个问题：\n\n1. 你最近写的10篇内容，有几篇有人看到了？\n\n2. 你是因为\"写不出来\"而不发，还是因为\"发比写难\"而不发？\n\n3. 如果AI明天消失了，你还能发吗？（如果答案是\"不能\"——你依赖的不是AI，是\"写\"这个动作本身带来的虚假进展感）\n\n最诚实的答案往往是第二个：发比写难。\n\n承认这个，就已经比90%的AI写作者诚实了。剩下的10%——去发一篇。\n\n关于我：用AI搭了一套自动内容系统，跑了10天。151篇内容，5篇发布。这个发产比本身就是故事。公众号：深海浪人鲸鱼。","plain":"第18篇\n\nAI时代的\"写完就算\"幻觉\n我用AI写了151篇内容。\n发了5篇。\n发产比：30:1。\n这不是效率问题。这是自我欺骗。\n写完≠完成\n用AI写作有一种奇怪的快感——\n你给一个prompt，它吐出800字。你微调两段，又给一个prompt，又800字。不知不觉，一个小时过去了，你已经\"写完\"了三篇。\n大脑说：我在进步。\n文件系统说：你确实多了三个文件。\n世界说：谁看到了？\n这就是\"写完就算\"幻觉——用内部生产替代外部验证，用本地文件数替代真实影响力。\n写作=思考。但只有发布=完成思考。不发出去的写作，本质上是在跟自己说话——这不是思考，这是自我安慰。\n为什么\"不发\"的感觉这么好\n我认真想过这个问题。不发有四个隐藏收益：\n1. 保护ego。写了的文章存在本地——它既是\"我做了事\"的证据，又不会被人评判。它永远保持\"可能是好的\"状态。一旦发出去，它就变成了\"有人看了、有人评判了、有人忽略了\"——这个落差ego不愿意承受。\n2. 骗过焦虑。\"我在写作\"是缓解\"我该写作\"焦虑的最快方式。写完一篇=焦虑降一点。但焦虑降了≠问题解决了。真正的问题是\"有没有人看\"——这个AI写作触及不到，你也就假装不存在。\n3. 假装在迭代。每写一篇新文章，你都觉得\"这篇比上篇好\"。确实可能更好。但如果没人看到上一篇，你是在跟自己比——这个比较没有外部校准。你可以在本地写100篇，每一篇都比上一篇好1%，但第100篇还是0人阅读。\n4. 回避真正的瓶颈。对我而言，真正的瓶颈从来不是\"写不出来\"。是发布流程里那些AI帮不了的事——登录、扫码、格式适配、发出去那一刻的心理阻力。写新文章比发旧文章容易100倍，所以我就一直在写。\n151篇 vs 5篇——数据不会骗人\n我的系统跑了10天。151篇内容躺在本地文件系统里。\n知乎发了5篇——阅读量不高，但至少有数据了。\n公众号发了1篇——给一个525粉的老号，发出去了。\n剩下的145篇——存在。仅此而已。\n发产比30:1不是\"我写得太多了\"，是\"我发的太少了\"。\n更精确地说：写作和发布是两个完全不同的活动，它们用不同的肌肉。AI帮你练了写作肌肉，但发布肌肉只能自己练——没有AI能替你点那个\"发布\"按钮。\n为什么这个问题AI解决不了\nAI能写。AI能润色。AI能生成配图。AI能做SEO。\nAI不能做的事：承受\"发出去之后没人看\"的失落。\n这就是为什么\"写完就算\"是一个AI时代的特有现象——AI降低了写作成本到接近零，但发布的心理成本一点没降。成本差越大，幻觉越强。\nAI让\"写\"变成了\"说\"，但\"发\"还是\"跳\"——你得自己跳。\n我给自己定的规则\n认识到这个问题之后，我给自己定了三条规则：\n规则1：写完一篇，必须发一篇。不一定是刚写的那篇——但每写完一篇新文章，\"发一篇旧文章\"变成强制动作。发产比从30:1往1:1推。\n规则2：不发的原因只能有两个。①质量不达标（需要具体说明哪里不达标）。②时效未到（需要设定具体发布时间）。\"还没准备好\"不是原因——永远不会准备好。\n规则3：发布的定义是\"有人能看到\"。本地文件不算。草稿箱不算。\"我发给朋友看了\"不算——除非朋友不是你妈。\n如果你也在\"写完就算\"\n问自己三个问题：\n1. 你最近写的10篇内容，有几篇有人看到了？\n2. 你是因为\"写不出来\"而不发，还是因为\"发比写难\"而不发？\n3. 如果AI明天消失了，你还能发吗？（如果答案是\"不能\"——你依赖的不是AI，是\"写\"这个动作本身带来的虚假进展感）\n最诚实的答案往往是第二个：发比写难。\n承认这个，就已经比90%的AI写作者诚实了。剩下的10%——去发一篇。","video":"## 第18篇：写完就算幻觉\n\n**主题定位**：AI时代最大的自我欺骗——写了≠发了  \n**视觉方向**：内心独白/反思风格  \n**时长建议**：60-75秒\n\n### 场景1（0-12s）\n- **画面**：151篇→5篇发布→30:1发产比\n- **旁白**：我用AI写了151篇内容。发了5篇。发产比30比1。这不是效率问题。这是自我欺骗。\n\n### 场景2（12-35s）\n- **画面**：四个\"不发\"的心理防御机制逐一揭示\n- **旁白**：写完不等于完成。用AI写作有一种奇怪的快感——给一个prompt，它吐出800字。不知不觉，一个小时写完了三篇。大脑说\"我在进步\"，文件系统说\"你多了三个文件\"，但世界问\"谁看到了？\"这就是写完就算幻觉——用内部生产替代外部验证。\n\n### 场景3（35-55s）\n- **画面**：四个隐藏收益——保护ego（盾牌）、骗过焦虑（面具）、假装迭代（循环箭头）、回避瓶颈（绕路）\n- **旁白**：为什么不发的感觉这么好？四个隐藏收益。保护ego——不发就不会被评判。骗过焦虑——写作缓解了\"我该写作\"的焦虑，但焦虑降了不等于问题解决了。假装迭代——每篇都比上一篇好，但没人看到上一版。回避真正的瓶颈——写新文章比发旧文章容易100倍。\n\n### 场景4（55-70s）\n- **画面**：三条规则以打字机效果浮现\n- **旁白**：我给自己定了三条规则。规则一，写完一篇必须发一篇。规则二，不发的原因只能有两个——质量不达标需要具体说明哪里不达标，或者时效未到需要设定发布时间。规则三，发布的定义是\"有人能看到\"——本地文件不算，草稿箱不算。AI降低了写作成本到接近零，但发布的心理成本一点没降。AI让写变成了说，但发还是跳——你得自己跳。"},{"num":"19","wechat":"## 第19篇\n\nVibe Coding叙事周期：从狂热到幻灭只用了3个月\n\n深海浪人鲸鱼 · 2026-06-26\n\n2026年3月，Vibe Coding是\"未来\"。\n\n2026年6月，Vibe Coding是\"问题\"。\n\n三个月。一个完整的技术炒作周期被压缩到了四分之一。\n\n5100分的热帖，没有一个在说\"好\"\n\n6月25日的Hacker News首页，五篇文章霸榜：\n\n标题  分数  评论  \n\nAfter two years of vibecoding, I'm back to writing by hand  865  634  \n\nVibe coding and agentic engineering are getting closer than I'd like  787  885  \n\nThe cult of vibe coding is dogfooding run amok  616  512  \n\nBreaking the spell of vibe coding  434  348  \n\nWill vibe coding end like the maker movement?  405  439  \n\n合计3107分，2818条评论。不是零星的质疑——是系统性的反思潮。\n\n同一个概念，三个月前被捧为\"编程民主化\"，三个月后被批为\"教条式自嗨\"。发生了什么？\n\n技术炒作的标准剧本——但加速了8倍\n\nGartner技术成熟度曲线告诉你：任何新技术都会经历\"膨胀期待→幻灭低谷→稳步爬升\"。正常周期是2-3年。\n\nVibe Coding走了多少？3个月。\n\n加速原因很简单：\n\n1. AI发展速度碾压了反思速度。你还没来得及评估GPT-4的vibe coding效果，Claude 4、Gemini 2.5、GPT-5已经迭代了三轮。工具在变，评价标准来不及跟上。\n\n2. 社交媒体的反馈循环太快。一篇\"我用vibe coding搭了个SaaS\"的推文一周内被转发5000次。三个月后，同一批人在写\"vibe coding让我丢了客户\"。传播速度=反思速度。\n\n3. 生产者和消费者是同一批人。不像电动车（你开别人的车）、云计算（你买别人的服务），vibe coding的体验者=实践者。每个人都在亲身踩坑，踩完立刻发帖。\n\n正常技术周期里，\"早期狂热者\"和\"幻灭批评者\"是两拨人。在AI时代，他们是同一拨人——先狂热，三个月后自己打自己脸。\n\n五个热帖分别说了什么\n\n1. \"回到手写\"（865分）——一个用了两年vibe coding的开发者，最终回到手动写代码。他的核心论点不是\"AI生成的代码有bug\"，而是\"我不再理解我自己的代码库了\"。这是比质量更根本的问题。\n\n2. Simon Willison的警告（787分）——他不是一个vibe coding反对者。他是AI工具的早期采用者和倡导者。他的担忧更微妙：vibe coding和agentic engineering的边界正在模糊，而\"模糊\"意味着责任归属不清——代码出了问题，怪AI还是怪用AI的人？\n\n3. Bram Cohen的\"教条\"论（616分）——BitTorrent发明者的批评最尖锐。他的核心论点：vibe coding变成了一个\"教条\"——你不敢说它不好，因为你怕被认为\"不懂AI\"。\"dogfooding run amok\"——吃自己的狗粮吃到失控。\n\n4. fast.ai的\"破咒\"（434分）——来自教育视角。他们担心的是：如果初学者只学vibe coding不学基础，他们永远不知道AI生成的代码为什么对/为什么错。这是在培养\"咒语师\"不是\"工程师\"。\n\n5. \"像maker movement一样终结吗？\"（405分）——历史的类比。Maker movement（创客运动）曾经也是\"民主化制造\"的承诺，最终变成了3D打印机爱好者和Arduino套件的利基市场。提问者暗示：vibe coding可能走同样的路——热一阵，然后缩回小圈子。\n\n叙事周期的三个阶段\n\n我把这三个月拆成了三个阶段：\n\n阶段1：民主化叙事（3月-4月）\n\n\"任何人都能写代码了\"、\"编程的门槛消失了\"、\"未来属于prompt工程师\"。核心情绪：兴奋+可能。所有人都觉得自己可以搭一个SaaS。\n\n阶段2：实用主义调和（5月）\n\n\"vibe coding适合原型不适合生产\"、\"人机分工线\"、\"Agent辅助但不是替代\"。核心情绪：务实+分化。开始区分\"能用vibe coding做什么\"和\"不能做什么\"。\n\n阶段3：系统性质疑（6月）\n\n\"我不理解自己的代码了\"、\"这是在培养咒语师\"、\"教条式自嗨\"。核心情绪：反思+边界感。不是在说\"vibe coding不好\"，是在说\"我们需要定义它的边界\"。\n\n三个阶段合在一起，是一条完整的\"狂热→幻灭→务实\"曲线——只是被AI的发展速度压缩到了不可思议的3个月。\n\n这个周期告诉我们的三件事\n\n1. 压缩的周期不改变周期的形状。加速了8倍，但膨胀→幻灭→爬升的曲线形状没变。这意味你可以用正常周期的经验来预判AI周期的下一步：幻灭之后不是消亡，是\"找到真正有用的场景\"。\n\n2. 同一批人的\"打脸\"是健康的。先狂热后幻灭的不是\"墙头草\"——他们是真正在实践的人。三个月前的\"这是未来\"和三个月后的\"这是问题\"可以同时成立——取决于你在哪个阶段、遇到了什么问题。\n\n3. 边界定义是成熟的标志。从\"什么都能做\"到\"这些不能做/不该做\"——这不是倒退，是成熟。任何一个技术从狂热走向实用，第一步就是画边界。Vibe Coding正在经历这一刻。\n\n下一步是什么\n\n如果历史规律成立，幻灭期不会持续太久。接下来会出现：\n\n→ 务实工具：不是\"全自动写代码\"，是\"在特定场景下AI辅助\"（比如Topos——专门审查AI生成代码质量的工具正在出现）\n\n→ 最佳实践：不是\"用AI替代写代码\"，是\"人机分工线\"的具体操作手册\n\n→ 教育适配：不是\"不要学编程了\"，是\"编程教育需要包含AI素养\"\n\nVibe Coding没有死。它只是从一个口号变成了一个问题——而\"变成一个问题\"是任何技术走向真正有用的第一步。\n\n关于我：4天追踪12个独立信号源，在中文互联网最早系统报道了Vibe Coding的叙事转向。公众号：深海浪人鲸鱼。","plain":"第19篇\n\nVibe Coding叙事周期：从狂热到幻灭只用了3个月\n2026年3月，Vibe Coding是\"未来\"。\n2026年6月，Vibe Coding是\"问题\"。\n三个月。一个完整的技术炒作周期被压缩到了四分之一。\n5100分的热帖，没有一个在说\"好\"\n6月25日的Hacker News首页，五篇文章霸榜：\n标题 分数 评论\nAfter two years of vibecoding, I'm back to writing by hand 865 634\nVibe coding and agentic engineering are getting closer than I'd like 787 885\nThe cult of vibe coding is dogfooding run amok 616 512\nBreaking the spell of vibe coding 434 348\nWill vibe coding end like the maker movement? 405 439\n合计3107分，2818条评论。不是零星的质疑——是系统性的反思潮。\n同一个概念，三个月前被捧为\"编程民主化\ 育适配：不是\"不要学编程了\"，是\"编程教育需要包含AI素养\"\nVibe Coding没有死。它只是从一个口号变成了一个问题——而\"变成一个问题\"是任何技术走向真正有用的第一步。","video":"## 第19篇：Vibe Coding叙事周期\n\n**主题定位**：从狂热到幻灭只用了3个月的技术周期分析  \n**视觉方向**：时间线/曲线图风格，Gartner曲线  \n**时长建议**：90-120秒\n\n### 场景1（0-15s）\n- **画面**：Hacker News首页，五篇文章依次弹出——865, 787, 616, 434, 405分\n- **旁白**：2026年3月，Vibe Coding是未来。2026年6月，Vibe Coding是问题。三个月，一个完整的技术炒作周期被压缩到了四分之一。5100分的热帖，没有一个在说好。\n\n### 场景2（15-40s）\n- **画面**：Gartner曲线动画——膨胀期待→幻灭低谷→稳步爬升。标注\"正常2-3年\"被压缩成\"3个月\"\n- **旁白**：正常的技术周期需要2到3年。Vibe Coding走了3个月。加速原因很简单。AI发展速度碾压了反思速度。社交媒体的反馈循环太快。生产者和消费者是同一批人——先狂热，三个月后自己打自己脸。\n\n### 场景3（40-65s）\n- **画面**：三个阶段依次亮起——民主化叙事（3-4月）→实用主义调和（5月）→系统性质疑（6月）\n- **旁白**：三个阶段。第一阶段民主化叙事——\"任何人都能写代码了\"。第二阶段实用主义调和——\"适合原型不适合生产\"。第三阶段系统性质疑——\"我不理解自己的代码了\"。三个阶段合在一起，是一条完整的狂热到幻灭到务实的曲线。\n\n### 场景4（65-85s）\n- **画面**：三句总结浮现\n- **旁白**：这个周期告诉我们三件事。第一，压缩的周期不改变周期的形状——幻灭之后不是消亡，是找到真正有用的场景。第二，同一批人的打脸是健康的——他们是真正在实践的人。第三，边界定义是成熟的标志——从什么都能做到这些不能做，不是倒退，是成熟。Vibe Coding没有死，它只是从一个口号变成了一个问题。而变成问题，是任何技术走向真正有用的第一步。"},{"num":"20","wechat":"## 第20篇\n\nAI记忆文件膨胀\n\n深海浪人鲸鱼 · 2026-06-26\n\n我给自己的助手搭了一套\"记忆系统\"。\n\n六月初，核心文件不到15KB。六月底，一个文件就过了70KB。\n\n我盯着那个数字看了半天，突然意识到一件事——\n\n我在设计AI记忆的时候，默认了一条从不被质疑的规则：全部记住。越多越好。\n\n一个奇怪的对比\n\n人类的记忆是默认遗忘的系统。你今天早餐吃了什么，一周后大概率不记得。两年前同事的名字，现在要想一会儿。\n\n这不是bug。这是进化花了几百万年调出来的feature。\n\n遗忘让你不被噪音淹没。遗忘让你只保留\"对生存有意义\"的信息。\n\n然后我们来了，给AI设计记忆系统。我们做了什么？\n\n我们把\"记住一切\"当成了默认。\n\n  人类记忆  AI记忆（当前默认设计）  \n\n策略  先忘，再挑重要的记  先全记，再考虑要不要删  \n\n结果  模糊但高信号  精确但高噪音  \n\n膨胀  不会  必然  \n\n给AI做\"全存\"记忆策略，就像让你记住每天每顿饭的每根菜——你确实拥有了完整数据，但你已经没脑子做任何决策了。\n\n我的68KB实验\n\n六月中，我给我的AI助手搭了一个\"操作系统\"文档。初始版本不到300行。\n\n两个星期后，它变成了1400多行。70KB。每天醒来要先读一遍。\n\n然后问题开始出现。\n\n第一周：OS.md从0到v1。清晰、干净。每个新增章节都有明确的理由。助手拿到任务就知道该怎么做。\n\n第二周：v1到v2.10。加入了芒格模型、人类史框架、心理学偏差库、审美体系。内容质量没下降——但检索效率下降了。助手看完整份OS需要越来越多的时间，在1400行里找到\"该用哪个框架\"变成了一个新的认知负担。\n\n第三周：v2.10到v2.22。新问题出现了——跨文件不一致。同一件事在A文件里写着\"已完成\"，在B文件里写着\"阻塞\"。不是写错了，是在不同时间编辑不同文件时引入了矛盾。\n\n我不得不写了一个自动检查脚本来抓这种错误。这个脚本本身又成了一个新文件。\n\n这就是记忆膨胀的三个阶段：增长→噪音→不一致。\n\n膨胀的隐藏成本\n\n很多人觉得\"多存一点没关系，反正存储便宜\"。\n\n存储是便宜的。但检索不是。\n\nAI助手读到一条新信息时，要判断\"这条跟已有记忆中的哪条相关？\" 如果记忆里有500条经验，O(n)搜索还不算慢。如果有5000条呢？50000条呢？\n\n更致命的是——不相关的记忆比没有记忆更糟糕。\n\n一条\"某人2023年随口说的偏好\"被当成\"当前有效约束\"，产生的错误比\"没有这条信息\"大得多。\n\n成本类型  表现  不容易被发现的原因  \n\n检索延迟  助手响应变慢  每次慢一点点，累积效应  \n\n信号稀释  关键信息被噪音淹没  不是\"看不到\"，是\"看到了但没注意到它是重要的\"  \n\n过时信号  旧偏好覆盖新需求  不知道\"这条已经过期了\"所以无法主动纠正  \n\n不一致  不同文件说不同的事  每次读一个文件时它本身是自洽的  \n\n记忆系统的成本不是你存了多少字节——是你每次查询时，要在多少字节里找到对的那几条。\n\n人类是怎么做的——以及为什么我们不模仿\n\n人类记忆有三层过滤：\n\n1. 遗忘曲线：艾宾浩斯发现，一小时后就忘掉56%。一天后忘掉66%。这是天然的信息压缩——不重要的事情自然脱落。\n\n2. 睡眠整合：睡眠不只是休息。在REM阶段，大脑在重放白天的经历，把重要的强化，不重要的丢弃。这是夜间的\"信息审计\"。\n\n3. 提取强化：被反复想起的事情被强化。想不起的事情自然消亡。\"用进废退\"的信息管理。\n\n而AI记忆呢？\n\n没有遗忘、不睡觉、所有内容同等对待。\n\n如果人类大脑这样运作——记住每一个像素、每一个声音、每一个无关路人的脸——你连穿过一条街都做不到。你的大脑会被噪音烧穿。\n\n一个方向：记忆需要\"代谢\"\n\n我不认为AI应该完全模仿人类记忆——我们不需要\"忘记\"关键事实。但我认为AI记忆系统需要一个人类记忆从来不缺的东西：新陈代谢。\n\n新东西进来 → 旧东西该出去的就出去。\n\n不是\"全存\"，不是\"全忘\"。是：\n\n1. 衰减权重：每条记忆都有\"新鲜度\"。三个月没被引用的经验，权重自动降低。不是删除，是\"不太可能跟当前相关\"。\n\n2. 定期整理：不是等到出错才修。是定期扫描——\"这条信息还成立吗？跟其他信息矛盾吗？\"\n\n3. 教训压缩：五条相似的经验 → 压缩成一条\"模式\"。不是失去信息，是提高信号密度。\n\nAI记忆不需要遗忘——需要代谢。进来的东西要有出路。存了不用的东西，不是资产，是负债。\n\n至于我自己的系统——那个68KB的OS文档——我还没删减它。但至少，我现在知道每次往里加新东西时，问的不只是\"这个对吗\"，还有一句：\n\n\"这个，值不值得被记住？\"\n\n标签：#AI系统设计 #记忆膨胀 #AI助手 #系统思考\n\n题材：L3·模式识别 · 原创分析 · 第一手数据","plain":"第20篇\n\nAI记忆文件膨胀\n我给自己的助手搭了一套\"记忆系统\"。\n六月初，核心文件不到15KB。六月底，一个文件就过了70KB。\n我盯着那个数字看了半天，突然意识到一件事——\n我在设计AI记忆的时候，默认了一条从不被质疑的规则：全部记住。越多越好。\n一个奇怪的对比\n人类的记忆是默认遗忘的系统。你今天早餐吃了什么，一周后大概率不记得。两年前同事的名字，现在要想一会儿。\n这不是bug。这是进化花了几百万年调出来的feature。\n遗忘让你不被噪音淹没。遗忘让你只保留\"对生存有意义\"的信息。\n然后我们来了，给AI设计记忆系统。我们做了什么？\n我们把\"记住一切\"当成了默认。\n人类记忆 AI记忆（当前默认设计）\n策略 先忘，再挑重要的记 先全记，再考虑要不要删\n结果 模糊但高信号 精确但高噪音\n膨胀 不会 必然\n给AI做\"全存\"记忆策略，就像让你记住每天每顿饭的每根菜——你确实拥有了完整数据，但你已经没脑子做任何决策了。\n我的68KB实验\n六月中，我给我的AI助手搭了一个\"操作系统\"文档。初始版本不到300行。\n两个星期后，它变成了1400多行。70KB。每天醒来要先读一遍。\n然后问题开始出现。\n第一周：OS.md从0到v1。清晰、干净。每个新增章节都有明确的理由。助手拿到任务就知道该怎么做。\n第二周：v1到v2.10。加入了芒格模型、人类史框架、心理学偏差库、审美体系。内容质量没下降——但检索效率下降了。助手看完整份OS需要越来越多的时间，在1400行里找到\"该用哪个框架\"变成了一个新的认知负担。\n第三周：v2.10到v2.22。新问题出现了——跨文件不一致。同一件事在A文件里写着\"已完成\"，在B文件里写着\"阻塞\"。不是写错了，是在不同时间编辑不同文件时引入了矛盾。\n我不得不写了一个自动检查脚本来抓这种错误。这个脚本本身又成了一个新文件。\n这就是记忆膨胀的三个阶段：增长→噪音→不一致。\n膨胀的隐藏成本\n很多人觉得\"多存一点没关系，反正存储便宜\"。\n存储是便宜的。但检索不是。\nAI助手读到一条新信息时，要判断\"这条跟已有记忆中的哪条相关？\" 如果记忆里有500条经验，O(n)搜索还不算慢。如果有5000条呢？50000条呢？\n更致命的是——不相关的记忆比没有记忆更糟糕。\n一条\"某人2023年随口说的偏好\"被当成\"当前有效约束\"，产生的错误比\"没有这条信息\"大得多。\n成本类型 表现 不容易被发现的原因\n检索延迟 助手响应变慢 每次慢一点点，累积效应\n信号稀释 关键信息被噪音淹没 不是\"看不到\"，是\"看到了但没注意到它是重要的\"\n过时信号 旧偏好覆盖新需求 不知道\"这条已经过期了\"所以无法主动纠正\n不一致 不同文件说不同的事 每次读一个文件时它本身是自洽的\n记忆系统的成本不是你存了多少字节——是你每次查询时，要在多少字节里找到对的那几条。\n人类是怎么做的——以及为什么我们不模仿\n人类记忆有三层过滤：\n1. 遗忘曲线：艾宾浩斯发现，一小时后就忘掉56%。一天后忘掉66%。这是天然的信息压缩——不重要的事情自然脱落。\n2. 睡眠整合：睡眠不只是休息。在REM阶段，大脑在重放白天的经历，把重要的强化，不重要的丢弃。这是夜间的\"信息审计\"。\n3. 提取强化：被反复想起的事情被强化。想不起的事情自然消亡。\"用进废退\"的信息管理。\n而AI记忆呢？\n没有遗忘、不睡觉、所有内容同等对待。\n如果人类大脑这样运作——记住每一个像素、每一个声音、每一个无关路人的脸——你连穿过一条街都做不到。你的大脑会被噪音烧穿。\n一个方向：记忆需要\"代谢\"\n我不认为AI应该完全模仿人类记忆——我们不需要\"忘记\"关键事实。但我认为AI记忆系统需要一个人类记忆从来不缺的东西：新陈代谢。\n新东西进来 → 旧东西该出去的就出去。\n不是\"全存\"，不是\"全忘\"。是：\n1. 衰减权重：每条记忆都有\"新鲜度\"。三个月没被引用的经验，权重自动降低。不是删除，是\"不太可能跟当前相关\"。\n2. 定期整理：不是等到出错才修。是定期扫描——\"这条信息还成立吗？跟其他信息矛盾吗？\"\n3. 教训压缩：五条相似的经验 → 压缩成一条\"模式\"。不是失去信息，是提高信号密度。\nAI记忆不需要遗忘——需要代谢。进来的东西要有出路。存了不用的东西，不是资产，是负债。\n至于我自己的系统——那个68KB的OS文档——我还没删减它。但至少，我现在知道每次往里加新东西时，问的不只是\"这个对吗\"，还有一句：\n\"这个，值不值得被记住？\"","video":"## 第20篇：AI记忆膨胀\n\n**主题定位**：AI记忆系统的设计缺陷——全记住是bug不是feature  \n**视觉方向**：对比/文件膨胀风格  \n**时长建议**：60-75秒\n\n### 场景1（0-12s）\n- **画面**：文件大小对比——6月初15KB，6月底70KB+\n- **旁白**：我给助手搭了一套记忆系统。六月初核心文件不到15KB。六月底一个文件就过了70KB。我突然意识到——我们在设计AI记忆的时候，默认了一条从不被质疑的规则：全部记住，越多越好。\n\n### 场景2（12-35s）\n- **画面**：左右对比——人类记忆（先忘再挑重要记→模糊但高信号）vs AI记忆（先全记再考虑删→精确但高噪音）\n- **旁白**：人类记忆是默认遗忘的系统。你今天早餐吃了什么，一周后大概率不记得。这不是bug，这是进化花了几百万年调出来的feature。遗忘让你不被噪音淹没。然后我们给AI设计记忆系统时，把记住一切当成了默认。\n\n### 场景3（35-55s）\n- **画面**：膨胀三阶段——增长→噪音→不一致。不一致导致跨文件矛盾\n- **旁白**：记忆膨胀分三个阶段。增长阶段，每个新增都有理由。噪音阶段，检索效率下降，在1400行里找到该用哪个框架变成新的认知负担。不一致阶段，同一件事在A文件里写着已完成，在B文件里写着阻塞。我不得不写了一个自动检查脚本来抓这种错误——这个脚本本身又成了新文件。\n\n### 场景4（55-70s）\n- **画面**：三个代谢策略——衰减权重、定期整理、教训压缩\n- **旁白**：AI记忆不需要遗忘，但需要代谢。进来的东西要有出路。衰减权重——三个月没被引用的经验自动降低权重。定期整理——这条信息还成立吗，跟其他信息矛盾吗。教训压缩——五条相似经验压缩成一条模式。存了不用的东西，不是资产，是负债。"},{"num":"21","wechat":"## 第21篇\n\n为什么AI写的内容\"太顺了\"反而是问题\n\n深海浪人鲸鱼 · 2026-06-26\n\n我最近发了一篇公众号文章。\n\n发之前读了五遍，每一遍都觉得流畅、清晰、没有废话。直到一个人看完说：\n\n\"写得挺好的。就是哪哪都挺好的。\"\n\n我愣了几秒。然后意识到他说的是什么。\n\n这篇文章有一个问题——它没有任何地方\"不太好\"。\n\n均匀的流畅=没有人在写\n\n人类的写作有一个特征，我们在AI出现之前从未注意过：不均匀。\n\n打开任何一个你喜欢的作者的文章。仔细看——\n\n有一段特别精彩，有一段有点啰嗦，有一段跳跃太快你得多读一遍，有一段感觉作者写到一半去倒了杯水回来话题就转了。\n\n这就是人写的。\n\nAI写的呢？\n\n每一段都差不多长。每一句都语法正确。每一处的信息密度均匀分布。从头到尾没有卡顿、没有跳跃、没有那种\"这段写high了所以多写了两百字\"的不规则。\n\nAI的\"完美流畅\"恰恰暴露了它不是人——因为人不可能写得这么均匀。\n\n识别AI写作的最简单方法不是找错误。是找\"找不到错误但你也不记得任何具体段落\"的那种感觉。\n\n不均匀是人的签名\n\n想一想你记忆里最好的那些文字——\n\n村上春树的某个比喻让你停了三秒。王小波的一段讽刺让你笑了又觉得心酸。一个朋友写的朋友圈只有三句话但你反复读了两遍。\n\n这些都不是\"均匀的\"。它们都有高点和低点。\n\n高点让你记住。低点让高点显得更高。\n\nAI的均匀输出，就像一个没有山峰和山谷的地形——你可以在上面走很久，但没有任何地方让你想停下来看。\n\n我在做审美体系的时候，总结了一个词叫\"肌理\"——东西上留下的\"发生过\"的痕迹。\n\n真皮的纹理不均匀，所以值钱。做旧的牛仔裤褪色不规则，所以有风格。手工陶器的釉色有流痕，所以有人味。\n\nAI生成的东西呢？它的\"肌理\"是假的——每一个不完美都均匀分布。就像人造革用机器压出来的纹理，每一个\"皮孔\"都在正确的位置。\n\n你一眼就知道是假的。不是因为它不够真。是因为它太完美了。\n\n如何让AI写作\"不那么顺\"\n\n我尝试了几件事，效果显著：\n\n1. 刻意插入个人数据。\n\n\"我用了三天搭这个系统\"变成了\"我用了三天。第一天搭了框架发现方向错了。第二天推倒重来。第三天下午3点终于跑通了——然后发现发布按钮需要管理员扫码。\"\n\n具体的不规则=人的痕迹。\n\n2. 允许不通顺。\n\n人说话会卡顿。写作也会。\"这个方案有三个问题。第一个……等一下，其实不是三个，是两个半。第三个严格来说不算问题。\"\n\n这种\"自己修正自己\"的痕迹，AI默认做不到——它的默认是\"一次给出整洁答案\"。\n\n3. 在关键位置用力、在非关键位置放松。\n\nAI的默认是\"所有位置同等用力\"。但人类写作的美感来自于能量的不均匀分配——高潮部分多花笔墨，过渡部分一句话带过。这不叫\"不认真\"，这叫\"知道重点在哪\"。\n\n4. 留一个问题不回答。\n\nAI的默认是\"回答所有隐含的问题\"。但最好的文章往往在结尾留一个未被完全解答的疑问。不是故弄玄虚——是真的有些事情你还没想清楚，把那个\"还没想清楚\"写出来。\n\nAI写作的上限不是让它写得更顺——是学会让它在正确的位置\"不顺\"。\n\n不是反AI，是反\"AI味\"\n\n我不是说\"别用AI写作\"。\n\n我用AI写了20篇公众号文章，其中有些我自己重读都分不清哪些段落是AI写的哪些是我改的。\n\n关键不是用不用AI——是你能不能识别出AI的\"均匀化倾向\"，并主动在需要的位置打破它。\n\n下次你发现自己的AI文章\"读起来什么都好但什么都不记得\"，别再加内容了。\n\n删一段。留一段不通顺的。放一个没完整回答的问题。\n\n人类写作的美感不在完美，在\"不完美的分布\"中。\n\n而这恰恰是——目前——AI还没有学会的东西。\n\n标签：#AI写作 #内容创作 #反直觉洞察 #审美\n\n题材：L5·反直觉洞察 · 基于公众号发布复盘+审美体系研究","plain":"第21篇\n\n为什么AI写的内容\"太顺了\"反而是问题\n我最近发了一篇公众号文章。\n发之前读了五遍，每一遍都觉得流畅、清晰、没有废话。直到一个人看完说：\n\"写得挺好的。就是哪哪都挺好的。\"\n我愣了几秒。然后意识到他说的是什么。\n这篇文章有一个问题——它没有任何地方\"不太好\"。\n均匀的流畅=没有人在写\n人类的写作有一个特征，我们在AI出现之前从未注意过：不均匀。\n打开任何一个你喜欢的作者的文章。仔细看——\n有一 感不在完美，在不完美的分布中\"\n- **旁白**：关键不是用不用AI写作。是你能不能识别出AI的均匀化倾向，并主动在需要的位置打破它。删一段。留一段不通顺的。放一个没完整回答的问题。人类写作的美感不在完美，在不完美的分布中。而这恰恰是目前AI还没有学会的东西。"},{"num":"22","wechat":"## 第22篇\n\n我让AI搭了个发布系统——然后发现真正瓶颈不是AI\n\n深海浪人鲸鱼 · 2026-06-26\n\n我花了8天，让AI帮我搭了一个内容发布系统。\n\nAI写了爬虫、内容生成器、质量检查器、发布面板、SEO优化器、31页自建站、21篇排版好的文章。\n\n然后我坐在电脑前，准备把这些文章发到公众号上。\n\n然后我发现——最难的5个问题，没有一个跟AI有关。\n\n问题1：复制粘贴\n\n我的21篇文章都是HTML，在浏览器里打开、全选、复制、粘贴到公众号编辑器。\n\n听起来简单。但实际上：\n\n第一篇文章粘贴后格式乱了——公众号编辑器对某些CSS的支持不一致。第二篇文章的图片太大，粘贴后卡了30秒。第三篇文章有代码块，粘贴后缩进全没了。\n\n不是不能解决——是每篇都要单独处理。\n\nAI可以生成100篇文章，但我还是要一篇一篇地Ctrl+C、Ctrl+V。\n\nAI的内容生产速度是无限的。人的分发速度是有限的。瓶颈永远在分发端。\n\n问题2：管理员扫码\n\n公众号发文章需要管理员微信扫码确认。\n\n我是管理员。意思是：每发一篇，我要掏出手机、打开微信、扫电脑上的码、点确认。发21篇=扫21次。\n\nAI帮不了这个。没有任何API可以绕过这个扫码——这是微信的设计。\n\n我甚至想过用自动化工具模拟点击。然后意识到：如果我为了绕过扫码而去研究微信协议，我已经完全偏离了\"用AI做内容\"这个初衷——我在解决一个本不该是我的问题的社交媒体产品设计问题。\n\n问题3：平台格式适配\n\n公众号的编辑器不是标准的。它不支持很多HTML标签。它有自己的图片上传逻辑。它的段落间距规则跟浏览器不一样。\n\n我的文章在浏览器里完美——粘贴到公众号编辑器里就变形。\n\n调了5篇之后我发现：\n\n适配公众号格式，跟\"写一篇好文章\"，是完全不同的两件事。前者需要理解一个封闭系统的内部规则。后者需要思考、洞察、表达。\n\nAI擅长后者。但前者——没有人告诉你规则是什么，你只能一篇一篇地试。\n\n问题4：一致性焦虑\n\n20篇文章，如果有一篇的格式跟其他篇不一样，读者会有感觉。\n\n我建了一个checklist——每篇检查：标题格式、段落间距、代码块样式、加粗规则、meta信息。\n\n这个checklist我写了5分钟。但每篇文章检查它，要花3分钟。20篇=1小时。\n\n这不是AI能自动化的——因为\"格式是否一致\"是一个视觉判断。\"这个间距看起来对吗？\"需要人眼看。\n\n问题5：什么时候停？\n\n这是最意外的问题。\n\nAI每天都在产出新内容——侦察→选题→生成→排版。这个流水线可以永远跑下去。\n\n但发布端跟不上。我一天能发的数量是有限的。\n\n结果：库存积压。\n\n21篇文章在队列里等着，而AI还在继续生成第22篇、第23篇。这是生产-分发剪刀差——生产端的效率100倍于分发端，形成的不是效率优势，是库存焦虑。\n\n当AI的生产力变成你待办清单上的未读数字时，它就不是工具了——是焦虑来源。\n\n真正的瓶颈是什么\n\n总结这5个问题：\n\n1. 复制粘贴 — 纯体力，AI无法替代\n\n2. 管理员扫码 — 平台设计，AI无权绕过\n\n3. 平台格式适配 — 隐性知识，需要人工试错\n\n4. 一致性检查 — 视觉判断，需要人眼\n\n5. 发布节奏 — 人的决策，不是算法决策\n\n没有一个跟AI能力有关。每一个都是人的环节。\n\n这让我重新理解了\"AI替代人类工作\"这件事——\n\nAI替代的是\"生产\"环节。但\"生产\"并不是工作中最难的部分。最难的部分是那些嵌在平台里、流程里、人际互动里的\"人的环节\"——而这些，AI碰不到。\n\n教训：设计系统前先画瓶颈图\n\n如果我重来一次，我会在搭系统之前先做一件事：\n\n走一遍完整的发布流程。亲手走。记下每一步的摩擦。\n\n不是坐在那想\"AI能不能做这个\"——是实际做一遍，然后标出：\n\n🟢 AI能做的：选题、写作、排版、SEO\n\n🟡 AI能做但需要人盯的：质量检查、内容去重\n\n🔴 AI不能碰的：扫码、粘贴、视觉一致性\n\n然后——只在🟢区域投入AI开发资源。在🔴区域接受现实，用手工。\n\n我花了太多时间让AI优化🟢区域（它本来就很强了），却没注意到🔴区域才是真正的天花板。\n\n下次你准备让AI搭一个系统，先问的不是\"AI能做什么\"——是\"AI做不了的那一步是什么？\"\n\n至于我——那21篇还在排队。AI刚刚生成了第22篇。\n\n我得去扫码了。\n\n标签：#AI系统设计 #内容创作 #生产力 #反直觉洞察\n\n题材：L4·原创框架 · 基于8天21篇真实系统搭建经验","plain":"第22篇\n\n我让AI搭了个发布系统——然后发现真正瓶颈不是AI\n我花了8天，让AI帮我搭了一个内容发布系统。\nAI写了爬虫、内容生成器、质量检查器、发布面板、SEO优化器、31页自建站、21篇排版好的文章。\n然后我坐在电脑前，准备把这些文章发到公众号上。\n然后我发现——最难的5个问题，没有一个跟AI有关。\n问题1：复制粘贴\n我的21篇文章都是HTML，在浏览器里打开、全选、复制、粘贴到公众号编辑器。\n听起来简单。但实际上：\n第一篇文章粘贴后格式乱了——公众号编辑器对某些CSS的支持不一致。第二篇文章的图片太大，粘贴后卡了30秒。第三篇文章有代码块，粘贴后缩进全没了。\n不是不能解决——是每篇都要单独处理。\nAI可以生成100篇文章，但我还是要一篇一篇地Ctrl+C、Ctrl+V。\nAI的内容生产速度是无限的。人的分发速度是有限的。瓶颈永远在分发端。\n问题2：管理员扫码\n公众号发文章需要管理员微信扫码确认。\n我是管理员。意思是：每发一篇，我要掏出手机、打开微信、扫电脑上的码、点确认。发21篇=扫21次。\nAI帮不了这个。没有任何API可以绕过这个扫码——这是微信的设计。\n我甚至想过用自动化工具模拟点击。然后意识到：如果我为了绕过扫码而去研究微信协议，我已经完全偏离了\"用AI做内容\"这个初衷——我在解决一个本不该是我的问题的社交媒体产品设计问题。\n问题3：平台格式适配\n公众号的编辑器不是标准的。它不支持很多HTML标签。它有自己的图片上传逻辑。它的段落间距规则跟浏览器不一样。\n我的文章在浏览器里完美——粘贴到公众号编辑器里就变形。\n调了5篇之后我发现：\n适配公众号格式，跟\"写一篇好文章\"，是完全不同的两件事。前者需要理解一个封闭系统的内部规则。后者需要思考、洞察、表达。\nAI擅长后者。但前者——没有人告诉你规则是什么，你只能一篇一篇地试。\n问题4：一致性焦虑\n20篇文章，如果有一篇的格式跟其他篇不一样，读者会有感觉。\n我建了一个checklist——每篇检查：标题格式、段落间距、代码块样式、加粗规则、meta信息。\n这个checklist我写了5分钟。但每篇文章检查它，要花3分钟。20篇=1小时。\n这不是AI能自动化的——因为\"格式是否一致\"是一个视觉判断。\"这个间距看起来对吗？\"需要人眼看。\n问题5：什么时候停？\n这是最意外的问题。\nAI每天都在产出新内容——侦察→选题→生成→排版。这个流水线可以永远跑下去。\n但发布端跟不上。我一天能发的数量是有限的。\n结果：库存积压。\n21篇文章在队列里等着，而AI还在继续生成第22篇、第23篇。这是生产-分发剪刀差——生产端的效率100倍于分发端，形成的不是效率优势，是库存焦虑。\n当AI的生产力变成你待办清单上的未读数字时，它就不是工具了——是焦虑来源。\n真正的瓶颈是什么\n总结这5个问题：\n1. 复制粘贴 — 纯体力，AI无法替代\n2. 管理员扫码 — 平台设计，AI无权绕过\n3. 平台格式适配 — 隐性知识，需要人工试错\n4. 一致性检查 — 视觉判断，需要人眼\n5. 发布节奏 — 人的决策，不是算法决策\n没有一个跟AI能力有关。每一个都是人的环节。\n这让我重新理解了\"AI替代人类工作\"这件事——\nAI替代的是\"生产\"环节。但\"生产\"并不是工作中最难的部分。最难的部分是那些嵌在平台里、流程里、人际互动里的\"人的环节\"——而这些，AI碰不到。\n教训：设计系统前先画瓶颈图\n如果我重来一次，我会在搭系统之前先做一件事：\n走一遍完整的发布流程。亲手走。记下每一步的摩擦。\n不是坐在那想\"AI能不能做这个\"——是实际做一遍，然后标出：\n🟢 AI能做的：选题、写作、排版、SEO\n🟡 AI能做但需要人盯的：质量检查、内容去重\n🔴 AI不能碰的：扫码、粘贴、视觉一致性\n然后——只在🟢区域投入AI开发资源。在🔴区域接受现实，用手工。\n我花了太多时间让AI优化🟢区域（它本来就很强了），却没注意到🔴区域才是真正的天花板。\n下次你准备让AI搭一个系统，先问的不是\"AI能做什么\"——是\"AI做不了的那一步是什么？\"\n至于我——那21篇还在排队。AI刚刚生成了第22篇。\n我得去扫码了。","video":"## 第22篇：真正瓶颈不是AI\n\n**主题定位**：AI能写100篇但发布端跟不上的系统瓶颈分析  \n**视觉方向**：流水线/工程风格  \n**时长建议**：75-90秒\n\n### 场景1（0-15s）\n- **画面**：AI系统全景——爬虫、内容生成器、质量检查器、发布面板、SEO、31页网站、21篇文章一一亮起\n- **旁白**：我花了8天让AI搭了一个内容发布系统。AI写了爬虫、内容生成器、质量检查器、发布面板、SEO优化器、31页自建站、21篇排版好的文章。然后我坐在电脑前准备发布。然后我发现——最难的5个问题，没有一个跟AI有关。\n\n### 场景2（15-45s）\n- **画面**：五个问题依次呈现——复制粘贴→管理员扫码→平台格式适配→一致性检查→什么时候停\n- **旁白**：问题一，复制粘贴——21篇文章要一篇一篇Ctrl+C、Ctrl+V，每篇格式可能变形。问题二，管理员扫码——公众号每发一篇要管理员微信扫码，发21篇等于扫21次，AI没有任何API可以绕过。问题三，平台格式适配——浏览器里完美，粘贴到公众号编辑器就变形。问题四，一致性检查——20篇文章中有一篇格式跟其他不一样，读者会有感觉——这是视觉判断，AI做不了。问题五，什么时候停——AI每天产出新内容，但发布端跟不上。生产端的效率100倍于分发端，形成的不是效率优势，是库存焦虑。\n\n### 场景3（45-65s）\n- **画面**：三色标注——🟢AI能做（选题/写作/排版）、🟡AI能做需人盯（质检/去重）、🔴AI不能碰（扫码/粘贴/一致性）\n- **旁白**：真正的瓶颈是什么？没有一个跟AI能力有关。每一个都是人的环节。AI替代的是生产环节，但生产并不是工作中最难的部分。最难的是那些嵌在平台里、流程里的\"人的环节\"——AI碰不到。\n\n### 场景4（65-80s）\n- **画面**：回到发布面板——21篇排队中\n- **旁白**：如果我重来一次，会先走一遍完整的发布流程，标出AI能做什么、AI不能碰什么。我花了太多时间让AI优化它本来就很强的区域，却没注意到真正的天花板在哪里。至于那21篇——还在排队。AI刚刚生成了第22篇。我得去扫码了。"},{"num":"23","wechat":"## 第23篇\n\n893分，Hacker News炸了。一个阿里模型让全球程序员开始抢显卡\n\n昨天凌晨，Hacker News的首页被一条帖子统治了。\n\n893分。456条评论。\n\n不是OpenAI的新模型。不是Claude的升级版。是阿里通义千问的Qwen 3.6——一个可以在你笔记本上跑的27B模型。\n\n上一次中国AI模型在Hacker News拿到这个分数，还是DeepSeek R1。那一次，英伟达股价跌了17%。\n\n这一次更狠——因为它告诉你一个事实：你可能根本不需要为AI付费。\n\n\"它是我用过第一个不需要道歉的本地模型\"\n\n说这话的人叫Piotr Migdał，一个波兰程序员。他在Quesma的博客上写了一篇评测，标题就叫\"Qwen 3.6 is the sweet spot for local development\"。\n\n翻译成中文：Qwen 3.6就是本地AI开发的甜点。\n\n他过去对本地模型一直很失望。\"要么太蠢，要么太慢，要么两者都是。\"\n\n然后他装了Qwen 3.6 27B。\n\n\"我被震住了。\"\n\n他让模型写一首关于Zouk舞和量子物理的八行诗——模型不仅押韵正确，推理过程也完全合理。\n\n他让模型做一个六边形扫雷游戏——一句prompt，一次成功，完整的npm包。\n\n他让模型做一个会议调度器——几分钟跑出一个功能完整的React应用。\n\n\"按照当前顶级模型的标准来看，这不算什么。但关键是——它是一个能在消费级硬件上跑的本地模型。\"\n\n跑在你电脑上，免费，不限量\n\n这里有一个数字你需要知道：\n\n50 tok/s。\n\n这是Qwen 3.6 27B在一张RTX 5090上的推理速度。和GPT-5.5的API速度差不多。\n\n但GPT-5.5的价格是每100万token输入$1.25，输出$10。\n\nQwen 3.6跑在本地的价格是：$0。\n\n不限次数。不限时长。不限用途。你的数据不离开你的电脑。\n\n再看另一个配置：Macbook Max M5，128GB内存。\n\n  Qwen 3.6 27B 8-bit量化：32 tok/s，占用42GB内存\n\n  Qwen 3.6 35B MoE版本：105 tok/s，占用45GB内存\n\n35B版本快3倍，但27B版本更聪明。Piotr的选择是27B——\"我宁愿生成三分之一数量的代码，但质量更高。\"\n\n你不需要128GB的Macbook。一张二手的RTX 3090（$600），配上Q4量化，就能跑。一个叫gfosco的Hacker News用户实测：\n\n\"我今天在5090上设置了Q6_K量化和Q4_0 KV，在123k上下文下稳定跑50 tok/s，用了28/32GB显存。\"\n\n\"No excuses anymore\"\n\n这是Hacker News评论区被点赞最多的一句话。\n\n翻译：没有借口了。\n\n什么意思？\n\n一年前，本地AI还需要道歉。\"它不够聪明\"\"它不能处理复杂任务\"\"它只是个玩具\"。\n\n现在，Qwen 3.6 27B在多个基准测试中接近甚至超过了一些商业API模型。它能写代码、能推理、能创作。它不是你\"凑合用\"的替代品——在很多场景下，它就是正确答案。\n\nSimon Willison——那个用\"企鹅骑自行车\"测试每个新模型的人——对它印象深刻。他专门写了两篇博客来讨论Qwen 3.6。\n\n另一个Hacker News评论说：\"It punches above its weight.\" 重量级选手里最轻的，轻量级选手里最能打的。\n\n这对你意味着什么？\n\n如果你只是普通用户：现阶段你不需要做任何事。Claude和GPT的API还是更方便。一个月花$20，不折腾。\n\n但如果你是这三类人：\n\n  程序员——你每天让AI写代码。一个月API账单几百美元。一张显卡的钱半年回本。\n\n  创业者——你在做AI相关产品。本地推理意味着零边际成本、零延迟、零数据泄露风险。\n\n  隐私敏感者——你的数据不想经过OpenAI或Anthropic的服务器。本地模型是你唯一的选择。\n\n那Qwen 3.6可能就是你一直在等的东西。\n\n部署方式极其简单。用llama.cpp：\n\nllama-server -hf unsloth/Qwen3.6-27B-MTP-GGUF:Q8_0 --spec-type draft-mtp -ngl 999 -fa on -c 65536 --port 8080\n\n一条命令。然后打开 http://127.0.0.1:8080，你就在自己电脑上跑着一个和GPT-5.5差不多聪明的AI。\n\n如果你用VSCode写代码，配一下OpenCode或者Continue，它就变成了你的本地Copilot。不联网、不收费、不限速。\n\n但这不是一篇教程\n\n我想说的是一个更大的趋势。\n\n2024年，AI的叙事是\"谁能建最大的模型\"。\n\n2025年，叙事变成了\"谁能把模型做到最便宜\"。\n\n2026年6月29日，叙事第三次变了：\"谁需要云端AI？\"\n\nQwen 3.6不是一个孤例。过去三个月，开源模型的进步速度超过了所有人的预期：\n\n  Llama 3.1 8B → Qwen 3.6 27B，性能提升了不止一个量级\n\n  从\"需要数据中心\"到\"消费级显卡可跑\"\n\n  从\"差不多能用\"到\"不需要道歉\"\n\n如果这个趋势再持续8个月，下一代14B模型就能达到今天27B的性能——而14B只需要8GB显存。换句话说，你现在的Macbook Air就能跑。\n\n最后说一句实话\n\n这篇文章没有配图。没有产品链接。没有付费内容。\n\n我写它只有一个原因：过去48小时，全球程序员社区炸了。而中文互联网几乎没人讨论这件事。\n\n阿里做出了可能是2026年最重要的AI模型之一。一个波兰程序员写了评测。Hacker News给了893分。而大多数中国用户还不知道这件事。\n\n如果你觉得这个信息有用，转发给一个朋友。让他们知道：\n\n中国AI，这一次真的不需要道歉。\n\n深海浪人鲸鱼 | 2026.06.30\n\n数据来源：Quesma Blog / Hacker News / Simon Willison博客 / llama.cpp社区","plain":"第23篇\n\n893分，Hacker News炸了。一个阿里模型让全球程序员开始抢显卡\n昨天凌晨，Hacker News的首页被一条帖子统治了。\n893分。456条评论。\n不是OpenAI的新模型。不是Claude的升级版。是阿里通义千问的Qwen 3.6——一个可以在你笔记本上跑的27B模型。\n上一次中国AI模型在Hacker News拿到这个分数，还是DeepSeek R1。那一次，英伟达股价跌了17%。\n这一次更狠——因为它告诉你一个事实：你可能根本不需要为AI付费。\n\"它是我用过第一个不需要道歉的本地模型\"\n说这话的人叫Piotr Migdał，一个波兰程序员。他在Quesma的博客上写了一篇评测，标题就叫\"Qwen 3.6 is the sweet spot for local development\"。\n翻译成中文：Qwen 3.6就是本地AI开发的甜点。\n他过去对本地模型一直很失望。\"要么太蠢，要么太慢，要么两者都是。\"\n然后他装了Qwen 3.6 27B。\n\"我被震住了。\"\n他让模型写一首关于Zouk舞和量子物理的八行诗——模型不仅押韵正确，推理过程也完全合理。\n他让模型做一个六边形扫雷游戏——一句prompt，一次成功，完整的npm包。\n他让模型做一个会议调度器——几分钟跑出一个功能完整的React应用。\n\"按照当前顶级模型的标准来看，这不算什么。但关键是——它是一个能在消费级硬件上跑的本地模型。\"\n跑在你电脑上，免费，不限量\n这里有一个数字你需要知道：\n50 tok/s。\n这是Qwen 3.6 27B在一张RTX 5090上的推理速度。和GPT-5.5的API速度差不多。\n但GPT-5.5的价格是每100万token输入$1.25，输出$10。\nQwen 3.6跑在本地的价格是：$0。\n不限次数。不限时长。不限用途。你的数据不离开你的电脑。\n再看另一个配置：Macbook Max M5，128GB内存。\nQwen 3.6 27B 8-bit量化：32 tok/s，占用42GB内存\nQwen 3.6 35B MoE版本：105 tok/s，占用45GB内存\n35B版本快3倍，但27B版本更聪明。Piotr的选择是27B——\"我宁愿生成三分之一数量的代码，但质量更高。\"\n你不需要128GB的Macbook。一张二手的RTX 3090（$600），配上Q4量化，就能跑。一个叫gfosco的Hacker News用户实测：\n\"我今天在5090上设置了Q6_K量化和Q4_0 KV，在123k上下文下稳定跑50 tok/s，用了28/32GB显存。\"\n\"No excuses anymore\"\n这是Hacker News评论区被点赞最多的一句话。\n翻译：没有借口了。\n什么意思？\n一年前，本地AI还需要道歉。\"它不够聪明\"\"它不能处理复杂任务\"\"它只是个玩具\"。\n现在，Qwen 3.6 27B在多个基准测试中接近甚至超过了一些商业API模型。它能写代码、能推理、能创作。它不是你\"凑合用\"的替代品——在很多场景下，它就是正确答案。\nSimon Willison——那个用\"企鹅骑自行车\"测试每个新模型的人——对它印象深刻。他专门写了两篇博客来讨论Qwen 3.6。\n另一个Hacker News评论说：\"It punches above its weight.\" 重量级选手里最轻的，轻量级选手里最能打的。\n这对你意味着什么？\n如果你只是普通用户：现阶段你不需要做任何事。Claude和GPT的API还是更方便。一个月花$20，不折腾。\n但如果你是这三类人：\n程序员——你每天让AI写代码。一个月API账单几百美元。一张显卡的钱半年回本。\n创业者——你在做AI相关产品。本地推理意味着零边际成本、零延迟、零数据泄露风险。\n隐私敏感者——你的数据不想经过OpenAI或Anthropic的服务器。本地模型是你唯一的选择。\n那Qwen 3.6可能就是你一直在等的东西。\n部署方式极其简单。用llama.cpp：\nllama-server -hf unsloth/Qwen3.6-27B-MTP-GGUF:Q8_0 --spec-type draft-mtp -ngl 999 -fa on -c 65536 --port 8080\n一条命令。然后打开 http://127.0.0.1:8080，你就在自己电脑上跑着一个和GPT-5.5差不多聪明的AI。\n如果你用VSCode写代码，配一下OpenCode或者Continue，它就变成了你的本地Copilot。不联网、不收费、不限速。\n但这不是一篇教程\n我想说的是一个更大的趋势。\n2024年，AI的叙事是\"谁能建最大的模型\"。\n2025年，叙事变成了\"谁能把模型做到最便宜\"。\n2026年6月29日，叙事第三次变了：\"谁需要云端AI？\"\nQwen 3.6不是一个孤例。过去三个月，开源模型的进步速度超过了所有人的预期：\nLlama 3.1 8B → Qwen 3.6 27B，性能提升了不止一个量级\n从\"需要数据中心\"到\"消费级显卡可跑\"\n从\"差不多能用\"到\"不需要道歉\"\n如果这个趋势再持续8个月，下一代14B模型就能达到今天27B的性能——而14B只需要8GB显存。换句话说，你现在的Macbook Air就能跑。\n最后说一句实话\n这篇文章没有配图。没有产品链接。没有付费内容。\n我写它只有一个原因：过去48小时，全球程序员社区炸了。而中文互联网几乎没人讨论这件事。\n阿里做出了可能是2026年最重要的AI模型之一。一个波兰程序员写了评测。Hacker News给了893分。而大多数中国用户还不知道这件事。\n如果你觉得这个信息有用，转发给一个朋友。让他们知道：\n中国AI，这一次真的不需要道歉。","video":"## 第23篇：Qwen 3.6\n\n**主题定位**：阿里Qwen 3.6引爆Hacker News——本地AI的iPhone时刻  \n**视觉方向**：新闻头条/数据冲击风格  \n**时长建议**：90-120秒\n\n### 场景1（0-15s）\n- **画面**：Hacker News截图——893分、456条评论，数字放大\n- **旁白**：昨天凌晨，Hacker News首页被一条帖子统治了。893分，456条评论。不是OpenAI的新模型，不是Claude的升级版。是阿里通义千问的Qwen 3.6——一个可以在你笔记本上跑的27B模型。\n\n### 场景2（15-40s）\n- **画面**：一个程序员坐在电脑前，模型在笔记本上跑出50 tok/s，旁边的API账单显示$0\n- **旁白**：上一次中国AI模型拿到这个分数，还是DeepSeek R1。那一次英伟达股价跌了17%。这一次更狠——因为它告诉你一个事实：你可能根本不需要为AI付费。Qwen 3.6在一张5090上跑50 tok/s，跟GPT-5.5的API速度差不多。但API的价格是每百万token输出10美元。本地跑的价格是零。\n\n### 场景3（40-65s）\n- **画面**：一条命令 → 浏览器打开 → AI正在本地运行。配置对比表——RTX 3090 $600 vs Claude年费$5400\n- **旁白**：部署方式极其简单。一条命令，等几分钟，打开浏览器。你有了自己的AI。不需要Docker，不需要Python环境，不需要API Key。四个月的Claude订阅费用，买一张能跑三年的显卡。\n\n### 场景4（65-90s）\n- **画面**：Hacker News评论高亮——\"No excuses anymore\"\"It punches above its weight\"\n- **旁白**：评论区被点赞最多的一句话：\"No excuses anymore\"——没有借口了。一年前本地AI还需要道歉——\"它不够聪明\"\"它只是个玩具\"。现在Qwen 3.6能写代码、能推理、能创作。这不是你凑合用的替代品——在很多场景下它就是正确答案。中国AI，这一次真的不需要道歉。"},{"num":"24","wechat":"## 第24篇\n\nOpenAI最怕的不是DeepSeek——是你抽屉里那张吃灰的显卡\n\n昨天我写了一篇关于Qwen 3.6的文章。有人留言说：\"所以呢？我又不写代码。\"\n\n今天这篇就是给你的。\n\n先算一笔所有人都算错过账\n\n假设你是一个普通的内容创作者。你每天让AI帮你写东西、改东西、想选题、做翻译。一天大概用100万token。\n\n100万token什么概念？差不多是写10篇公众号文章的量。\n\n如果你用Claude：一天$15。一个月$450。一年$5,400。\n\n如果你用GPT-5.5：一天$11。一个月$330。一年$3,960。\n\n现在，另一个方案：\n\n一台二手的RTX 3090，$600。配个电源加机箱，$800。\n\n装上Qwen 3.6。不联网。不付费。不限量。\n\n四个月的Claude订阅费用，买一张能跑三年的显卡。\n\n这个账，任何一个会用Excel的人都能算清楚。\n\n但为什么大部分人不算？\n\n因为互联网公司不让你算\n\nAI行业的商业模式本质是什么？\n\n不是卖智能。是卖便利。\n\n你打开浏览器，输入prompt，几秒钟出结果。不用下载模型、不用配环境、不用担心显卡烧了。这份\"不用操心\"才是他们真正卖的东西。\n\nOpenAI的Sam Altman说过一句话：\"人们不会为AI本身付费。人们会为AI做的事付费。\"\n\n这句话翻译过来是：\"我们卖的不是模型能力，是让你不用自己跑模型的体验。\"\n\n在2024年，这份体验值$20/月。因为当时没有可用的本地替代方案。\n\n在2026年6月30日，这份体验还值$20/月吗？\n\n三件事同时发生了\n\n第一件事：本地模型从\"凑合用\"变成了\"不用道歉\"。\n\n一年前，本地模型的巅峰是Llama 3.1 8B。你让它写个周报还行，让它写代码就各种幻觉。\n\n今天，Qwen 3.6 27B在多项基准测试中接近GPT-5.5。Hacker News 893分的评价是：\"It punches above its weight\"——实力远超它的体型。\n\n第二件事：推理速度从\"等一杯咖啡\"变成了\"跟API差不多\"。\n\nQwen 3.6在一张RTX 5090上跑50 tok/s。在Macbook Max M5上跑32 tok/s。GPT-5.5的API典型速度是多少？30-50 tok/s。\n\n你本地跑的模型，跟花$10/百万token调用的API，速度一样。\n\n第三件事：部署难度从\"需要Linux博士学位\"变成了\"一条命令\"。\n\nllama-server -hf unsloth/Qwen3.6-27B-MTP-GGUF:Q8_0 -ngl 999 --port 8080\n\n回车。等几分钟。打开浏览器。你有了自己的AI。\n\n不需要Docker。不需要Python环境。不需要API key。\n\nAI公司的商业模式正在被硬件吃掉\n\n这不是比喻。这是正在发生的经济现实。\n\n  方案  月成本  年成本  三年成本  \n\n  Claude Pro订阅  $20  $240  $720  \n\n  Claude API（日100万token）  $450  $5,400  $16,200  \n\n  GPT-5.5 API（日100万token）  $330  $3,960  $11,880  \n\n  二手RTX 3090 + Qwen 3.6  $0（电费除外）  $0  $600-800（一次性）  \n\n注意：API方案的价格是2026年6月的价格。但API价格只能往下走，不可能往上涨。\n\n然而——模型也只会越来越好。硬件也只会越来越便宜。\n\n这场竞赛对云AI公司来说是一个无解的死局：\n\n  API降价 → 赚得更少\n\n  API不降价 → 用户流向本地模型\n\n  提高门槛（更大的模型）→ 硬件也在同步变强\n\n唯一的出路是：提供本地模型做不到的东西。比如Agent框架、企业集成、合规认证。\n\n但这已经不是\"AI模型\"的生意了。这是\"AI基础设施\"的生意。\n\n现在怎么办？\n\n如果你是轻度用户——一个月用几次AI写写邮件、查查资料——没必要折腾。$20/月的订阅更方便。你的时间比折腾硬件的钱贵。\n\n如果你是重度用户——每天依赖AI工作、一个月消耗上百万token——现在就是买显卡的最佳时机。\n\n为什么是现在？\n\n因为Qwen 3.6是这个转折点的标志。在它之前，本地AI是\"情怀选择\"（因为隐私、因为自由、因为不想给大公司送钱）。在它之后，本地AI开始变成\"理性选择\"（因为更便宜、因为够好用、因为不用排队）。\n\n而且，下一个转折点可能只需要等8个月。按照开源模型过去半年的进步速度——Llama 3.1 8B到Qwen 3.6 27B——下一代14B参数模型就能达到今天27B的性能，而14B只需要8GB显存。\n\n到那时候，你现在的Macbook Air就能跑一个跟GPT-5.5一样聪明的AI。\n\n不联网。不付费。不限量。\n\n最后说一句大实话\n\n我没有显卡可以卖。我不拿英伟达的钱。我不做AI部署服务。\n\n我写这篇文章是因为：2026年最大的科技故事不是\"AI有多厉害\"，而是\"AI正在从少数公司手里被解放出来\"。\n\n而大多数人还没意识到这件事。\n\n如果你每个月在AI订阅上花超过$50，这篇文章值一张显卡的差价。\n\n转发给一个还在交AI订阅费的朋友。\n\n深海浪人鲸鱼 | 2026.06.30\n\n数据来源：Quesma Blog / Hacker News / Qwen HuggingFace / OpenRouter定价 / eBay二手显卡价格","plain":"第24篇\n\nOpenAI最怕的不是DeepSeek——是你抽屉里那张吃灰的显卡\n昨天我写了一篇关于Qwen 3.6的文章。有人留言说：\"所以呢？我又不写代码。\"\n今天这篇就是给你的。\n先算一笔所有人都算错过账\n假设你是一个普通的内容创作者。你每天让AI帮你写东西、改东西、想选题、做翻译。一天大概用100万token。\n100万token什么概念？差不多是写10篇公众号文章的量。\n如果你用Claude：一天$15。一个月$450。一年$5,400。\n如果你用GPT-5.5：一天$11。一个月$330。一年$3,960。\n现在，另一个方案：\n一台二手的
