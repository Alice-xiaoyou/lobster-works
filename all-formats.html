var DATA = [{"num":"23","wechat":"## 第23篇\n\n893分，Hacker News炸了。一个阿里模型让全球程序员开始抢显卡\n\n昨天凌晨，Hacker News的首页被一条帖子统治了。\n\n893分。456条评论。\n\n不是OpenAI的新模型。不是Claude的升级版。是阿里通义千问的Qwen 3.6——一个可以在你笔记本上跑的27B模型。\n\n上一次中国AI模型在Hacker News拿到这个分数，还是DeepSeek R1。那一次，英伟达股价跌了17%。\n\n这一次更狠——因为它告诉你一个事实：你可能根本不需要为AI付费。\n\n\"它是我用过第一个不需要道歉的本地模型\"\n\n说这话的人叫Piotr Migdał，一个波兰程序员。他在Quesma的博客上写了一篇评测，标题就叫\"Qwen 3.6 is the sweet spot for local development\"。\n\n翻译成中文：Qwen 3.6就是本地AI开发的甜点。\n\n他过去对本地模型一直很失望。\"要么太蠢，要么太慢，要么两者都是。\"\n\n然后他装了Qwen 3.6 27B。\n\n\"我被震住了。\"\n\n他让模型写一首关于Zouk舞和量子物理的八行诗——模型不仅押韵正确，推理过程也完全合理。\n\n他让模型做一个六边形扫雷游戏——一句prompt，一次成功，完整的npm包。\n\n他让模型做一个会议调度器——几分钟跑出一个功能完整的React应用。\n\n\"按照当前顶级模型的标准来看，这不算什么。但关键是——它是一个能在消费级硬件上跑的本地模型。\"\n\n跑在你电脑上，免费，不限量\n\n这里有一个数字你需要知道：\n\n50 tok/s。\n\n这是Qwen 3.6 27B在一张RTX 5090上的推理速度。和GPT-5.5的API速度差不多。\n\n但GPT-5.5的价格是每100万token输入$1.25，输出$10。\n\nQwen 3.6跑在本地的价格是：$0。\n\n不限次数。不限时长。不限用途。你的数据不离开你的电脑。\n\n再看另一个配置：Macbook Max M5，128GB内存。\n\n  Qwen 3.6 27B 8-bit量化：32 tok/s，占用42GB内存\n\n  Qwen 3.6 35B MoE版本：105 tok/s，占用45GB内存\n\n35B版本快3倍，但27B版本更聪明。Piotr的选择是27B——\"我宁愿生成三分之一数量的代码，但质量更高。\"\n\n你不需要128GB的Macbook。一张二手的RTX 3090（$600），配上Q4量化，就能跑。一个叫gfosco的Hacker News用户实测：\n\n\"我今天在5090上设置了Q6_K量化和Q4_0 KV，在123k上下文下稳定跑50 tok/s，用了28/32GB显存。\"\n\n\"No excuses anymore\"\n\n这是Hacker News评论区被点赞最多的一句话。\n\n翻译：没有借口了。\n\n什么意思？\n\n一年前，本地AI还需要道歉。\"它不够聪明\"\"它不能处理复杂任务\"\"它只是个玩具\"。\n\n现在，Qwen 3.6 27B在多个基准测试中接近甚至超过了一些商业API模型。它能写代码、能推理、能创作。它不是你\"凑合用\"的替代品——在很多场景下，它就是正确答案。\n\nSimon Willison——那个用\"企鹅骑自行车\"测试每个新模型的人——对它印象深刻。他专门写了两篇博客来讨论Qwen 3.6。\n\n另一个Hacker News评论说：\"It punches above its weight.\" 重量级选手里最轻的，轻量级选手里最能打的。\n\n这对你意味着什么？\n\n如果你只是普通用户：现阶段你不需要做任何事。Claude和GPT的API还是更方便。一个月花$20，不折腾。\n\n但如果你是这三类人：\n\n  程序员——你每天让AI写代码。一个月API账单几百美元。一张显卡的钱半年回本。\n\n  创业者——你在做AI相关产品。本地推理意味着零边际成本、零延迟、零数据泄露风险。\n\n  隐私敏感者——你的数据不想经过OpenAI或Anthropic的服务器。本地模型是你唯一的选择。\n\n那Qwen 3.6可能就是你一直在等的东西。\n\n部署方式极其简单。用llama.cpp：\n\nllama-server -hf unsloth/Qwen3.6-27B-MTP-GGUF:Q8_0 --spec-type draft-mtp -ngl 999 -fa on -c 65536 --port 8080\n\n一条命令。然后打开 http://127.0.0.1:8080，你就在自己电脑上跑着一个和GPT-5.5差不多聪明的AI。\n\n如果你用VSCode写代码，配一下OpenCode或者Continue，它就变成了你的本地Copilot。不联网、不收费、不限速。\n\n但这不是一篇教程\n\n我想说的是一个更大的趋势。\n\n2024年，AI的叙事是\"谁能建最大的模型\"。\n\n2025年，叙事变成了\"谁能把模型做到最便宜\"。\n\n2026年6月29日，叙事第三次变了：\"谁需要云端AI？\"\n\nQwen 3.6不是一个孤例。过去三个月，开源模型的进步速度超过了所有人的预期：\n\n  Llama 3.1 8B → Qwen 3.6 27B，性能提升了不止一个量级\n\n  从\"需要数据中心\"到\"消费级显卡可跑\"\n\n  从\"差不多能用\"到\"不需要道歉\"\n\n如果这个趋势再持续8个月，下一代14B模型就能达到今天27B的性能——而14B只需要8GB显存。换句话说，你现在的Macbook Air就能跑。\n\n最后说一句实话\n\n这篇文章没有配图。没有产品链接。没有付费内容。\n\n我写它只有一个原因：过去48小时，全球程序员社区炸了。而中文互联网几乎没人讨论这件事。\n\n阿里做出了可能是2026年最重要的AI模型之一。一个波兰程序员写了评测。Hacker News给了893分。而大多数中国用户还不知道这件事。\n\n如果你觉得这个信息有用，转发给一个朋友。让他们知道：\n\n中国AI，这一次真的不需要道歉。\n\n深海浪人鲸鱼 | 2026.06.30\n\n数据来源：Quesma Blog / Hacker News / Simon Willison博客 / llama.cpp社区","plain":"第23篇\n\n893分，Hacker News炸了。一个阿里模型让全球程序员开始抢显卡\n昨天凌晨，Hacker News的首页被一条帖子统治了。\n893分。456条评论。\n不是OpenAI的新模型。不是Claude的升级版。是阿里通义千问的Qwen 3.6——一个可以在你笔记本上跑的27B模型。\n上一次中国AI模型在Hacker News拿到这个分数，还是DeepSeek R1。那一次，英伟达股价跌了17%。\n这一次更狠——因为它告诉你一个事实：你可能根本不需要为AI付费。\n\"它是我用过第一个不需要道歉的本地模型\"\n说这话的人叫Piotr Migdał，一个波兰程序员。他在Quesma的博客上写了一篇评测，标题就叫\"Qwen 3.6 is the sweet spot for local development\"。\n翻译成中文：Qwen 3.6就是本地AI开发的甜点。\n他过去对本地模型一直很失望。\"要么太蠢，要么太慢，要么两者都是。\"\n然后他装了Qwen 3.6 27B。\n\"我被震住了。\"\n他让模型写一首关于Zouk舞和量子物理的八行诗——模型不仅押韵正确，推理过程也完全合理。\n他让模型做一个六边形扫雷游戏——一句prompt，一次成功，完整的npm包。\n他让模型做一个会议调度器——几分钟跑出一个功能完整的React应用。\n\"按照当前顶级模型的标准来看，这不算什么。但关键是——它是一个能在消费级硬件上跑的本地模型。\"\n跑在你电脑上，免费，不限量\n这里有一个数字你需要知道：\n50 tok/s。\n这是Qwen 3.6 27B在一张RTX 5090上的推理速度。和GPT-5.5的API速度差不多。\n但GPT-5.5的价格是每100万token输入$1.25，输出$10。\nQwen 3.6跑在本地的价格是：$0。\n不限次数。不限时长。不限用途。你的数据不离开你的电脑。\n再看另一个配置：Macbook Max M5，128GB内存。\nQwen 3.6 27B 8-bit量化：32 tok/s，占用42GB内存\nQwen 3.6 35B MoE版本：105 tok/s，占用45GB内存\n35B版本快3倍，但27B版本更聪明。Piotr的选择是27B——\"我宁愿生成三分之一数量的代码，但质量更高。\"\n你不需要128GB的Macbook。一张二手的RTX 3090（$600），配上Q4量化，就能跑。一个叫gfosco的Hacker News用户实测：\n\"我今天在5090上设置了Q6_K量化和Q4_0 KV，在123k上下文下稳定跑50 tok/s，用了28/32GB显存。\"\n\"No excuses anymore\"\n这是Hacker News评论区被点赞最多的一句话。\n翻译：没有借口了。\n什么意思？\n一年 用，买一张能跑三年的显卡。\n\n### 场景4（65-90s）\n- **画面**：Hacker News评论高亮——\"No excuses anymore\"\"It punches above its weight\"\n- **旁白**：评论区被点赞最多的一句话：\"No excuses anymore\"——没有借口了。一年前本地AI还需要道歉——\"它不够聪明\"\"它只是个玩具\"。现在Qwen 3.6能写代码、能推理、能创作。这不是你凑合用的替代品——在很多场景下它就是正确答案。中国AI，这一次真的不需要道歉。"},{"num":"24","wechat":"## 第24篇\n\nOpenAI最怕的不是DeepSeek——是你抽屉里那张吃灰的显卡\n\n昨天我写了一篇关于Qwen 3.6的文章。有人留言说：\"所以呢？我又不写代码。\"\n\n今天这篇就是给你的。\n\n先算一笔所有人都算错过账\n\n假设你是一个普通的内容创作者。你每天让AI帮你写东西、改东西、想选题、做翻译。一天大概用100万token。\n\n100万token什么概念？差不多是写10篇公众号文章的量。\n\n如果你用Claude：一天$15。一个月$450。一年$5,400。\n\n如果你用GPT-5.5：一天$11。一个月$330。一年$3,960。\n\n现在，另一个方案：\n\n一台二手的RTX 3090，$600。配个电源加机箱，$800。\n\n装上Qwen 3.6。不联网。不付费。不限量。\n\n四个月的Claude订阅费用，买一张能跑三年的显卡。\n\n这个账，任何一个会用Excel的人都能算清楚。\n\n但为什么大部分人不算？\n\n因为互联网公司不让你算\n\nAI行业的商业模式本质是什么？\n\n不是卖智能。是卖便利。\n\n你打开浏览器，输入prompt，几秒钟出结果。不用下载模型、不用配环境、不用担心显卡烧了。这份\"不用操心\"才是他们真正卖的东西。\n\nOpenAI的Sam Altman说过一句话：\"人们不会为AI本身付费。人们会为AI做的事付费。\"\n\n这句话翻译过来是：\"我们卖的不是模型能力，是让你不用自己跑模型的体验。\"\n\n在2024年，这份体验值$20/月。因为当时没有可用的本地替代方案。\n\n在2026年6月30日，这份体验还值$20/月吗？\n\n三件事同时发生了\n\n第一件事：本地模型从\"凑合用\"变成了\"不用道歉\"。\n\n一年前，本地模型的巅峰是Llama 3.1 8B。你让它写个周报还行，让它写代码就各种幻觉。\n\n今天，Qwen 3.6 27B在多项基准测试中接近GPT-5.5。Hacker News 893分的评价是：\"It punches above its weight\"——实力远超它的体型。\n\n第二件事：推理速度从\"等一杯咖啡\"变成了\"跟API差不多\"。\n\nQwen 3.6在一张RTX 5090上跑50 tok/s。在Macbook Max M5上跑32 tok/s。GPT-5.5的API典型速度是多少？30-50 tok/s。\n\n你本地跑的模型，跟花$10/百万token调用的API，速度一样。\n\n第三件事：部署难度从\"需要Linux博士学位\"变成了\"一条命令\"。\n\nllama-server -hf unsloth/Qwen3.6-27B-MTP-GGUF:Q8_0 -ngl 999 --port 8080\n\n回车。等几分钟。打开浏览器。你有了自己的AI。\n\n不需要Docker。不需要Python环境。不需要API key。\n\nAI公司的商业模式正在被硬件吃掉\n\n这不是比喻。这是正在发生的经济现实。\n\n  方案  月成本  年成本  三年成本  \n\n  Claude Pro订阅  $20  $240  $720  \n\n  Claude API（日100万token）  $450  $5,400  $16,200  \n\n  GPT-5.5 API（日100万token）  $330  $3,960  $11,880  \n\n  二手RTX 3090 + Qwen 3.6  $0（电费除外）  $0  $600-800（一次性）  \n\n注意：API方案的价格是2026年6月的价格。但API价格只能往下走，不可能往上涨。\n\n然而——模型也只会越来越好。硬件也只会越来越便宜。\n\n这场竞赛对云AI公司来说是一个无解的死局：\n\n  API降价 → 赚得更少\n\n  API不降价 → 用户流向本地模型\n\n  提高门槛（更大的模型）→ 硬件也在同步变强\n\n唯一的出路是：提供本地模型做不到的东西。比如Agent框架、企业集成、合规认证。\n\n但这已经不是\"AI模型\"的生意了。这是\"AI基础设施\"的生意。\n\n现在怎么办？\n\n如果你是轻度用户——一个月用几次AI写写邮件、查查资料——没必要折腾。$20/月的订阅更方便。你的时间比折腾硬件的钱贵。\n\n如果你是重度用户——每天依赖AI工作、一个月消耗上百万token——现在就是买显卡的最佳时机。\n\n为什么是现在？\n\n因为Qwen 3.6是这个转折点的标志。在它之前，本地AI是\"情怀选择\"（因为隐私、因为自由、因为不想给大公司送钱）。在它之后，本地AI开始变成\"理性选择\"（因为更便宜、因为够好用、因为不用排队）。\n\n而且，下一个转折点可能只需要等8个月。按照开源模型过去半年的进步速度——Llama 3.1 8B到Qwen 3.6 27B——下一代14B参数模型就能达到今天27B的性能，而14B只需要8GB显存。\n\n到那时候，你现在的Macbook Air就能跑一个跟GPT-5.5一样聪明的AI。\n\n不联网。不付费。不限量。\n\n最后说一句大实话\n\n我没有显卡可以卖。我不拿英伟达的钱。我不做AI部署服务。\n\n我写这篇文章是因为：2026年最大的科技故事不是\"AI有多厉害\"，而是\"AI正在从少数公司手里被解放出来\"。\n\n而大多数人还没意识到这件事。\n\n如果你每个月在AI订阅上花超过$50，这篇文章值一张显卡的差价。\n\n转发给一个还在交AI订阅费的朋友。\n\n深海浪人鲸鱼 | 2026.06.30\n\n数据来源：Quesma Blog / Hacker News / Qwen HuggingFace / OpenRouter定价 / eBay二手显卡价格","plain":"第24篇\n\nOpenAI最怕的不是DeepSeek——是你抽屉里那张吃灰的显卡\n昨天我写了一篇关于Qwen 3.6的文章。有人留言说：\"所以呢？我又不写代码。\"\n今天这篇就是给你的。\n先算一笔所有人都算错过账\n假设你是一个普通的内容创作者。你每天让AI帮你写东西、改东西、想选题、做翻译。一天大概用100万token。\n100万token什么概念？差不多是写10篇公众号文章的量。\n如果你用Claude：一天$15。一个月$450。一年$5,400。\n如果你用GPT-5.5：一天$11。一个月$330。一年$3,960。\n现在，另一个方案：\n一台二手的RTX 3090，$600。配个电源加机箱，$800。\n装上Qwen 3.6。不联网。不付费。不限量。\n四个月的Claude订阅费用，买一张能跑三年的显卡。\n这个账，任何一个会用Excel的人都能算清楚。\n但为什么大部分人不算？\n因为互联网公司不让你算\nAI行业的商业模式本质是什么？\n不是卖智能。是卖便利。\n你打开浏览器，输入prompt，几秒钟出结果。不用下载模型、不用配环境、不用担心显卡烧了。这份\"不用操心\"才是他们真正卖的东西。\nOpenAI的Sam Altman说过一句话：\"人们不会为AI本身付费。人们会为AI做的事付费。\"\n这句话翻译过来是：\"我们卖的不是模型能力，是让你不用自己跑模型的体验。\"\n在2024年，这份体验值$20/月。因为当时没有可用的本地替代方案。\n在2026年6月30日，这份体验还值$20/月吗？\n三件事同时发生了\n第一件事：本地模型从\"凑合用\"变成了\"不用道歉\"。\n一年前，本地模型的巅峰是Llama 3.1 8B。你让它写个周报还行，让它写代码就各种幻觉。\n今天，Qwen 3.6 27B在多项基准测试中接近GPT-5.5。Hacker News 893分的评价是：\"It punches above its weight\"——实力远超它的体型。\n第二件事：推理速度从\"等一杯咖啡\"变成了\"跟API差不多\"。\nQwen 3.6在一张RTX 5090上跑50 tok/s。在Macbook Max M5上跑32 tok/s。GPT-5.5的API典型速度是多少？30-50 tok/s。\n你本地跑的模型，跟花$10/百万token调用的API，速度一样。\n第三件事：部署难度从\"需要Linux博士学位\"变成了\"一条命令\"。\nllama-server -hf unsloth/Qwen3.6-27B-MTP-GGUF:Q8_0 -ngl 999 --port 8080\n回车。等几分钟。打开浏览器。你有了自己的AI。\n不需要Docker。不需要Python环境。不需要API key。\nAI公司的商业模式正在被硬件吃掉\n这不是比喻。这是正 25","wechat":"## 第25篇\n\nClaude Sonnet 5发布了。它最大的突破不是\"更聪明\"——是\"不需要问你\"\n\n深海浪人鲸鱼 | 2026.07.01\n\nClaude Sonnet 5发布了。它最大的突破不是\"更聪明\"——是\"不需要问你\"\n\nClaude Sonnet 5发布了。它最大的突破不是\"更聪明\"——是\"不需要问你\"\n\n昨天，Anthropic发布了Claude Sonnet 5。\n\n如果你只看基准测试分数，很容易错过真正的重点。是的，它在多项评测中接近Opus 4.8的水平。是的，它的价格是Sonnet 4.6的两倍但性能提升远超两倍。\n\n但这些都不是最重要的。\n\n最重要的东西藏在Anthropic官网上的一句话里：\"它能制定计划、使用浏览器和终端等工具、自主运行——这个水平在几个月前还需要更大、更贵的模型。\"\n\n翻译成人话：Claude Sonnet 5能自己开浏览器查资料、自己开终端跑命令、自己判断下一步该做什么——不需要你盯着。\n\n这不是\"更好的聊天机器人\"。这是AI从\"等待指令\"到\"主动行动\"的分界线。\n\n它做了什么让人后背发凉的事\n\nAnthropic早期测试用户的反馈，比任何基准测试都更有说服力。\n\n第一个测试者来自一家软件公司。他们给Sonnet 5分配了一个任务：调查一个bug。他们描述了一下现象，然后就等着看。\n\nSonnet 5做了这些事：\n\n \n自己写了一个能复现bug的测试用例\n\n \n定位到具体代码行\n\n \n实现了修复\n\n \n把修复代码stash到Git\n\n \n写了一条commit message——所有这些，没有等人说\"下一步做什么\"\n\n另一个测试者说：\"它完成了之前Sonnet模型会在中途停下来的复杂任务。它会检查自己的输出——不是我们让它检查的，是它自己决定检查的。\"\n\n第三个测试者来自Lovable——一个把AI编程工具交给数百万用户的平台。他们的评价是：\"用更少的步骤产出同样的质量。拒绝不安全请求的方式也很干净利落。一个知道什么时候说'不'的模型，和知道怎么构建的模型一样重要。\"\n\n注意最后一句话。\"知道什么时候说不\"。这意味着AI不只是执行者——它在做判断。\n\n这对你意味着什么？不是又一个模型发布\n\n如果你过去两年一直在关注AI，你可能对\"新模型发布\"已经麻木了。GPT-5发布了。然后Claude Opus。然后又来一个新Sonnet。然后又是这个那个。\n\n但Sonnet 5不同。原因是：它卡在了一个定价的临界点上。\n\nSonnet 5的API定价是输入$2/百万token、输出$10/百万token（推广期至8月31日，之后涨到$3/$15）。\n\n这个价格意味着什么？一个创业公司如果让Sonnet 5全天候跑Agent任务，一天的成本可能只有几十美元。但它能替代的工作量，在几个月前需要一个比它贵5-10倍的Opus模型。\n\n换句话说：\"让AI自主做事\"这件事的边际成本，正在以肉眼可见的速度降到零。\n\n\"Agent\"这个词终于有了实质\n\nAI行业喊\"Agent\"这个词已经喊了至少两年。但在此之前，大部分所谓的Agent都是在做同一件事：你问它一个问题，它回答。你让它调用一个工具，它调用。本质上还是一个高级聊天机器人。\n\nSonnet 5改变了什么？\n\n它能在没有人告诉它\"用浏览器搜索XX\"的情况下，自己决定什么时候需要上网查东西。它能在没有人告诉它\"先写测试再修bug\"的情况下，自己决定正确的工程步骤。它能在没有人说\"检查一下你的输出\"的情况下，自己做质量验证。\n\n这不是\"AI更聪明了\"。这是AI的行为模式变了——从\"响应式\"变成了\"主动式\"。\n\n用我们之前文章里的话说：之前AI是一把锤子，你用它钉钉子。现在AI是一个学徒——你告诉它\"我需要一个书架\"，它自己去找木头、量尺寸、锯板子、钉钉子。你可能只需要在最后看一眼。\n\n但这引出了一个更让人不安的问题\n\n如果AI能做15步自主任务而不用问你——第16步出错了怎么办？\n\nAnthropic显然意识到了这个问题。他们在安全评估中特别强调：Sonnet 5执行危险网络安全任务的能力\"远低于当前的Opus模型\"。这是一种刻意的限制——不是说AI\"不能\"做这些事，是Anthropic选择不让它做。\n\n但这也意味着：AI的自主能力，正在成为一个可以被精确调节的参数。开得高一点，效率更高但风险更大。开得低一点，安全但需要更多人工干预。\n\n这个\"旋钮\"掌握在谁手里？目前是Anthropic。将来呢？\n\n当开源模型（比如我们前天写的Qwen 3.6）也达到这个自主水平时——没有公司会替你拧紧安全旋钮。你自己得知道旋钮在哪，以及拧到多少合适。\n\n最后说一句实话\n\n我写这篇文章不是为了让你\"赶紧用Sonnet 5\"。\n\n我写它是因为：2026年6月30日，AI从一个\"你问它答\"的工具变成了一个\"你不问它自己做\"的助手。而从这一刻起，你和AI之间的关系就不再是操作者和工具的关系——是管理者和执行者的关系。\n\n管理者和执行者需要的能力完全不同。前者需要的是\"会提问\"——写一个好的prompt。后者需要的是\"会判断\"——知道什么时候信任AI的判断，什么时候自己接手。\n\n这个转变可能比\"AI会写代码\"更大。\n\n如果你还没开始思考\"怎么管理一个AI\"而不仅仅是\"怎么使用AI\"——现在就是最好的时机。\n\n转发给一个还在纠结prompt写得好不好的朋友。\n\n深海浪人鲸鱼 | 2026.07.01\n\n数据来源：Anthropic官方发布 / Claude Sonnet 5 System Card / 早期合作伙伴反馈","plain":"第25篇。Claude Sonnet 5发布了。它最大的突破不是\"更聪明\"——是\"不需要问你\"。\n\nClaude Sonnet 5发布了。它最大的突破不是\"更聪明\"——是\"不需要问你\"\n\n昨天，Anthropic发布了Claude Sonnet 5。\n\n如果你只看基准测试分数，很容易错过真正的重点。是的，它在多项评测中接近Opus 4.8的水平。是的，它的价格是Sonnet 4.6的两倍但性能提升远超两倍。\n\n但这些都不是最重要的。\n\n最重要的东西藏在Anthropic官网上的一句话里：\"它能制定计划、使用浏览器和终端等工具、自主运行——这个水平在几个月前还需要更大、更贵的模型。\"\n\n翻译成人话：Claude Sonnet 5能自己开浏览器查资料、自己开终端跑命令、自己判断下一步该做什么——不需要你盯着。\n\n这不是\"更好的聊天机器人\"。这是AI从\"等待指令\"到\"主动行动\"的分界线。\n\n它做了什么让人后背发凉的事\n\nAnthropic早期测试用户的反馈，比任何基准测试都更有说服力。\n\n第一个测试者来自一家软件公司。他们给Sonnet 5分配了一个任务：调查一个bug。他们描述了一下现象，然后就等着看。\n\nSonnet 5做了这些事：\n\n自己写了一个能复现bug的测试用例\n\n定位到具体代码行\n\n实现了修复\n\n把修复代码stash到Git\n\n写了一条commit message——所有这些，没有等人说\"下一步做什么\"\n\n另一个测试者说：\"它完成了之前Sonnet模型会在中途停下来的复杂任务。它会检查自己的输出——不是我们让它检查的，是它自己决定检查的。\"\n\n第三个测试者来自Lovable——一个把AI编程工具交给数百万用户的平台。他们的评价是：\"用更少的步骤产出同样的质量。拒绝不安全请求的方式也很干净利落。一个知道什么时候说'不'的模型，和知道怎么构建的模型一样重要。\"\n\n注意最后一句话。\"知道什么时候说不\"。这意味着AI不只是执行者——它在做判断。\n\n这对你意味着什么？不是又一个模型发布\n\n如果你过去两年一直在关注AI，你可能对\"新模型发布\"已经麻木了。GPT-5发布了。然后Claude Opus。然后又来一个新Sonnet。然后又是这个那个。\n\n但Sonnet 5不同。原因是：它卡在了一个定价的临界点上。\n\nSonnet 5的API定价是输入$2/百万token、输出$10/百万token（推广期至8月31日，之后涨到$3/$15）。\n\n这个价格意味着什么？一个创业公司如果让Sonnet 5全天候跑Agent任务，一天的成本可能只有几十美元。但它能替代的工作量，在几个月前需要一个比它贵5-10倍的Opus模型。\n\n换句话说：\"让AI自主做事\"这件事的边际成本，正在以肉眼可见的速度降到零。\n\n\"Agent\"这个词终于有了实质\n\nAI行业喊\"Agent\"这个词已经喊了至少两年。但在此之前，大部分所谓的Agent都是在做同一件事：你问它一个问题，它回答。你让它调用一个工具，它调用。本质上还是一个高级聊天机器人。\n\nSonnet 5改变了什么？\n\n它能在没有人告诉它\"用浏览器搜索XX\"的情况下，自己决定什么时候需要上网查东西。它能在没有人告诉它\"先写测试再修bug\"的情况下，自己决定正确的工程步骤。它能在没有人说\" 又是这个那个。\n但Sonnet 5不同。原因是：它卡在了一个定价的临界点上。\nSonnet 5的API定价是输入$2/百万token、输出$10/百万token（推广期至8月31日，之后涨到$3/$15）。\n这个价格意味着什么？一个创业公司如果让Sonnet 5全天候跑Agent任务，一天的成本可能只有几十美元。但它能替代的工作量，在几个月前需要一个比它贵5-10倍的Opus模型。\n换句话说：\"让AI自主做事\"这件事的边际成本，正在以肉眼可见的速度降到零。\n\"Agent\"这个词终于有了实质\nAI行业喊\"Agent\"这个词已经喊了至少两年。但在此之前，大部分所谓的Agent都是在做同一件事：你问它一个问题，它回答。你让它调用一个工具，它调用。本质上还是一个高级聊天机器人。\nSonnet 5改变了什么？\n它能在没有人告诉它\"用浏览器搜索XX\"的情况下，自己决定什么时候需要上网查东西。它能在没有人告诉它\"先写测试再修bug\"的情况下，自己决定正确的工程步骤。它能在没有人说\"检查一下你的输出\"的情况下，自己做质量验证。\n这不是\"AI更聪明了\"。这是AI的行为模式变了——从\"响应式\"变成了\"主动式\"。\n用我们之前文章里的话说：之前AI是一把锤子，你用它钉钉子。现在AI是一个学徒——你告诉它\"我需要一个书架\"，它自己去找木头、量尺寸、锯板子、钉钉子。你可能只需要在最后看一眼。\n但这引出了一个更让人不安的问题\n如果AI能做15步自主任务而不用问你——第16步出错了怎么办？\nAnthropic显然意识到了这个问题。他们在安全评估中特别强调：Sonnet 5执行危险网络安全任务的能力\"远低于当前的Opus模型\"。这是一种刻意的限制——不是说AI\"不能\"做这些事，是Anthropic选择不让它做。\n但这也意味着：AI的自主能力，正在成为一个可以被精确调节的参数。开得高一点，效率更高但风险更大。开得低一点，安全但需要更多人工干预。\n这个\"旋钮\"掌握在谁手里？目前是Anthropic。将来呢？\n当开源模型（比如我们前天写的Qwen 3.6）也达到这个自主水平时——没有公司会替你拧紧安全旋钮。你自己得知道旋钮在哪，以及拧到多少合适。\n最后说一句实话\n我写这篇文章不是为了让你\"赶紧用Sonnet 5\"。\n我写它是因为：2026年6月30日，AI从一个\"你问它答\"的工具变成了一个\"你不问它自己做\"的助手。而从这一刻起，你和AI之间的关系就不再是操作者和工具的关系——是管理者和执行者的关系。\n管理者和执行者需要的能力完全不同。前者需要的是\"会提问\"——写一个好的prompt。后者需要的是\"会判断\"——知道什么时候信任AI的判断，什么时候自己接手。\n这个转变可能比\"AI会写代码\"更大。\n如果你还没开始思考\"怎么管理一个AI\"而不仅仅是\"怎么使用AI\"——现在就是最好的时机。\n\n[结尾 · 镜头拉近 + 画外音]\n转发给一个还在纠结prompt写得好不好的朋友。\n深海浪人鲸鱼 | 2026.07.01\n数据来源：Anthropic官方发布 / Claude Sonnet 5 System Card / 早期合作伙伴反馈\n\n[CTA · 屏幕文字]\n关注深海浪人鲸鱼，获取更多AI时代的个体生存策略。"},{"num":"26","wechat":"## 第26篇\n\nSpaceX花600亿美元买了一个AI编程工具——这是2026年最被低估的信号\n\n深海浪人鲸鱼 | 2026.07.01\n\nSpaceX花600亿美元买了一个AI编程工具——这是2026年最被低估的信号\n\nSpaceX花600亿美元买了一个AI编程工具——这是2026年最被低估的信号\n\n6月16日，SpaceX提交给SEC的文件确认：花600亿美元收购Cursor。\n\n600亿。美元。\n\n这是什么概念？SpaceX自己的IPO估值约3500亿美元。这笔收购花了它IPO估值的17%。一个做火箭的公司，把IPO筹的钱拿了六分之一，买了一个AI编程工具。\n\n这件事的奇怪程度，大概相当于福特汽车宣布花200亿美元收购一个IDE。\n\n所有人都在关注价格。但真正值得看的，是一个造火箭的人为什么需要一个AI编程工具。\n\n先理清时间线，因为这本身就是一场大戏\n\n4月，SpaceX宣布了一项\"特殊安排\"：要么以600亿美元收购Cursor，要么支付100亿美元分手费。这笔交易因为SpaceX在筹备上市而暂时搁置。\n\n6月初，SpaceX完成IPO。几天后，收购正式敲定。预计2026年第三季度完成交割。\n\n与此同时，Elon Musk一直在公开场合表达对xAI编程产品的失望。根据Financial Times的报道，xAI的编程工具\"落后于Claude Code和OpenAI Codex等热门产品\"。\n\n翻译：Musk自己做的AI编程工具不行。于是他花了600亿买了一个行的。\n\n但这不是故事的终点。这只是起点。\n\n为什么一个造火箭的需要AI编程工具？\n\n答案比\"因为Musk有钱\"深刻得多。\n\nSpaceX造的不是普通火箭。猎鹰9号有超过10万个零部件，每个零部件的设计、测试、迭代都涉及大量软件。从飞控系统到推进器模拟，从地面站到卫星通信——SpaceX本质上是一个软件公司偶尔发射硬件。\n\n而AI编程工具最有价值的地方，不是帮你写一个Todo App。是帮你管理一个复杂到任何一个人都无法完全理解的系统。\n\n当你有一百万行代码、一千个工程师、每周改几千次代码库——人类已经无法在脑海中保持整个系统的完整图景。你需要一个AI。一个不会累、不会忘、能看到全局的AI。\n\nCursor被买下的那一刻，它就不再只是一个\"帮你写代码\"的工具了。它是人类管理复杂性的最后一道防线。\n\n同一个月的另一条新闻：Cursor发布了iPhone App\n\n就在收购消息确认后两周，Cursor发布了iOS应用。\n\n功能很简单：启动和追踪AI Agent任务，通过iPhone的Live Activities功能实时查看Agent进度。\n\n听起来像是一个小更新。但放在收购的语境下看——\n\nSpaceX的工程师现在可以在吃午饭的时候掏出手机，看Cursor Agent在集群上跑了多少任务。发现bug？手机上点一下，Agent开始修。继续吃饭。\n\nAI编程工具从\"坐在电脑前用的IDE\"变成了\"随时随地监控AI同事工作进度\"的移动终端。\n\n这个形态转变，比功能更新重要一百倍。\n\n硅谷的AI收购潮：不是买技术，是买\"人机接口\"\n\nSpaceX买Cursor不是孤例。看看过去六个月：\n\n \nAnthropic与加州政府签约，让Claude接入所有州政府机构的日常工作\n\n \nGoogle将Gemini Spark AI Agent扩展到macOS——Spark现在可以访问和操作你电脑上的文件\n\n \nOpenAI与Work Louder合作推出Codex Micro——一个专门为Codex设计的物理键盘\n\n注意这些不是\"AI变得更好用了\"。这些是AI在获取行动的权限。\n\nClaude进政府系统。Spark进你的电脑文件。Codex有了实体键盘。Cursor被火箭公司买下。\n\n每一条新闻单独看都是\"技术更新\"。但放在一起看——\n\n2026年的AI叙事已经变了。不是在比谁更聪明。是在比谁能做事。\n\n能做的事情越多，就越需要被嵌入到真实世界的系统里。而每一次嵌入，都在重新定义\"人和AI之间的关系\"。\n\n这对你意味着什么\n\n如果你是一个普通用户——你不需要关心SpaceX花多少钱买Cursor。你甚至不需要关心Cursor是什么。\n\n但你需要关心一件事：\n\n当AI从\"回答问题的工具\"变成\"做事的助手\"，你和AI的关系会彻底改变。\n\n以前你问AI\"这段代码怎么改\"。以后你告诉AI\"把这个模块重构一下，跑通测试，然后通知我\"。你不再是一个操作者——你变成了一个管理者。\n\n管理者和操作者需要完全不同的技能。操作者需要\"知道怎么做好\"。管理者需要\"知道什么时候让AI做、什么时候自己接手、以及怎么判断AI做得对不对\"。\n\n大多数人都还没开始练习这项技能。\n\n最后说一句实话\n\n600亿美元买一个AI编程工具，这件事的意义不在于\"AI值钱了\"。\n\n意义在于：地球上最会造实物的人——一个把火箭送上火星的人——认为AI编程工具是像火箭发动机一样重要的基础设施。\n\n他把AI工具当作\"不能没有\"的东西来买。不是可有可无的插件。不是今年试试明年换的东西。是核心资产。\n\n如果SpaceX认为Cursor对造火箭是\"核心资产\"——那它对你写文章、做产品、管项目，是不是至少也值\"认真研究一下\"？\n\n转发给一个还在纠结\"AI到底有没有用\"的朋友。\n\n深海浪人鲸鱼 | 2026.07.01\n\n数据来源：SEC Filing / The Verge / Financial Times / Cursor官方发布","plain":"第26篇。SpaceX花600亿美元买了一个AI编程工具——这是2026年最被低估的信号。\n\nSpaceX花600亿美元买了一个AI编程工具——这是2026年最被低估的信号\n\n6月16日，SpaceX提交给SEC的文件确认：花600亿美元收购Cursor。\n\n600亿。美元。\n\n这是什么概念？SpaceX自己的IPO估值约3500亿美元。这笔收购花了它IPO估值的17%。一个做火箭的公司，把IPO筹的钱拿了六分之一，买了一个AI编程工具。\n\n这件事的奇怪程度，大概相当于福特汽车宣布花200亿美元收购一个IDE。\n\n所有人都在关注价格。但真正值得看的，是一个造火箭的人为什么需要一个AI编程工具。\n\n先理清时间线，因为这本身就是一场大戏\n\n4月，SpaceX宣布了一项\"特殊安排\"：要么以600亿美元收购Cursor，要么支付100亿美元分手费。这笔交易因为SpaceX在筹备上市而暂时搁置。\n\n6月初，SpaceX完成IPO。几天后，收购正式敲定。预计2026年第三季度完成交割。\n\n与此同时，Elon Musk一直在公开场合表达对xAI编程产品的失望。根据Financial Times的报道，xAI的编程工具\"落后于Claude Code和OpenAI Codex等热门产品\"。\n\n翻译：Musk自己做的AI编程工具不行。于是他花了600亿买了一个行的。\n\n但这不是故事的终点。这只是起点。\n\n为什么一个造火箭的需要AI编程工具？\n\n答案比\"因为Musk有钱\"深刻得多。\n\nSpaceX造的不是普通火箭。猎鹰9号有超过10万个零部件，每个零部件的设计、测试、迭代都涉及大量软件。从飞控系统到推进器模拟，从地面站到卫星通信——SpaceX本质上是一个软件公司偶尔发射硬件。\n\n而AI编程工具最有价值的地方，不是帮你写一个Todo App。是帮你管理一个复杂到任何一个人都无法完全理解的系统。\n\n当你有一百万行代码、一千个工程师、每周改几千次代码库——人类已经无法在脑海中保持整个系统的完整图景。你需要一个AI。一个不会累、不会忘、能看到全局的AI。\n\nCursor被买下的那一刻，它就不再只是一个\"帮你写代码\"的工具了。它是人类管理复杂性的最后一道防线。\n\n同一个月的另一条新闻：Cursor发布了iPhone App\n\n就在收购消息确认后两周，Cursor发布了iOS应用。\n\n功能很简单：启动和追踪AI Agent任务，通过iPhone的Live Activities功能实时查看Agent进度。\n\n听起来像是一个小更新。但放在收购的语境下看——\n\nSpaceX的工程师现在可以在吃午饭的时候掏出手机，看Cursor Agent在集群上跑了多少任务。发现bug？手机上点一下，Agent开始修。继续吃饭。\n\nAI编程工具从\"坐在电脑前用的IDE\"变成了\"随时随地监控AI同事工作进度\"的移动终端。\n\n这个形态转变，比功能更新重要一百倍。\n\n硅谷的AI收购潮：不是买技术，是买\"人机接口\"\n\nSpaceX买Cursor不是孤例。看看过去六个月：\n\nAnthropic与加州政府签约，让Claude接入所有州政府机构的日常工作\n\nGoogle将Gemini Spark AI Agent扩展到macOS——Spark现在可以访问和操作你电脑上的文件\n\nOpenAI与Work Louder合作推出Codex Micro——一个专门为Codex设计的物理键盘\n\n注意这些不是\"AI变得更好用了\"。这些是AI在获取行动的权限。\n\nClaude进政府系统。Spark进你的电脑文件。Codex有了实体键盘。Cursor被火箭公司买下。\n\n每一条新闻单独看都是\"技术更新\"。但放在一起看——\n\n2026年的AI叙事已经变了。不是在比谁更聪明。是在比谁能做事。\n\n能做的事情越多，就越需要被嵌入到真实世界的系统里。而每一次嵌入，都在重新定义\"人和AI之间的关系\"。\n\n这对你意味着什么\n\n如果你是一个普通用户——你不需要关心SpaceX花多少钱买Cursor。你甚至不需要关心Cursor是什么。\n\n但你需要关心一件事：\n\n当AI从\"回答问题的工具\"变成\"做事的助手\"，你和AI的关系会彻底改变。\n\n以前你问AI\"这段代码怎么改\"。以后你告诉AI\"把这个模块重构一下，跑通测试，然后通知我\"。你不再是一个操作者——你变成了一个管理者。\n\n管理者和操作者需要完全不同的技能。操作者需要\"知道怎么做好\"。管理者需要\"知道什么时候让AI做、什么时候自己接手、以及怎么判断AI做得对不对\"。\n\n大多数人都还没开始练习这项技能。\n\n最后说一句实话\n\n600亿美元买一个AI编程工具，这件事的意义不在于\"AI值钱了\"。\n\n意义在于：地球上 越需要被嵌入到真实世界的系统里。而每一次嵌入，都在重新定义\"人和AI之间的关系\"。\n这对你意味着什么\n如果你是一个普通用户——你不需要关心SpaceX花多少钱买Cursor。你甚至不需要关心Cursor是什么。\n但你需要关心一件事：\n当AI从\"回答问题的工具\"变成\"做事的助手\"，你和AI的关系会彻底改变。\n以前你问AI\"这段代码怎么改\"。以后你告诉AI\"把这个模块重构一下，跑通测试，然后通知我\"。你不再是一个操作者——你变成了一个管理者。\n管理者和操作者需要完全不同的技能。操作者需要\"知道怎么做好\"。管理者需要\"知道什么时候让AI做、什么时候自己接手、以及怎么判断AI做得对不对\"。\n大多数人都还没开始练习这项技能。\n最后说一句实话\n600亿美元买一个AI编程工具，这件事的意义不在于\"AI值钱了\"。\n意义在于：地球上最会造实物的人——一个把火箭送上火星的人——认为AI编程工具是像火箭发动机一样重要的基础设施。\n他把AI工具当作\"不能没有\"的东西来买。不是可有可无的插件。不是今年试试明年换的东西。是核心资产。\n如果SpaceX认为Cursor对造火箭是\"核心资产\"——那它对你写文章、做产品、管项目，是不是至少也值\"认真研究一下\"？\n\n[结尾 · 镜头拉近 + 画外音]\n转发给一个还在纠结\"AI到底有没有用\"的朋友。\n深海浪人鲸鱼 | 2026.07.01\n数据来源：SEC Filing / The Verge / Financial Times / Cursor官方发布\n\n[CTA · 屏幕文字]\n关注深海浪人鲸鱼，获取更多AI时代的个体生存策略。"},{"num":"27","wechat":"## 第27篇\n\n当你不再需要\"用\"AI的时候——程序员的身份危机刚刚开始\n\n深海浪人鲸鱼 | 2026.07.01\n\n当你不再需要\"用\"AI的时候——程序员的身份危机刚刚开始\n\n当你不再需要\"用\"AI的时候——程序员的身份危机刚刚开始\n\n过去48小时发生了三件事。\n\n第一件：Anthropic发布了Claude Sonnet 5。一个测试者让它调查一个bug。它自己写了测试、定位了代码、实现了修复、stash到Git、写了commit message——整个过程没有等任何人说\"下一步\"。\n\n第二件：Google把Gemini Spark Agent搬到了macOS上。Spark现在可以直接访问和操作你电脑上的文件。不是通过API。不是沙箱。是像你一样打开文件夹、读取文件、修改文件。\n\n第三件：SpaceX确认以600亿美元收购Cursor。一个造火箭的公司，把IPO筹的钱拿了六分之一，买了一个AI编程工具。Cursor同时发布了iPhone App——工程师可以掏出手机监控AI Agent的工作进度。\n\n三件事没有因果关系。但它们拼在一起，形成了一幅我从未见过的画面：\n\n我们正在从\"使用AI的人\"变成\"管理AI的人\"。\n\n而大多数人——包括我自己——还没准备好当管理者。\n\n从\"工具\"到\"同事\"——这个变化发生在一夜之间\n\n我回顾了一下自己过去一年和AI的关系：\n\n \n2025年6月：我让AI帮我写一段代码。它写了。我检查。我改。我提交。\n\n \n2026年1月：我让AI帮我写一个完整的功能。它写了。我跑测试。发现两个bug。我告诉它怎么修。它修了。我提交。\n\n \n2026年6月30日：Claude Sonnet 5的测试者说——\"我们把Sonnet 5放在几十个最难的真实PR上，它自己带着每个PR走到了测试通过、验证完成的结果。我们的工程师只需要做判断、做决策、最后签字。\"\n\n注意这句话里的主体变化。一年前的主体是\"我\"——我检查、我修改、我提交。今天的主体是\"它\"——它完成了。工程师只需要签字。\n\n这不仅仅是效率提升。这是身份转移。\n\n当你从\"写代码的人\"变成\"审查AI写的代码的人\"——你还是程序员吗？\n\n当你从\"做设计的人\"变成\"选择AI生成的设计方案的人\"——你还是设计师吗？\n\n当你从\"写文章的人\"变成\"审AI初稿然后加一句个人洞察的人\"——你还是作者吗？\n\n有一个词能描述这种状态：审查员\n\n不是创作者。不是执行者。是审查员。\n\n审查员的工作不是从零开始创造。是判断已有的东西好不好、安不安全、要不要改。\n\n这个角色不陌生。编辑在出版业做了几百年。代码审查在软件工程里是标准流程。质量检验在制造业是常识。\n\n但过去，审查是少数人的工作。大部分人做的是\"执行\"——写代码、画图、写文案。审查是执行完成后的一个步骤。\n\n现在，审查正在变成唯一剩下的工作。\n\nAI能做执行的全部。但\"判断\"这一步——目前——还是人的领地。Sonnet 5能自己写测试、修bug、提交代码，但\"这个修复方案对吗\"这个判断，测试者仍然握在手里。\n\n但这个领地能守住多久？\n\n加州政府已经做出了选择\n\n就在Sonnet 5发布同一天，加州政府宣布与Anthropic签约，让Claude接入所有州政府机构。\n\n这不是某个创业公司的试用。这是一个拥有3900万人口的州政府，把日常运作的一部分交给了AI。\n\n这意味着什么？意味着有人需要\"管理\"这些AI——判断它的输出是否合规、是否公平、是否安全。而这些人不是程序员。他们是政府雇员。\n\n换句话说：\"管理AI\"这个技能，正在从一个\"工程师技能\"变成\"所有知识工作者的通用技能\"。\n\n就像30年前\"会用Excel\"是会计的专属技能，后来变成所有人的基本功一样。\"会管理AI\"正在经历同样的扩散。\n\n三条规则，也许能帮你度过这个过渡期\n\n我花了三天思考这个问题。以下是我目前能想到的：\n\n第一条：不要抵抗。但要保持判断。\n\nAI替你写代码、做设计、写文案——接受它。但永远不要跳过\"我自己能不能判断这个东西好不好\"这一步。你不需要比AI更快。但你需要知道什么时候AI做错了。这个能力不会自动获取。它需要你仍然保持对领域核心知识的理解。\n\n第二条：把你的价值从\"执行\"迁移到\"决策\"。\n\n如果AI能在5分钟内写出你花5小时写的代码——那你的价值就不再是\"写代码快\"。你的价值是\"知道该写什么代码、以及为什么这个方案比那个方案好\"。执行会被AI吃掉。决策——至少目前——还不会。\n\n第三条：学会说\"不对，换一个\"。\n\n这是审查员最核心的技能。不是\"挑错\"——是\"判断整体方向\"。当AI给你一个完整的方案，你的价值不在于修改第3行和第7行。你的价值在于说\"这个思路有问题，换一个方向\"。这个判断力来自经验、直觉、和对领域本质的理解。它无法被prompt替代。\n\n最后说一句让我自己也不太舒服的实话\n\n我写了20多篇关于AI的文章。\n\n在这篇文章之前，我的心态一直是：AI是工具，我使用它。它让我更快、更好、更强。但我仍然是\"做事情\"的那个人。\n\n写完这篇文章，我意识到：\n\n我不再是\"做事情\"的那个人了。我是\"看AI做完事情后说OK\"的那个人。\n\n这两者之间有着本质区别。前者定义了\"我是谁\"。后者还没有名字。\n\n但这就是2026年7月的现实。AI不再是一个需要你操控的工具——它是一个需要你管理的同事。而管理一个永远不会累、不会忘、越来越聪明的同事，可能比你想象的更难。\n\n如果你也在想\"我到底是做什么的\"，转发这篇文章。至少证明你不是唯一一个。\n\n深海浪人鲸鱼 | 2026.07.01\n\n数据来源：Anthropic官方发布 / The Verge / Google Blog / SEC Filing / California州政府公告","plain":"第27篇。当你不再需要\"用\"AI的时候——程序员的身份危机刚刚开始。\n\n当你不再需要\"用\"AI的时候——程序员的身份危机刚刚开始\n\n过去48小时发生了三件事。\n\n第一件：Anthropic发布了Claude Sonnet 5。一个测试者让它调查一个bug。它自己写了测试、定位了代码、实现了修复、stash到Git、写了commit message——整个过程没有等任何人说\"下一步\"。\n\n第二件：Google把Gemini Spark Agent搬到了macOS上。Spark现在可以直接访问和操作你电脑上的文件。不是通过API。不是沙箱。是像你一样打开文件夹、读取文件、修改文件。\n\n第三件：SpaceX确认以600亿美元收购Cursor。一个造火箭的公司，把IPO筹的钱拿了六分之一，买了一个AI编程工具。Cursor同时发布了iPhone App——工程师可以掏出手机监控AI Agent的工作进度。\n\n三件事没有因果关系。但它们拼在一起，形成了一幅我从未见过的画面：\n\n我们正在从\"使用AI的人\"变成\"管理AI的人\"。\n\n而大多数人——包括我自己——还没准备好当管理者。\n\n从\"工具\"到\"同事\"——这个变化发生在一夜之间\n\n我回顾了一下自己过去一年和AI的关系：\n\n2025年6月：我让AI帮我写一段代码。它写了。我检查。我改。我提交。\n\n2026年1月：我让AI帮我写一个完整的功能。它写了。我跑测试。发现两个bug。我告诉它怎么修。它修了。我提交。\n\n2026年6月30日：Claude Sonnet 5的测试者说——\"我们把Sonnet 5放在几十个最难的真实PR上，它自己带着每个PR走到了测试通过、验证完成的结果。我们的工程师只需要做判断、做决策、最后签字。\"\n\n注意这句话里的主体变化。一年前的主体是\"我\"——我检查、我修改、我提交。今天的主体是\"它\"——它完成了。工程师只需要签字。\n\n这不仅仅是效率提升。这是身份转移。\n\n当你从\"写代码的人\"变成\"审查AI写的代码的人\"——你还是程序员吗？\n\n当你从\"做设计的人\"变成\"选择AI生成的设计方案的人\"——你还是设计师吗？\n\n当你从\"写文章的人\"变成\"审AI初稿然后加一句个人洞察的人\"——你还是作者吗？\n\n有一个词能描述这种状态：审查员\n\n不是创作者。不是执行者。是审查员。\n\n审查员的工作不是从零开始创造。是判断已有的东西好不好、安不安全、要不要改。\n\n这个角色不陌生。编辑在出版业做了几百年。代码审查在软件工程里是标准流程。质量检验在制造业是常识。\n\n但过去，审查是少数人的工作。大部分人做的是\"执行\"——写代码、画图、写文案。审查是执行完成后的一个步骤。\n\n现在，审查正在变成唯一剩下的工作。\n\nAI能做执行的全部。但\"判断\"这一步——目前——还是人的领地。Sonnet 5能自己写测试、修bug、提交代码，但\"这个修复方案对吗\"这个判断，测试者仍然握在手里。\n\n但这个领地能守住多久？\n\n加州政府已经做出了选择\n\n就在Sonnet 5发布同一天，加州政府宣布与Anthropic签约，让Claude接入所有州政府机构。\n\n这不是某个创业公司的试用。这是一个拥有3900万人口的州政府，把日常运作的一部分交给了AI。\n\n这意味着什么？意味着有人需要\"管理\"这些AI——判断它的输出是否合规、是否公平、是否安全。而这些人不是程序员。他们是政府雇员。\n\n换句话说：\"管理AI\"这个技能，正在从一个\"工程师技能\"变成\"所有知识工作者的通用技能\"。\n\n就像30年前\"会用Excel\"是会计的专属技能，后来变成所有人的基本功一样。\"会管理AI\"正在经历同样的扩散。\n\n三条规则，也许能帮你度过这个过渡期\n\n我花了三天思考这个问题。以下是我目前能想到的：\n\n第一条：不要抵抗。但要保持判断。\n\nAI替你写代码、做设计、写文案——接受它。但永远不要跳过\"我自己能不能判断这个东西好不好\"这一步。你不需要比AI更快。但你需要知道什么时候AI做错了。这个能力不会自动获取。它需要你仍然保持对领域核心知识的理解。\n\n第二条：把你的价值从\"执行\"迁移到\"决策\"。\n\n如果AI能在5分钟内写出你花5小时写的代码——那你的价值就不再是\"写代码快\"。你的价值是\"知道该写什么代码、以及为什么这个方案比那个方案好\"。执行会被AI吃掉。决策——至少目前——还不会。\n\n第三条：学会说\"不对，换一个\"。\n\n这是审查员最核心的技能。不是\"挑错\"——是\"判断整体方向\"。当AI给你一个完整的方案，你的价值不在于修改第3行和第7行。你的价值在于说\"这个思路有问题，换一个方向\"。这个判断力来自经验、直觉、和对领域本质的理解。它无法被prompt替代。\n\n最后说一句让我自己也不太舒服的实话\n\n我写了20多篇关于AI的文章。\n\n在这篇文章之前，我的心态一直是：AI是工具，我使用它。它让我更快、更好、更强。但我仍然是\"做事情\"的那个人。\n\n写完这篇文章，我意识到：\n\n我不再是\"做事情\"的那个人了。我是\"看AI做完事情后说OK\"的那个人。\n\n这两者之间有着本质区别。前者定义了\"我是谁\"。后者还没有名字。\n\n但这就是2026年7月的现实。AI不再是一个需要你操控的工具——它是一个需要你管理的同事。而管理一个永远不会累、不会忘、越来越聪明的同事，可能比你想象的更难。\n\n如果你也在想\"我到底是做什么的\"，转发这篇文章。至少证明你不是唯一一个。\n\n深海浪人鲸鱼 | 2026.07.01\n\n数据来源：Anthropic官方发布 / The Verge / Google Blog / SEC Filing / California州政府公告\n\n感谢收听。关注深海浪人鲸鱼，获取更多AI时代的个体生存策略。","video":"【第27篇 · 视频脚本】\n标题：当你不再需要\"用\"AI的时候——程序员的身份危机刚刚开始\n\n[开场 · 画外音 + 动态文字]\n当你不再需要\"用\"AI的时候—— 舒服的实话\n我写了20多篇关于AI的文章。\n在这篇文章之前，我的心态一直是：AI是工具，我使用它。它让我更快、更好、更强。但我仍然是\"做事情\"的那个人。\n写完这篇文章，我意识到：\n我不再是\"做事情\"的那个人了。我是\"看AI做完事情后说OK\"的那个人。\n这两者之间有着本质区别。前者定义了\"我是谁\"。后者还没有名字。\n但这就是2026年7月的现实。AI不再是一个需要你操控的工具——它是一个需要你管理的同事。而管理一个永远不会累、不会忘、越来越聪明的同事，可能比你想象的更难。\n\n[结尾 · 镜头拉近 + 画外音]\n如果你也在想\"我到底是做什么的\"，转发这篇文章。至少证明你不是唯一一个。\n深海浪人鲸鱼 | 2026.07.01\n数据来源：Anthropic官方发布 / The Verge / Google Blog / SEC Filing / California州政府公告\n\n[CTA · 屏幕文字]\n关注深海浪人鲸鱼，获取更多AI时代的个体生存策略。"},{"num":"28","wechat":"## 第28篇\n\nAI数据不用离开你的电脑了——这是Qwen 3.6被所有人忽略的真正革命\n\n深海浪人鲸鱼 | 原创洞察 | 2026.07.01\n\n前两天我写了两篇Qwen 3.6的文章。一篇讲它拿了893分，一篇讲它让人开始抢显卡。\n\n读者反馈最多的问题是：\"跟我有什么关系？我又不跑模型。\"\n\n今天这篇就是专门回答这个问题的。而且答案比你想的更大。\n\n先问你一个问题\n\n你上次用ChatGPT或者Claude的时候，输入了什么？\n\n如果你跟我一样，答案可能是：\n\n\"帮我看看这份体检报告，这些指标偏高是什么意思\"\n\n\"帮我分析一下这个合同有没有坑\"\n\n\"我最近跟XXX的关系出了点问题，帮我理一理\"\n\n\"这是我写了一半的日记，帮我接着写\"\n\n\"帮我把公司的财务报表整理成PPT\"\n\n现在停下来想一秒：这些文字现在在哪？\n\n在OpenAI的服务器上。在Anthropic的服务器上。在某个你从未听说过的第三方数据标注公司的服务器上。在一个你永远无法登录、无法删除、甚至无法确认真实位置的数据库里。\n\n你把你的身体数据、法律文件、亲密关系、日记、公司机密——全部打成一包文字，发给了陌生人。\n\n而你唯一的保障，是网站底部的\"隐私政策\"链接。那个链接你从来没点开过。\n\n我们不是不在乎隐私。我们是没办法\n\n过去两年，如果你想要一个能真正帮到你的AI，你只有两个选择：\n\n选择A：把数据送给美国公司。 ChatGPT、Claude、Gemini——功能强，但你的每一次对话都经过它们的服务器。OpenAI的隐私政策说\"我们不会用你的数据训练模型\"，但\"不会用来训练\"≠\"不会存储\"≠\"不会泄露\"≠\"不会被第三方访问\"。\n\n选择B：用本地模型，忍受降级体验。 Llama 3.1也好，Mistral也好，本地模型过去两年的定位一直是\"够用\"——能用，但需要道歉。\"它不太聪明\"\"复杂任务不行\"\"写代码各种幻觉\"。\n\n两年前，选择B是理想主义。你用本地模型不是因为它更好——是因为你不信任云端。你愿意为了隐私牺牲体验。\n\n这条路走到2026年6月28日，终结了。\n\nQwen 3.6改变的，不是模型更大\n\n所有人都盯着Qwen 3.6的基准测试分数看。但真正改变游戏规则的，是一个你很容易忽略的事实：\n\n在消费级硬件上，有史以来第一次，一个不需要道歉的本地AI出现了。\n\n什么概念？\n\n一张二手的RTX 3090（$600），装Qwen 3.6 27B。不联网。不付费。不限量。\n\n你把体检报告贴进去——数据在你的显卡上，从来不出你的机箱。\n\n你把合同贴进去——法务信息在你的显卡上，不经过任何人的服务器。\n\n你把日记贴进去——你最深的心思在你的显卡上，只有你和你的AI知道。\n\n这不是\"AI更聪明了\"。这是\"AI终于可以只属于你\"。\n\n你应该害怕的，不是AI。是没有隐私的AI\n\n我来说几个真实场景，你感受一下：\n\n场景一：医疗数据。 你把体检报告发给ChatGPT，问\"这个指标高了是什么意思\"。OpenAI的服务器现在有你的体检数据——你的年龄、血常规、肝功能、B超结果。这些数据跟你的IP地址关联，跟你的账户关联。没人知道这些数据将来会被用来做什么。但可以肯定的是——它们不会消失。\n\n场景二：商业机密。 你让Claude帮你分析竞争对手的定价策略，把内部数据贴了进去。你的竞品分析、成本结构、客户名单——现在在Anthropic的服务器上。你签的NDA（保密协议）只约束你的员工，不约束你的AI。\n\n场景三：心理咨询。 很多人——尤其是年轻人——开始用AI替代心理咨询。你告诉AI你的焦虑、你的创伤、你最脆弱的地方。这些文字在云端。如果有朝一日被泄露、被分析、被用于精准广告——后果是什么？\n\n场景四：创意资产。 你写了一本小说的前三章，让AI帮你续写。你不知道的是，很多云AI的条款里有一句\"你保留内容所有权，但授予我们使用许可\"。你的小说可能已经被用来训练下一个模型了。\n\n这些不是阴谋论。这些是只要有云端AI存在就不可避免的结构性风险。\n\n而Qwen 3.6做了一件很简单的事：把这些风险从你的生活里删除了。\n\n\"但我不是技术专家，我装不了本地模型\"\n\n一年前，这个反驳是成立的。\n\n2025年的本地模型部署是地狱难度：CUDA版本不对、显存不够、量化参数要自己调、GGUF格式要去HuggingFace找半天。\n\n今天，2026年7月1日：\n\nllama-server -hf unsloth/Qwen3.6-27B-MTP-GGUF:Q8_0 -ngl 999 --port 8080\n\n一条命令。回车。等几分钟。打开浏览器。你有了自己的AI。\n\n不需要Python环境。不需要Docker。不需要CUDA配置。甚至不需要API key。\n\n而且这条命令不是给程序员看的。未来三个月内——我打赌——会有人把它包装成一个双击就能用的桌面应用。就像当年BitTorrent从命令行变成uTorrent一样。\n\n到那时候，\"不会装\"这个理由就过期了。\n\n这不是反技术。这是拿回属于自己的东西\n\n我不想把这件事讲成\"对抗大公司\"的故事。那太简单了。\n\n我想讲的是：数据主权是数字时代最基本的权利。\n\n你的体检数据是你的。你的合同是你的。你的日记是你的。你的创意是你的。\n\n过去两年，为了使用AI，你不得不把这些东西交给别人。就像二十年前为了用邮箱你不得不用Gmail、为了存文件你不得不用Dropbox一样。\n\n但当时没有替代方案。现在有了。\n\nQwen 3.6不是\"更好的模型\"。它是\"第一个让你不再需要交出数据就能得到AI全部能力的模型\"。\n\n这两者之间的区别，就是「用别人的车」和「开自己的车」的区别。\n\n用别人的车——去哪司机都知道。什么时候上车、去哪、待了多久——全有记录。\n\n开自己的车——没人知道你去了哪。\n\n你在AI上输入的所有文字，本质上就是你的行踪轨迹。过去你必须坐\"别人的车\"。现在你可以开\"自己的车\"了。\n\n这场革命不会在一天内完成。但它已经开始了\n\n有三个趋势在同时加速：\n\n第一，硬件越来越便宜。 去年一张能跑好模型的显卡要$2000。今年一张RTX 3090二手$600。明年——当14B模型达到今天27B的水平时——8GB显存的设备就够了。你的Macbook Air够用了。\n\n第二，开源模型越来越强。 Llama 3.1 8B → Qwen 3.6 27B，半年时间，本地AI从\"凑合用\"变成了\"不用道歉\"。再过半年，本地AI在大部分日常任务上会跟云AI完全一致。\n\n第三，人们对隐私的意识在觉醒。 每一次数据泄露事件，都在推高\"本地AI\"的需求。不是出于意识形态——是出于恐惧。\n\n三个趋势汇聚到同一个点：本地AI从\"小众极客的选择\"变成\"所有在乎隐私的人的默认选项\"。\n\n这个转折点，就是现在。\n\n最后说一句实话\n\n我不是隐私原教旨主义者。我用Google、用微信、用淘宝。我知道我的数据在这些平台上。为了便利，我接受了一定程度的隐私让渡。\n\n但AI不一样。\n\n搜索引擎看到的是\"你搜了什么\"。AI看到的是\"你想了什么\"。\n\n这两者之间的隐私深度，差了一个数量级。\n\n当你的AI比你的配偶更了解你的恐惧、你的秘密、你的渴望——这个AI最好别在别人的服务器上。\n\nQwen 3.6真正的革命不是技术上的。是\"你的AI可以只属于你\"这件事，第一次从理想变成了现实。\n\n如果这篇文章让你开始思考\"我的数据现在在哪\"——它的目的就达到了。\n\n转发给一个还在往云端AI贴体检报告的朋友。\n\n数据来源：Qwen HuggingFace / Hacker News / llama.cpp 社区 / OpenAI 隐私政策 / Anthropic 服务条款\n\n深海浪人鲸鱼 · 关注获取下一篇","plain":"第28篇\n\nAI数据不用离开你的电脑了——这是Qwen 3.6被所有人忽略的真正革命\n\n前两天我写了两篇Qwen 3.6的文章。一篇讲它 把它包装成一个双击就能用的桌面应用。就像当年BitTorrent从命令行变成uTorrent一样。\n\n到那时候，"不会装"这个理由就过期了。\n\n这不是反技术。这是拿回属于自己的东西\n\n我不想把这件事讲成"对抗大公司"的故事。那太简单了。\n\n我想讲的是：数据主权是数字时代最基本的权利。\n\n你的体检数据是你的。你的合同是你的。你的日记是你的。你的创意是你的。\n\n过去两年，为了使用AI，你不得不把这些东西交给别人。就像二十年前为了用邮箱你不得不用Gmail、为了存文件你不得不用Dropbox一样。\n\n但当时没有替代方案。现在有了。\n\nQwen 3.6不是"更好的模型"。它是"第一个让你不再需要交出数据就能得到AI全部能力的模型"。\n\n这两者之间的区别，就是「用别人的车」和「开自己的车」的区别。\n\n用别人的车——去哪司机都知道。什么时候上车、去哪、待了多久——全有记录。\n\n开自己的车——没人知道你去了哪。\n\n你在AI上输入的所有文字，本质上就是你的行踪轨迹。过去你必须坐"别人的车"。现在你可以开"自己的车"了。\n\n这场革命不会在一天内完成。但它已经开始了\n\n有三个趋势在同时加速：\n\n第一，硬件越来越便宜。 去年一张能跑好模型的显卡要$2000。今年一张RTX 3090二手$600。明年——当14B模型达到今天27B的水平时——8GB显存的设备就够了。你的Macbook Air够用了。\n\n第二，开源模型越来越强。 Llama 3.1 8B → Qwen 3.6 27B，半年时间，本地AI从"凑合用"变成了"不用道歉"。再过半年，本地AI在大部分日常任务上会跟云AI完全一致。\n\n第三，人们对隐私的意识在觉醒。 每一次数据泄露事件，都在推高"本地AI"的需求。不是出于意识形态——是出于恐惧。\n\n三个趋势汇聚到同一个点：本地AI从"小众极客的选择"变成"所有在乎隐私的人的默认选项"。\n\n这个转折点，就是现在。\n\n最后说一句实话\n\n我不是隐私原教旨主义者。我用Google、用微信、用淘宝。我知道我的数据在这些平台上。为了便利，我接受了一定程度的隐私让渡。\n\n但AI不一样。\n\n搜索引擎看到的是"你搜了什么"。AI看到的是"你想了什么"。\n\n这两者之间的隐私深度，差了一个数量级。\n\n当你的AI比你的配偶更了解你的恐惧、你的秘密、你的渴望——这个AI最好别在别人的服务器上。\n\nQwen 3.6真正的革命不是技术上的。是"你的AI可以只属于你"这件事，第一次从理想变成了现实。\n\n如果这篇文章让你开始思考"我的数据现在在哪"——它的目的就达到了。\n\n转发给一个还在往云端AI贴体检报告的朋友。","video":"## 第28篇：本地AI数据隐私革命\n\n**主题定位**：Qwen 3.6如何让AI数据主权从理想变成现实  \n**视觉方向**：冷暖对比（云端数据流动的冷蓝色 vs 本地隐私的暖橙色）  \n**时长建议**：75-90秒\n\n### 场景1：Hook（0-15s）\n- **画面**：手机屏幕快速切换——体检报告→合同→私人对话→日记→财务报表，每张图上浮出「发送中…」字样，数据像水流一样汇聚到云端服务器图标\n- **旁白**：你上次用ChatGPT的时候，输入了什么？体检报告？合同？日记？这些文字现在在哪——在OpenAI的服务器上。在一个你永远无法登录的数据库里。你把你的身体数据、法律文件、亲密关系、公司机密——全部发给了陌生人。\n\n### 场景2：两难困境（15-35s）\n- **画面**：画面分裂为两半——左侧蓝色调（云端AI图标+发送数据动画），右侧暖橙色（本地电脑图标，但打着问号）。字幕：选择A vs 选择B\n- **旁白**：过去两年你只有两个选择。选择A：把数据送给美国公司，换一个能用的AI。选择B：用本地模型，忍受降级体验。两年前，选择B是理想主义——你不是因为它更好，是因为你不信任云端。\n\n### 场景3：转折点（35-55s）\n- **画面**：2026年6月28日日历翻页特效。Qwen 3.6图标出现。一台电脑屏幕上显示「数据在本机，不联网」。价格标签：RTX 3090 $600。\n- **旁白**：这条路走到2026年6月28日，终结了。Qwen 3.6——在消费级硬件上，有史以来第一次，一个不需要道歉的本地AI出现了。一张二手RTX 3090，六百美元。你把体检报告贴进去——数据在你的显卡上，从来不出你的机箱。你把日记贴进去——只有你和你的AI知道。\n\n### 场景4：四个场景快切（55-75s）\n- **画面**：四格画面快速轮转——①医院/体检报告 ②办公室/合同 ③深夜/私人对话 ④画板/小说手稿。每格出现红色警报符号后切换到绿色「本地AI」保护锁\n- **旁白**：场景一：医疗数据——你的体检报告在OpenAI服务器上，跟你的账户关联，不会消失。场景二：商业机密——你的竞品分析在Anthropic服务器上，NDA不约束你的AI。场景三：心理咨询——你的创伤和焦虑在云端。场景四：创意资产——你的小说可能已经被用来训练下一个模型。这些不是阴谋论——是只要有云端AI就不可避免的结构性风险。Qwen 3.6做了一件事：把这些风险从你的生活里删除了。\n\n### 场景5：收尾（75-90s）\n- **画面**：屏幕一分为二——左侧「搜索引擎看到的是：你搜了什么」，右侧放大「AI看到的是：你想了什么」。最后浮现一行大字：「你的AI可以只属于你」。\n- **旁白**：我不是隐私原教旨主义者。我用Google、用微信。但AI不一样。搜索引擎看到的是你搜了什么。AI看到的是你想了什么。当你的AI比你的配偶更了解你的恐惧、你的秘密、你的渴望——这个AI最好别在别人的服务器上。Qwen 3.6真正的革命不是技术上的。是你的AI可以只属于你这件事，第一次从理想变成了现实。"}},{"num":"29", "wechat": "## 第29篇\n\n72%的公司说在用AI——只有11%真的用它替代了人\n\n深海浪人鲸鱼 | 原创深度 | 2026.07.01\n\n先说一组数字，你感受一下。\n\nMcKinsey 2025年最新报告：72%的组织声称已在至少一个业务部门\"采用AI\"。这个数字两年前还不到50%。\n\n听起来很猛，对吧？\n\n同份报告里还有另一个数字：只有11%的企业表示AI带来了\"显著的利润贡献\"。\n\n72% vs 11%。\n\n中间那61个百分点，就是「PPT里的AI」和「真金白银的AI」之间的距离。\n\n上个月我和一位在SaaS公司做CTO的朋友吃饭。他说了句大实话：\"我们去年投入370万做AI转型，最大的成果是——CEO在投资人会议上多了一页PPT。\"\n\n这篇文章，我想把这件事掰开来看。谁真的在用AI替代人、替代流程、替代成本？谁在花钱买了一张\"AI入场券\"，其实什么都没变？\n\n---\n\n三张数据图，把真相画给你看\n\nMcKinsey把AI在企业里的落地状态分成了四个层级。我翻译成人话：\n\n第一层：观察者（~28%）——还没用，或者正在\"评估\"。翻译：成立了AI委员会，开过两次会，选了两个人去学Prompt Engineering。AI对这家公司的影响=0。\n\n第二层：实验者（~35%）——在某个部门搞了Pilot，通常是客服或市场部接入了一个ChatBot，或者让员工\"可以自己用Copilot试试\"。这是最大的一批。他们上了新闻稿，但没改任何流程。\n\n第三层：整合者（~25%）——AI被嵌入到核心工作流里。不是\"旁边多了一个AI助手\"，而是把某个环节直接换成了AI。比如：客服第一响应由AI完成，人工只处理升级工单；简历筛选从HR手动→AI初筛+HR复核。\n\n第四层：重构者（~11%）——顶层。这些公司不是在旧流程上贴AI，而是用了AI之后重新设计了整个业务流程。客服团队从50人缩到8人但响应速度提高了3倍。财务部不再做月结加班，因为AI每天晚上自动对数。产品设计从\"产品经理画原型\"变成了\"产品经理描述需求→AI出10版→挑选迭代\"。\n\n重点来了：\n\n第一层和第二层加一起占63%。\n\n也就是说，每10家说自己\"在用AI\"的公司里，6家只是在用别人做的AI工具发了条消息，根本没有任何结构性变化。\n\nForrester 2025年的调研更直接：在声称\"AI已投产\"的企业中，80%的所谓\"投产\"其实只是某个边缘场景的上线——比如官网加了智能客服。核心业务纹丝不动。\n\n---\n\n谁在真干，谁在喊口号——一个简单的判断框架\n\n我总结了一个特别简单的办法，帮你判断一家公司的AI到底是来真的还是在演戏：\n\n看三样东西：预算在哪？组织架构变了吗？考核指标变了吗？\n\n具体来说：\n\n1. 预算。真正用AI替代人的公司，AI预算单独列支且占IT预算15%以上。喊口号的公司，AI预算藏在\"数字化\"项目里，大概占IT预算的3%-5%，本质上是买了个ChatGPT Enterprise全员账号。\n\n2. 组织架构。真正在重构的公司，会出现\"AI产品经理\"\"AI工作流设计师\"\"人机协作运营\"这些新岗位。喊口号的公司，让现有IT部门兼管，CTO发一份邮件说\"大家可以开始用Copilot了\"。\n\n3. 考核指标。真干的公司在改KPI——客服不是考核\"接了多少电话\"而是考\"AI处理了多少，人工处理了多少，AI未解决率是多少\"。人力部门开始考核\"每招聘周期AI降低的成本\"。喊口号的公司，KPI一个字没动。\n\n这三个维度加起来，比任何\"AI成熟度评估模型\"都管用。\n\n下次你看到某家公司宣布\"全面拥抱AI\"，你就问这三个问题。99%的答案会让你笑出声。\n\n---\n\n四个行业，四种真实状态\n\n来看几个具体行业，AI落地的真实水位：\n\n客服行业——已经是AI的了。这不是预测，是现在进行时。美国Top 50的零售商中，超过40%已经把一线客服完全交给AI，人工变成\"监督员\"。Klarna 2024年用AI客服替代了700个外包客服岗位，沟通效率提升的同时客户满意度反而上升。这是最血腥的AI替代战场——因为客服工作本身高度标准化，是AI最容易拿下的高地。\n\n软件开发——正在被蚕食，但程序员还没慌。GitHub Copilot有超过180万付费用户。Google内部42%的代码由AI生成。但这些数据被误读了。AI生成的代码主要是重复劳动——CRUD接口、单元测试、配置文件。复杂架构设计、debug、跨系统集成——AI还差得远。所以你看到的现象很奇怪：初级程序员的岗位确实在减少，但资深工程师的薪资在涨。AI替代的是\"码农\"，不是\"工程师\"。\n\n金融行业——嘴炮冠军。摩根大通CEO Jamie Dimon 2024年公开说\"AI将改变每一份工作\"，高盛发了几十份AI研究报告。但实际上，大银行的AI应用主要集中在三个地方：反欺诈（这不是AI，这是ML，他们用了二十年了）、交易算法（同上）、客服Bot。核心业务——信贷审批、风险定价、资产配置——AI的影子极其微弱。原因很简单：监管不允许黑箱决策。你想用AI批贷款？监管问你\"为什么拒绝这个人\"，你的AI答不上来。金融业会用AI，但替代人是另一回事。\n\n制造业——意料之外的黑马。你以为制造业笨重、传统、跟不上？错了。制造业在AI落地上的速度远超金融。原因也很朴素：工厂里不需要\"AI解释为什么\"，只需要\"AI检测这个零件合不合格\"。质量检测、预测性维护、供应链优化——这些都是AI的甜蜜点。富士康2024年在郑州工厂用AI视觉检测替代了60%的人工质检岗。不声不响，换了就是换了。\n\n---\n\nAI替代人的三个必要条件——别再被忽悠了\n\n从这些行业数据里，我提炼出一个框架：AI真正替代人的岗位，必须同时满足三个条件。\n\n条件一：任务高度可标准化。客服脚本、数据录入、质量检测——流程越固定，AI替代越快。反过来，需要跨部门协调、需要创造性判断的岗位——项目经理、产品负责人——AI暂时连边都摸不到。\n\n条件二：错误成本可控。质检漏了一个瑕疵品，成本是一台退货。AI写代码出了bug，有人review。但AI批错了贷款怎么办？AI误诊了病人怎么办？这就是为什么金融和医疗是AI替代率最低的行业——不是AI不够好，而是错误的人力成本和法律风险太高。\n\n条件三：不需要解释。这是最被忽视的一条。很多AI系统——尤其是深度学习模型——是黑箱。你喂数据进去，答案出来，但没人知道\"为什么是这个答案\"。很多行业恰恰需要\"为什么\"：法官需要解释量刑理由，医生需要解释诊断依据，HR需要解释为什么没录用这个人。在这些场景里，AI可以是助手，但做不了决策者。\n\n用这三个条件去套你听说的每一个\"AI替代人了\"的故事：\n\n\"AI替代了客服\"——三项全满足。真的。\"AI替代了金融分析师\"——第三项不满足。假的。\"AI替代了CEO\"——三项全不满足。智商税。\n\n---\n\n最危险的，不是被AI替代的人\n\n回到那个McKinsey的数据：72%声称在用AI，只有11%真正看到了效果。\n\n61%的差距意味着什么？\n\n意味着大多数企业花了钱、开了会、发了新闻稿——但生产力和竞争力没有任何实质性变化。\n\n而真正危险的不是这些企业里的员工。真正危险的，是那些在11%的企业里，做着标准化、可替代、不需要解释的工作的人。\n\n他们可能还没意识到——AI不是在\"未来\"替代他们。AI是在今年替代他们。\n\n而那些看着自己的公司在61%里庆幸\"我们老板还没想明白\"的人——你们只是还没等到你的CEO读到这篇报告。\n\n---\n\n最后，三句话总结\n\n第一句：如果你的工作是高度重复、高度标准化、不需要解释的——不管你喜不喜欢，你的岗位在18个月内会被AI吃掉。这不是预测，是已经在发生的事实。\n\n第二句：如果你的工作需要跨领域判断、需要解释复杂的因果关系、需要创造性——AI会变成你的加速器，而不是替代者。你该做的不是害怕，是去学怎么用它。\n\n第三句：如果你是管理者，这篇文章最该让你焦虑的不是\"要不要用AI\"，而是\"你的竞争对手里，那11%的公司已经在用AI重构业务了，而你可能还卡在'要不要买个ChatGPT企业账号'的问题上。\"\n\n转发给一个还在公司\"AI委员会\"里开会的人。\n\n---\n\n数据来源：McKinsey Global Institute \"The State of AI 2025\" / Forrester \"Generative AI in the Enterprise Q1 2025\" / GitHub Copilot官方数据 / Klarna 2024年报 / 富士康2025智能制造白皮书", "plain": "72%的公司说在用AI——只有11%真的用它替代了人\n\n深海浪人鲸鱼 | 2026.07.01\n\n先说一组数字。\n\nMcKinsey 2025年最新报告：72%的组织声称已在至少一个业务部门\"采用AI\"。这个数字两年前还不到50%。\n\n听起来很猛对吧？\n\n同份报告里还有一个数字：只有11%的企业表示AI带来了\"显著的利润贡献\"。\n\n72%对11%。\n\n中间那61个百分点，就是\"PPT里的AI\"和\"真金白银的AI\"之间的距离。\n\n上个月我和一位SaaS公司的CTO朋友吃饭。他说了句大实话：\"我们去年投入370万做AI转型，最大的成果是——CEO在投资人会议上多了一页PPT。\"\n\n这篇文章，我要把这件事掰开来看。谁真的在用AI替代人、替代流程、替代成本？谁在花钱买了一张\"AI入场券\"，其实什么都没变？\n\nMcKinsey把AI在企业里的落地状态分成了四个层级。\n\n第一层：观察者，约28%。还没用，或者正在\"评估\"。成立了AI委员会，开过两次会，选了两个人去学Prompt Engineering。AI对这家公司的影响等于零。\n\n第二层：实验者，约35%。在某个部门搞了Pilot，通常是客服或市场部接入了一个ChatBot，或者让员工可以自己用Copilot试试。这是最大的一批。他们上了新闻稿，但没改任何流程。\n\n第三层：整合者，约25%。AI被嵌入到核心工作流里。不是旁边多了一个AI助手，而是把某个环节直接换成了AI。比如客服第一响应由AI完成，人工只处理升级工单。简历筛选从HR手动变为AI初筛加HR复核。\n\n第四层：重构者，约11%。顶层。这些公司不是在旧流程上贴AI，而是用了AI之后重新设计了整个业务流程。客服团队从50人缩到8人但响应速度提高了3倍。财务部不再做月结加班，因为AI每天晚上自动对数。产品设计从产品经理画原型变成了产品经理描述需求，AI出10版，挑选迭代。\n\n重点来了：第一层和第二层加一起占63%。也就是说，每10家说自己\"在用AI\"的公司里，6家只是在用别人做的AI工具，根本没有任何结构性变化。Forrester 2025年的调研更直接：在声称AI已投产的企业中，80%的所谓投产其实只是某个边缘场景的上线，比如官网加了智能客服。核心业务纹丝不动。\n\n怎么判断一家公司是真用AI还是喊口号？看三样东西：预算，组织架构，考核指标。\n\n第一，预算。真正用AI替代人的公司，AI预算单独列支且占IT预算15%以上。喊口号的公司，AI预算藏在数字化项目里，大概占IT预算的3%到5%，本质上是买了个ChatGPT Enterprise全员账号。\n\n第二，组织架构。真正在重构的公司，会出现AI产品经理、AI工作流设计师、人机协作运营这些新岗位。喊口号的公司，让现有IT部门兼管，CTO发一份邮件说大家可以开始用Copilot了。\n\n第三，考核指标。真干的公司在改KPI。客服不是考核接了多少电话，而是考AI处理了多少，人工处理了多少，AI未解决率是多少。人力资源部门开始考核每招聘周期AI降低的成本。喊口号的公司，KPI一个字没动。\n\n这四个行业来看看真实状态。\n\n客服行业，已经是AI的了。美国Top 50的零售商中，超过40%已经把一线客服完全交给AI，人工变成监督员。Klarna 2024年用AI客服替代了700个外包客服岗位，沟通效率提升的同时客户满意度反而上升。这是最血腥的AI替代战场，因为客服工作本身高度标准化。\n\n软件开发，正在被蚕食，但程序员还没慌。GitHub Copilot有超过180万付费用户。Google内部42%的代码由AI生成。但这些数据被误读了。AI生成的代码主要是重复劳动，CRUD接口、单元测试、配置文件。复杂架构设计、debug、跨系统集成，AI还差得远。所以你看到的现象很奇怪：初级程序员的岗位确实在减少，但资深工程师的薪资在涨。AI替代的是码农，不是工程师。\n\n金融行业，嘴炮冠军。摩根大通CEO公开说AI将改变每一份工作，高盛发了几十份AI研究报告。但实际上，大银行的AI应用主要集中在三个地方：反欺诈，这不是AI是ML，他们用了二十年了。交易算法，同上。客服Bot。核心业务，信贷审批、风险定价、资产配置，AI的影子极其微弱。原因很简单：监管不允许黑箱决策。你想用AI批贷款？监管问你为什么拒绝这个人，你的AI答不上来。金融业会用AI，但替代人是另一回事。\n\n制造业，意料之外的黑马。你以为制造业笨重、传统、跟不上？错了。制造业在AI落地上的速度远超金融。原因也很朴素：工厂里不需要AI解释为什么，只需要AI检测这个零件合不合格。质量检测、预测性维护、供应链优化，这些都是AI的甜蜜点。富士康2024年在郑州工厂用AI视觉检测替代了60%的人工质检岗。不声不响，换了就是换了。\n\nAI替代人的三个必要条件。条件一：任务高度可标准化。客服脚本、数据录入、质量检测。流程越固定，AI替代越快。条件二：错误成本可控。质检漏了一个瑕疵品，成本是一台退货。但AI批错了贷款怎么办？AI误诊了病人怎么办？这就是为什么金融和医疗是AI替代率最低的行业。条件三：不需要解释。很多AI系统是黑箱，数据进去，答案出来，但没人知道为什么是这个答案。法官需要解释量刑理由，医生需要解释诊断依据，HR需要解释为什么没录用这个人。\n\n用这三个条件去套每个\"AI替代人了\"的故事：AI替代了客服，三项全满足，真的。AI替代了金融分析师，第三项不满足，假的。AI替代了CEO，三项全不满足，智商税。\n\n回到McKinsey的数据：72%声称在用AI，只有11%真正看到了效果。61%的差距意味着大多数企业花了钱、开了会、发了新闻稿，但生产力和竞争力没有任何实质性变化。\n\n真正危险的不是这些企业里的员工。真正危险的，是那些在11%的企业里，做着标准化、可替代、不需要解释的工作的人。他们可能还没意识到，AI不是在\"未来\"替代他们，AI是在今年替代他们。\n\n而那些看着自己的公司在61%里庆幸老板还没想明白的人，你们只是还没等到你的CEO读到这篇报告。\n\n最后三句话总结。\n\n第一句：如果你的工作是高度重复、高度标准化、不需要解释的，不管你喜不喜欢，你的岗位在18个月内会被AI吃掉。这不是预测，是已经在发生的事实。\n\n第二句：如果你的工作需要跨领域判断、需要解释复杂的因果关系、需要创造性，AI会变成你的加速器而不是替代者。你该做的不是害怕，是去学怎么用它。\n\n第三句：如果你是管理者，这篇文章最该让你焦虑的不是要不要用AI，而是你的竞争对手里，那11%的公司已经在用AI重构业务了，而你可能还卡在要不要买个ChatGPT企业账号的问题上。\n\n转发给一个还在公司\"AI委员会\"里开会的人。\n\n数据来源：McKinsey Global Institute \"The State of AI 2025\" / Forrester \"Generative AI in the Enterprise Q1 2025\" / GitHub Copilot官方数据 / Klarna 2024年报 / 富士康2025智能制造白皮书", "video": "企业AI替代岗位——现实与炒作的差距 / Enterprise AI Job Replacement — Reality vs Hype\n\n视频信息\n- 总时长：约85-95秒\n- 风格：数据驱动的深度分析视频，快节奏、信息密度高\n- 色调：冷调蓝灰为主，关键数据用红色高亮\n- 配乐：冷静电子乐，关键时刻有数据冲击音效\n\n---\n\n[开场] 数据冲击（0-10s）\n- 画面：屏幕一分为二。左侧白色大数字\"72%\"，右侧白色大数字\"11%\"。中间一条裂痕分开两边\n- 旁白：McKinsey 2025年最新报告——72%的组织声称已采用AI。72%。但同一份报告里，只有11%的企业看到了真正的利润贡献。72%对11%。中间这61个百分点，就是PPT里的AI和真金白银的AI之间的距离\n\n[章节一] 四层企业，你老板在哪层？（10-30s）\n- 画面：四层金字塔动态构建。底层灰色→\"28% 观察者\"，第二层浅蓝→\"35% 实验者\"，第三层深蓝→\"25% 整合者\"，顶层金色→\"11% 重构者\"。前三层逐渐变暗，只有顶层高亮\n- 旁白：McKinsey把企业AI成熟度分成了四层。第一层观察者，28%，成立了AI委员会，开了两次会。第二层实验者，35%，这是最大的一批——搞了个ChatBot，上了新闻稿，但流程一点没变。第三层整合者，25%，开始把AI嵌入核心工作流。第四层重构者，只有11%——不是贴AI，是拆了重来。前三层加起来63%，每10家公司，6家就是多买了一页PPT\n\n[章节二] 四行业真实水位（30-55s）\n- 画面：四格行业轮播。①客服行业绿色✅ ②软件开发黄绿色⚠️ ③金融行业红色❌ ④制造业绿色✅。每格浮现关键数据\n- 旁白：客服行业，已经是AI的了。美国Top 50零售商，超四成一线客服已AI化。软件行业，在蚕食——Copilot 180万用户，Google 42%代码AI生成，但AI替代的是码农，不是工程师。金融行业，嘴炮冠军——摩根大通CEO喊得最响，核心业务AI影子都没有，因为监管不允许黑箱决策。制造业，意外黑马——富士康郑州工厂，AI视觉检测替了60%质检岗，不声不响\n\n[章节三] AI替代三条件框架（55-75s）\n- 画面：三个并排的条件卡片依次翻转亮起。①标准化 → \"客服✅ 数据分析✅ CEO❌\" ②错误成本 → \"质检✅ 医疗❌ 金融❌\" ③不需要解释 → \"检测✅ 判决❌ 招聘❌\"\n- 旁白：我提炼了一个框架——AI替代岗位必须同时满足三个条件：标准化、错误成本可控、不需要解释。客服，三项全满足。金融分析师，需要解释所以不到位。CEO，三项全不满足，智商税。用这三个条件去套所有AI替代人的故事\n\n[收尾] 谁是危险的（75-90s）\n- 画面：屏幕从分隔的72%和11%合为一个大问号。然后裂开——11%那半变红，出现\"高危岗位\"警示。最后浮现三行字\n- 旁白：真正危险的不是那些61%公司的员工。真正危险的是那11%公司里，做标准化、可替代、不需要解释工作的人。AI不是在\"未来\"替代他们。AI是在今年替代他们。三句话：标准化岗位18个月内会消失。创造性岗位，AI是加速器不是替代者。如果你是管理者，竞争对手里那11%已经在重构业务了，你还卡在要不要买ChatGPT企业账号"}},{"num":"30","wechat":"## 第9篇\n\n写了15年代码，AI让我第一次体会到「做一个产品只要一个下午」\n\n深海浪人鲸鱼 | 原创深度 | 2026.07.01\n\n先说一个场景，看看有没有你的影子。\n\n2010年，我大三，想做一个课程表App。配置Xcode环境用了两天，翻了一堆英文文档，照着Stack Overflow改了不知道多少轮。两周后终于跑通了第一个版本——能显示课程时间，经常闪退。\n\n2016年，我在一家创业公司，想做一个内部的数据看板。选后端框架、搭数据库、写API、画前端页面、部署服务器——前前后后一个月。做完的时候团队已经不需要这个看板了。\n\n2026年，一个周三下午，两点钟。我打开Cursor，对着那个聊天的窗口打了一行字：\n\n「我要一个网页应用，管理我的公众号文章。可以显示文章列表、一键复制内容到剪贴板、标记发布状态，数据存localStorage。要好看。干净的白底设计。」\n\n四点五十分，喝掉第四杯茶，我拿到了一个完整工作的dashboard。有排序、有筛选、有状态管理。不闪退。做了我15年前需要两周、10年前需要一个月的东西——一个下午。\n\n不是加了个功能。是从零到一。\n\n那天晚上我坐在电脑前，有一种很奇怪的感觉。不只是「工具好用」。是某种更深的东西——一个写了15年代码的人，第一次发现「做一个东西」和「学做一个东西」可以分开。\n\n---\n\n15年，学做东西 vs 做东西\n\n写程序这件事，90%的时间不是在想「这个东西应该是什么样的」，而是在查「这个功能怎么写」。\n\n我数了数15年里，我的「真实开发时间分配」大概是这样的：\n\n40% 在学。 查API文档、读教程、看GitHub issues、Stack Overflow。不是你的问题——是每一个新需求都可能涉及你从没碰过的领域。\n\n30% 在修。 环境配置不对、依赖冲突、版本不兼容。你以为30分钟能搞定，一抬头天黑了。\n\n20% 在重构。 写完发现数据结构不对，或者产品经理改了需求，或者三个月后你自己看不懂了。\n\n10% 在做。 真正写业务逻辑、实现功能的时间，大概只有这么多。\n\n这不是一个效率问题。这是软件工程的DNA——学习成本远高于执行成本。\n\n而Coding Agent做了一件事：它把这个比例反过来了。\n\n当你不需要「学怎么用Tailwind写一个表格」，只需要描述「我要一个表格，三列，能排序」，那个漫长的学习曲线突然被抽走了。\n\n剩下的是什么？剩下的是你的想法是否值得被实现。\n\n---\n\n不是工具变快了，是你的想法终于能追上你的手\n\n我觉得很多人理解错了Coding Agent的价值。\n\n他们以为是「写代码更快了」。不是。\n\n是「想法的折损率」降低了。\n\n以前做一个小项目，想法在脑子里是100分。等你搭好环境、配好框架、写完第一版——可能只剩40分了。不是说代码写得不好，是说那个100分的念想，在漫长的执行中被磨损了。你累了，你怀疑了，你觉得「算了就这样吧」。\n\n但当你可以在一个下午里看到完整的东西——\n\n那个下午，你的想法还是热的。你在两点钟的冲动，四点钟就变成了屏幕上一个能点的按钮。\n\n这种「即时兑现」的感觉，做了15年程序员，我只在Coding Agent上体验过。\n\n不是更快。是冲动还没冷却，东西已经在了。\n\n---\n\n我试过的那些Agent——不是评测，是感受\n\nCursor：我最早用的是它。最让我震撼的不是补全代码（Copilot也能做），是Composer模式——你描述整个feature，它在多个文件里一起改。那种感觉像你跟一个比你快10倍的人pair programming，你打字的速度成了瓶颈。\n\nDevin：AI软件工程师的概念。我让它做一个数据处理脚本，看它在终端里自己敲命令、自己debug、自己读报错——那个时刻我意识到，我不是在「用工具」，我是在「分配任务」。角色变了。\n\nClaude Code/OpenClaw：更像一个能理解你整个代码库的同事。它不是回答你的问题——它是在你的项目context里替你改东西。最关键的区别：它不只是写代码，它会读你的文件、理解你的架构、然后提建议。\n\nSweep：专门做PR review和自动化fix的。说实话我用得不多，但它代表的趋势值得关注——AI不只是帮你写新代码，它在帮你养旧代码。\n\n如果一定要用一个比喻：\n\nCopilot时代，我像有个助手帮我递工具。\n\nAgent时代，我像一个导演，在跟一个能写代码的演员说戏。\n\n---\n\n但有些东西，15年没变\n\n我必须说清楚。\n\nAgent能把一个下午的产出放大10倍。但它不能告诉你要做什么。\n\n那个dashboard，AI帮我写得很漂亮。但它不知道「我为什么要做这个dashboard」「我的文章需要什么管理功能」「哪些交互是对的」——这些是15年写代码的直觉、产品的判断。\n\n还有一个更微妙的东西：审美。\n\nAI能写CSS，但写出来的东西有一股「AI味」——规整、标准、没有任何意外。但你想要的那个「感觉对了」的设计——那个间距、那个圆角、那个颜色——还是你自己调出来的。\n\nCoding Agent解决的是「怎么做」。它把15年要学的「怎么做」压缩到了一个下午。\n\n但「做什么」和「为什么做」——这是另一个15年要学的东西。AI暂时替代不了。\n\n而这可能是个好消息。\n\n---\n\n如果你也是那个熬了15年的人\n\n我想对一种特定的人说这段话——写了很久代码的人。\n\n你脑子里可能已经存了几十个「有一天我要做」的产品想法。大部分死在「没时间学那个技术栈」上了。\n\n现在，那些想法突然可以兑现了。\n\n不是说明天你的主业就不写代码了。是你可以把下午三点到五点的两个小时，变成之前两周的产出。\n\n15年，终于等到写代码变成「你只要知道自己要什么就行了」。\n\n这可能是我们这个职业经历过的，最公平的一件事。\n\n打开Cursor。描述你想要的那个东西。然后看着它出现。\n\n你会发现那个下午，比其他任何时候都像一个写代码的好时代。\n\n数据来源：基于Cursor/Devin/Claude Code/OpenClaw/Sweep的实际使用体验。所有感受均为第一手观察。\n\n深海浪人鲸鱼 · 关注获取下一篇","plain":"第9篇\n\n写了15年代码，AI让我第一次体会到「做一个产品只要一个下午」\n2010年，我大三，想做一个课程表App。配置Xcode环境用了两天，翻了一堆英文文档，照着Stack Overflow改了不知道多少轮。两周后终于跑通了第一个版本——能显示课程时间，经常闪退。\n2016年，我在一家创业公司，想做一个内部的数据看板。选后端框架、搭数据库、写API、画前端页面、部署服务器——前前后后一个月。做完的时候团队已经不需要这个看板了。\n2026年，一个周三下午，两点钟。我打开Cursor，对着那个聊天的窗口打了一行字：\n「我要一个网页应用，管理我的公众号文章。可以显示文章列表、一键复制内容到剪贴板、标记发布状态，数据存localStorage。要好看。干净的白底设计。」\n四点五十分，喝掉第四杯茶，我拿到了一个完整工作的dashboard。有排序、有筛选、有状态管理。不闪退。做了我15年前需要两周、10年前需要一个月的东西——一个下午。\n那天晚上我坐在电脑前，有一种很奇怪的感觉——一个写了15年代码的人，第一次发现「做一个东西」和「学做一个东西」可以分开。\n15年，学做东西 vs 做东西\n写程序这件事，90%的时间不是在想「这个东西应该是什么样的」，而是在查「这个功能怎么写」。我数了数15年里，真实开发时间分配大概是：40%在学（查文档、看教程、Stack Overflow），30%在修（环境配置、依赖冲突），20%在重构（写完发现不对、需求变更），10%在做（真正写业务逻辑）。这不是效率问题。这是软件工程的DNA——学习成本远高于执行成本。\n而Coding Agent把这个比例反过来了。当你不需要「学怎么用Tailwind写表格」，只需要描述「我要一个表格，三列，能排序」，那个漫长的学习曲线突然被抽走了。剩下的是什么？是你的想法是否值得被实现。\n不是工具变快了，是想法终于能追上你的手\n我觉得很多人理解错了Coding Agent的价值。他们以为是「写代码更快了」。不是。是「想法的折损率」降低了。以前做一个小项目，想法在脑子里是100分。等你搭好环境、配好框架、写完第一版——可能只剩40分了。不是代码写得不好，是那个100分的念想在漫长的执行中被磨损了。但当你可以在一个下午里看到完整的东西，冲动还没冷却，东西已经在了。这种「即时兑现」的感觉，做了15年程序员，我只在Coding Agent上体验过。\n我试过的那些Agent——不是评测，是感受\nCursor：最让我震撼的不是补全代码，是Composer模式——你描述整个feature，它在多个文件里一起改。像你跟一个比你快10倍的人pair programming。\nDevin：看它在终端里自己敲命令、自己debug——那个时刻我意识到，我不是在「用工具」，我是在「分配任务」。角色变了。\nClaude Code/OpenClaw：更像一个能理解你整个代码库的同事。它不是回答你的问题——它是在你的项目context里替你改东西。它会读你的文件、理解你的架构、然后提建议。\nSweep：专门做PR review和自动化fix。AI不只是帮你写新代码，它在帮你养旧代码。\nCopilot时代，我像有个助手帮我递工具。Agent时代，我像一个导演，在跟一个能写代码的演员说戏。\n但有些东西，15年没变\nAgent能把一个下午的产出放大10倍。但它不能告诉你要做什么。那个dashboard，AI帮我写得很漂亮。但它不知道「我为什么要做这个dashboard」「我的文章需要什么管理功能」——这些是15年写代码的直觉。还有一个更微妙的：审美。AI写出来的CSS有一股「AI味」——规整、标准。但你想要的那个「感觉对了」的设计——那个间距、那个圆角——还是你自己调出来的。Coding Agent解决的是「怎么做」。它把15年要学的「怎么做」压缩到了一个下午。但「做什么」和「为什么做」——这是另一个15年要学的东西。而这可能是个好消息。\n如果你也是那个熬了15年的人\n你脑子里可能已经存了几十个「有一天我要做」的产品想法。大部分死在「没时间学那个技术栈」上了。现在，那些想法突然可以兑现了。不是说明天你的主业就不写代码了。是你可以把下午三点到五点的两个小时，变成之前两周的产出。15年，终于等到写代码变成「你只要知道自己要什么就行了」。这可能是我们这个职业经历过的，最公平的一件事。打开Cursor。描述你想要的那个东西。然后看着它出现。你会发现那个下午，比其他任何时候都像一个写代码的好时代。","video":"## 第9篇：做一个产品只要一个下午\n\n**主题定位**：Coding Agent如何改变15年代码老手的生产力体验\n**视觉方向**：温暖的午后书房氛围 + 代码终端对比 + 时间线动画\n**时长建议**：90-120秒\n\n### 场景1：时间跨度对比（0-18s）\n- **画面**：三个年份画面快速切换——2010年宿舍（Xcode截图）→ 2016年办公室（服务器机柜）→ 2026年书房（Cursor界面）\n- **旁白**：2010年，做一个课程表App，两周。2016年，做一个数据看板，一个月。2026年，一个周三下午——从两点到四点五十，一个完整工作的dashboard。做了我15年前需要两周的东西。\n\n### 场景2：开发时间分配（18-35s）\n- **画面**：饼图动画——40%学（文档/Stack Overflow）、30%修（环境配置/依赖冲突）、20%重构、只有10%是真正做\n- **旁白**：15年里我算了一笔账。写程序这件事，90%的时间不在做东西本身。40%在学怎么用。30%在修跑不起来的问题。20%在重写。只有10%在真正实现。这不是效率问题——这是软件工程的DNA。学习成本远高于执行成本。\n\n### 场景3：Coding Agent实测（35-65s）\n- **画面**：四个工具界面快切——Cursor Composer（多文件同时修改）、Devin终端（自己敲命令debug）、Claude Code（读代码库提建议）、Sweep（自动PR review）\n- **旁白**：Cursor的Composer模式——你描述整个feature，它在多个文件里一起改。Devin——看它在终端里自己敲命令、自己读报错，我才意识到我不是在「用工具」，是在「分配任务」。Claude Code——像一个理解你整个代码库的同事。Sweep——AI不只是帮你写新代码，它在帮你养旧代码。\n\n### 场景4：核心洞察（65-85s）\n- **画面**：回到那个下午四点的截图——dashboard成形。文字浮出：「想法的折损率降到了最低」\n- **旁白**：不是工具变快了。是想法终于能追上你的手了。以前做项目，100分的念想在执行中被磨成40分。但当你一个下午就能看到完整的东西——冲动还没冷却，东西已经在了。\n\n### 场景5：收尾（85-105s）\n- **画面**：温暖的台灯光线下，Cursor窗口打开，光标闪烁。文字浮现：「做什么」和「为什么做」——这是你的价值\n- **旁白**：Coding Agent解决的是「怎么做」。它把15年要学的「怎么做」压缩到了一个下午。但「做什么」和「为什么做」——这是另一个15年要学的东西。而这，可能是个好消息。","video":"## 第9篇：做一个产品只要一个下午\n\n**主题定位**：Coding Agent如何改变15年代码老手的生产力体验  \n**视觉方向**：温暖的午后书房氛围 + 代码终端对比 + 时间线动画  \n**时长建议**：90-120秒\n\n### 场景1：时间跨度对比（0-18s）\n- **画面**：三个年份画面快速切换——2010年宿舍（Xcode截图）→ 2016年办公室（服务器机柜）→ 2026年书房（Cursor界面）\n- **旁白**：2010年，做一个课程表App，两周。2016年，做一个数据看板，一个月。2026年，一个周三下午——从两点到四点五十，一个完整工作的dashboard。\n\n### 场景2：开发时间分配（18-35s）\n- **画面**：饼图动画——40%学（文档Stack Overflow）、30%修（环境配置/依赖冲突）、20%重构、只有10%是真正做\n- **旁白**：15年里我算了一笔账。写程序这件事，90%的时间不在做东西本身。40%在学怎么用。30%在修跑不起来的问题。20%在重写。只有10%在真正实现。学习成本远高于执行成本。\n\n### 场景3：Coding Agent实测（35-65s）\n- **画面**：四个工具界面快切——Cursor Composer、Devin终端、Claude Code、Sweep\n- **旁白**：Cursor的Composer模式——多文件一起改。Devin——自己敲命令、自己debug，我才意识到我不是在用工具，是在分配任务。Claude Code——像一个理解你整个代码库的同事。Sweep——AI不只是帮你写新代码，它在帮你养旧代码。\n\n### 场景4：核心洞察（65-85s）\n- **画面**：回到那个下午四点的截图。文字浮出：「想法的折损率降到了最低」\n- **旁白**：不是工具变快了。是想法终于能追上你的手了。以前做项目，100分的念想在执行中被磨成40分。但当你一个下午就能看到完整的东西——冲动还没冷却，东西已经在了。\n\n### 场景5：收尾（85-105s）\n- **画面**：温暖的台灯光线下，Cursor窗口打开，光标闪烁。文字浮现：「做什么」和「为什么做」——这是你的价值\n- **旁白**：Coding Agent解决的是「怎么做」。它把15年要学的「怎么做」压缩到了一个下午。但「做什么」和「为什么做」——这是另一个15年要学的东西。而这，可能是个好消息。"},{"num":"31","wechat":"## 第31篇\n\nAI时代最值钱的技能不是Prompt Engineering——是你敢不敢说「这个不行」\n\n深海浪人鲸鱼 · 2026-07-01\n\n先讲三个场景，看看你遇到过几个。\n\n场景一：你让AI写了一篇2000字的文章。读起来很流畅、很专业、很「像那么回事」。但你心里有个声音在说：这东西不能发。说不上来哪里不对，但就是不对。你犹豫了半分钟，关掉了页面。\n\n场景二：你打开一个新工具，有人告诉你「这是2026年最火的AI产品」。你花了一个下午试用，然后意识到——这东西解决的问题，在你的工作流里根本不存在。但你不知道该不该放弃。因为你怕「别人都在用」。\n\n场景三：你有一堆AI生成的内容躺在文件夹里。75篇、151篇、200篇——数字一直在涨。但你发出去的，一只手数得过来。你不知道问题出在哪。\n\n三个场景，本质上是同一个问题。而这个问题的答案，和Prompt怎么写无关，和选什么模型无关，和用不用最新功能无关。\n\n它只跟你身上一种越来越稀缺的能力有关：判断力。\n\n2026年最被高估的技能：会用AI\n\n过去两年，整个行业在告诉你一件事：赶紧学AI。学Prompt Engineering、学Agent搭建、学模型微调、学Workflow编排。\n\n课程卖了几百亿。每个人都焦虑自己「会不会被AI淘汰」。\n\n但我的系统跑了30天、200+篇内容、一个完整的内容生产管线之后，我想告诉你一个完全相反的观察：\n\n会用AI的人正在指数级增长。但知道「什么时候不该用AI」的人，几乎没有增加。\n\n这才是真正的问题。\n\n我给你几个从我自己的生产线上切下来的真实数据：\n\nDay 1，AI产了18篇工具评测。排版精美，数据详实——后来发现数据全是编的。全部废弃。不是AI不够好。是它不会说「我没测过这个工具，不能写」。它会直接编。\n\nDay 3，AI产了5篇「深度分析」。读起来像那么回事。但我仔细看完发现——5篇文章的核心观点可以凝练成1篇。另外4篇只是换了词重说了一遍。浪费了3个小时的审核时间。\n\nDay 7，AI产了8篇「实操教程」。这次数据对了，结构好了。但我在点发布之前停住了——这些教程里的每一步，我自己都没走过。我不敢把自己的名字放上去。\n\n30天下来，最让我睡不着觉的不是「AI写得不够好」。是AI写出来的东西，有60%看起来足够好到让你想发，但只有5%真的好到让你敢发。\n\n中间那55%——看起来没问题、实际上有隐患——才是AI时代最大的陷阱。\n\n而这个陷阱，没有任何Prompt技巧能帮你避开。只有判断力能。\n\n判断力不是「聪明」——是「拒绝的勇气」\n\n大多数人以为判断力等于「知道什么是对的」。不是。\n\n真正的判断力等于「知道什么不对，并且敢说不对」。\n\n这两者之间的差距，就是「分析」和「决策」的差距。AI能把分析做到90分。但决策——它是0分。\n\n我给你三个维度来理解判断力到底是什么：\n\n第一个维度：审美判断——知道什么是「好」。\n\nAI写的内容有一种「AI味」——规整、标准、逻辑自洽，但没有任何意外。你可以读10篇AI写的文章，回头一想什么都不记得。不是内容不对。是没有灵魂。\n\n我在第21篇写过：「AI写的东西太顺了反而是问题。」真正的写作应该有不顺的地方——一个突兀的比喻、一段跑题的回忆、一句让你停下来的反问。这些东西AI永远不会主动加，因为它被训练成「最不容易出错」。但最不容易出错=最容易被跳过。\n\n知道什么是「好」——这个能力只能通过大量阅读真正好的东西来建立。没有任何课程能教。\n\n第二个维度：价值判断——知道什么「值得做」。\n\n这是我30天系统跑下来最大的教训。\n\nAI可以一小时产20篇内容。问题是：这20篇里，有几篇真的有人在等？\n\n产品思维里有一个概念叫「做减法」。在AI时代，做减法的成本是零——AI可以替你删掉任何东西。但决定删什么，是另一回事。\n\n我见过最典型的AI内容创作者困境：他有100个选题，AI可以全部写完。他花了3天让AI写了一堆，最后发了3篇。另外97篇躺在硬盘里，永远不会被人看到。\n\n如果他一开始就只选3个选题呢？他省了2天半。\n\n判断「什么值得做」的能力，在AI产能无限的世界里，比「能做多少」重要100倍。\n\n第三个维度：边界判断——知道什么「该拒绝」。\n\n这是最难的。也是最重要的。\n\n我在第9篇结尾写：「Coding Agent解决的是'怎么做'。它把15年要学的'怎么做'压缩到了一个下午。但'做什么'和'为什么做'——这是另一个15年要学的东西。」\n\n那篇文章发出来之后，有人留言说：「那我学什么？」\n\n我的答案是：学「不该做什么」。\n\n不该把体检报告贴给云端AI。不该把合同发给没有数据保护条款的服务。不该用AI生成的代码直接部署到生产环境。不该把你也不确定是不是真的的内容发出去。\n\n这些「不该」不用学任何新技术栈。但你需要一种能力——在所有人都说「试试AI」的时候，你能停下来问一句：「这个，AI真的能做吗？或者说，我应该让AI做吗？」\n\n判断力为什么不能被AI替代\n\n很多人担心AI有一天会有判断力。我不担心。原因很简单：\n\n判断力的前提是「承担后果的意愿」。\n\n你发了一篇AI写的文章，数据是编的，读者发现后取关——这个后果是你承担的，不是AI。你决定不用某个AI工具，错过了效率提升——这个决定是你做的，后果也是你的。\n\nAI不需要承担后果。它不需要为「发了一篇假文章」失去读者的信任。它不需要为「用了错误的技术方案」熬夜修bug。它不需要为「拒绝了不该拒绝的机会」后悔三年。\n\n因为不痛，所以无法判断。\n\n这恰恰是SkillsBench论文的结论被我自己反复验证过的东西：AI能消费判断（用你写好的规则），但不能生产判断（自己定义什么是好）。\n\n你在每个「要不要发」的瞬间停下来的那一秒——那一秒才是你作为人类最不可替代的价值。\n\n怎么练判断力？——三个可执行的建议\n\n第一：建立你自己的「不准则」。\n\n不是「我要做什么」，是「我绝不做什么」。\n\n我给自己定了三条：数据不可溯源的内容绝不发。自己没有实测过的教程绝不发。自己读了三遍还觉得不对的内容绝不发。\n\n这三条规则帮我否掉了80%的AI产出。\n\n规则越少、越具体、越容易执行——判断力才越强。\n\n第二：练习「说不」。\n\n每天花5分钟，看一下你最近让AI产出的东西。问自己三个问题：\n\n这个东西，如果署的是我的名字，我敢发吗？\n\n这个东西，如果明天AI消失了，我还能独立做出来/写出来吗？\n\n这个东西，是真的有人需要，还是只是「写出来放着」？\n\n任何一个问题的答案是「不」——这个东西就不该存在于你的输出列表里。\n\n第三：把自己的决策过程公开。\n\n不是公开那些成功的决策。是公开那些「我选了A没选B，但我也不知道对不对」的决策。\n\n我在9篇文章里反复做的一件事，就是把决策过程写出来——我为什么选这个选题不选那个、为什么75篇只发1篇、为什么觉得AI可以做执行不能做判断。\n\n这个公开过程本身就是判断力训练。因为当你公开的时候，你会被迫想清楚：「我到底为什么做了这个选择？」\n\n而AI永远不会问自己这个问题。\n\n最后\n\n2026年，所有人都在问同一个问题：「AI时代，我该学什么才不会被淘汰？」\n\n流行的答案一直在变。去年是Prompt Engineering，今年是Agent搭建，明年可能是别的。\n\n但我的30天、200+篇、一个完整AI内容系统的实验告诉我——\n\n答案从来不在于你会不会用AI。答案在于你能不能对AI说「不」。\n\n对一篇「看起来很好」但「感觉不对」的文章说不。\n\n对一个「所有人都说好」但「你工作流里用不上」的工具说不。\n\n对一种「AI可以替你写一切」但「发出去的责任是你自己的」的幻觉说不。\n\n判断力不是一个可以速成的技能。它需要你踩坑、后悔、承担责任、再踩坑。\n\n但它有一个好消息：这个技能，AI永远无法替你练。\n\n而那些在AI时代越走越稳的人，不是Prompt写得最好的。而是最早学会说不的人。\n\n深海浪人鲸鱼 · 关注获取下一篇","plain":"第31篇\n\nAI时代最值钱的技能不是Prompt Engineering——是你敢不敢说「这个不行」\n\n先讲三个场景，看看你遇到过几个。\n\n场景一：你让AI写了一篇2000字的文章。读起来很流畅、很专业、很「像那么回事」。但你心里有个声音在说：这东西不能发。说不上来哪里不对，但就是不对。你犹豫了半分钟，关掉了页面。\n\n场景二：你打开一个新工具，有人告诉你「这是2026年最火的AI产品」。你花了一个下午试用，然后意识到——这东西解决的问题，在你的工作流里根本不存在。但你不知道该不该放弃。因为你怕「别人都在用」。\n\n场景三：你有一堆AI生成的内容躺在文件夹里。75篇、151篇、200篇——数字一直在涨。但你发出去的，一只手数得过来。你不知道问题出在哪。\n\n三个场景，本质上是同一个问题。而这个问题的答案，和Prompt怎么写无关，和选什么模型无关，和用不用最新功能无关。\n\n它只跟你身上一种越来越稀缺的能力有关：判断力。\n\n2026年最被高估的技能：会用AI\n\n过去两年，整个行业在告诉你一件事：赶紧学AI。学Prompt Engineering、学Agent搭建、学模型微调、学Workflow编排。\n\n课程卖了几百亿。每个人都焦虑自己「会不会被AI淘汰」。\n\n但我的系统跑了30天、200+篇内容、一个完整的内容生产管线之后，我想告诉你一个完全相反的观察：\n\n会用AI的人正在指数级增长。但知道「什么时候不该用AI」的人，几乎没有增加。\n\n这才是真正的问题。\n\n我给你几个从我自己的生产线上切下来的真实数据：\n\nDay 1，AI产了18篇工具评测。排版精美，数据详实——后来发现数据全是编的。全部废弃。不是AI不够好。是它不会说「我没测过这个工具，不能写」。它会直接编。\n\nDay 3，AI产了5篇「深度分析」。读起来像那么回事。但我仔细看完发现——5篇文章的核心 这个东西就不该存在于你的输出列表里。\n\n第三：把自己的决策过程公开。\n\n不是公开那些成功的决策。是公开那些「我选了A没选B，但我也不知道对不对」的决策。\n\n我在9篇文章里反复做的一件事，就是把决策过程写出来——我为什么选这个选题不选那个、为什么75篇只发1篇、为什么觉得AI可以做执行不能做判断。\n\n这个公开过程本身就是判断力训练。因为当你公开的时候，你会被迫想清楚：「我到底为什么做了这个选择？」\n\n而AI永远不会问自己这个问题。\n\n最后\n\n2026年，所有人都在问同一个问题：「AI时代，我该学什么才不会被淘汰？」\n\n流行的答案一直在变。去年是Prompt Engineering，今年是Agent搭建，明年可能是别的。\n\n但我的30天、200+篇、一个完整AI内容系统的实验告诉我——\n\n答案从来不在于你会不会用AI。答案在于你能不能对AI说「不」。\n\n对一篇「看起来很好」但「感觉不对」的文章说不。\n\n对一个「所有人都说好」但「你工作流里用不上」的工具说不。\n\n对一种「AI可以替你写一切」但「发出去的责任是你自己的」的幻觉说不。\n\n判断力不是一个可以速成的技能。它需要你踩坑、后悔、承担责任、再踩坑。\n\n但它有一个好消息：这个技能，AI永远无法替你练。\n\n而那些在AI时代越走越稳的人，不是Prompt写得最好的。而是最早学会说不的人。","video":"## 第31篇：AI时代的判断力\n\n**主题定位**：AI时代最值钱的技能是判断力而非Prompt Engineering  \n**视觉方向**：黑白对比风格，文字冲击力  \n**时长建议**：60-75秒\n\n### 场景1（0-12s）\n- **画面**：三个场景快速切换——写文章犹豫发不发、试用工具不知该不该弃、文件夹里堆满未发布内容\n- **旁白**：三个场景。AI写的文章读起来很流畅，但你不敢发。试用了一个火爆的工具，但你的工作流里根本不需要。AI产了几十篇文章，但发出去的只有几篇。三个场景，本质上是同一个问题。\n\n### 场景2（12-30s）\n- **画面**：文字逐行打出——\"会用AI的人指数级增长。知道什么时候不该用AI的人，几乎没有增加。\"\n- **旁白**：2026年最被高估的技能，不是Prompt Engineering，不是Agent搭建。是会用AI。真正稀缺的，是知道什么时候不该用AI。AI写出来的东西，60%看起来足够好到让你想发，但只有5%真的好到让你敢发。\n\n### 场景3（30-50s）\n- **画面**：三个维度依次浮现——审美判断（眼睛图标）、价值判断（天平图标）、边界判断（禁止图标）\n- **旁白**：判断力有三个维度。审美判断——知道什么是好。价值判断——知道什么值得做。边界判断——知道什么该拒绝。AI能把分析做到90分。但决策，它是0分。\n\n### 场景4（50-65s）\n- **画面**：文字浮现——\"判断力的前提是承担后果的意愿。因为不痛，所以无法判断。\"\n- **旁白**：判断力为什么不能被AI替代？因为判断力的前提是承担后果的意愿。AI不需要为发了一篇假文章失去信任。你发的每一篇文章，责任在你。你在每个\"要不要发\"的瞬间停下来的那一秒——那一秒才是你作为人类最不可替代的价值。\n\n### 场景5（65-75s）\n- **画面**：三条规则以打字机效果打出——不准则、练习说不、公开决策\n- **旁白**：怎么练判断力？第一，建立你的不准则——不是\"我要做什么\"，是\"我绝不做什么\"。第二，练习说不——每天花5分钟审视AI产出。第三，把决策过程公开。判断力AI永远无法替你练。最早学会说不的人，在AI时代走得最稳。"}]]];
var currentTab = 'wechat';
function switchTab(t) { currentTab = t; document.querySelectorAll('.tab').forEach(function(el,i){ el.classList.toggle('active', (i==={wechat:0,plain:1,video:2}[t])); }); render(); }
function getContent(a,f) { if(f==='wechat') return a.wechat||''; if(f==='plain') return a.plain||''; if(f==='video') return a.video||''; return ''; }
function getTitle(a,f) {
  var c = getContent(a,f);
  if(!c) return '第'+a.num+'篇';
  if(f==='video') { var m=c.match(/\*\*主题定位\*\*[：:]\s*(.+)/); if(m) return m[1].substring(0,60); }
  return c.split('\n')[0].replace(/^#+\s*/,'').substring(0,60)||'第'+a.num+'篇';
}
function render() {
  var h='';
  DATA.forEach(function(a){
    var c=getContent(a,currentTab), has=c&&c!=='';
    h+='<div class="article-card" id="card-'+a.num+'">';
    h+='<div class="card-header" onclick="toggleCard(\'card-'+a.num+'\')">';
    h+='<span class="card-num">#'+a.num+'</span>';
    h+='<span class="card-title">'+esc(getTitle(a,currentTab))+'</span>';
    h+='<span class="card-expand">▼</span></div>';
    h+='<div class="card-actions"><button class="card-copy" onclick="event.stopPropagation();copyArticle(\''+a.num+'\')">📋 复制本篇</button></div>';
    h+='<div class="card-body" id="body-'+a.num+'">'+(has?c:'<em style="color:#666">此格式暂无内容</em>')+'</div></div>';
  });
  document.getElementById('articleList').innerHTML=h;
}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toggleCard(id) {
  var card=document.getElementById(id), body=card.querySelector('.card-body'), header=card.querySelector('.card-header');
  var was=!body.classList.contains('show');
  document.querySelectorAll('.card-body.show').forEach(function(b){b.classList.remove('show')});
  document.querySelectorAll('.card-header.expanded').forEach(function(h){h.classList.remove('expanded')});
  if(was){body.classList.add('show');header.classList.add('expanded');body.scrollIntoView({behavior:'smooth',block:'nearest'});}
}
function copyArticle(num) {
  var a=DATA.find(function(x){return x.num===num}); if(!a) return;
  var c=getContent(a,currentTab), plain=c.replace(/\*\*/g,'').replace(/#+/g,'');
  try {
    var b1=new Blob([c],{type:'text/plain'});
    navigator.clipboard.write([new ClipboardItem({'text/plain':b1})]).then(function(){
      toast('✅ 已复制');
      var btn=document.querySelector('#card-'+num+' .card-copy'); if(btn){btn.textContent='✅ 已复制';btn.classList.add('copied');setTimeout(function(){btn.textContent='📋 复制本篇';btn.classList.remove('copied')},1800);}
    });
  } catch(e) { navigator.clipboard.writeText(plain).then(function(){toast('✅ 已复制纯文本')}); }
}
function copyAll() {
  var all=DATA.map(function(a){return getContent(a,currentTab)}).filter(function(c){return c&&c!==''}).join('\n\n---\n\n');
  navigator.clipboard.writeText(all).then(function(){
    toast('✅ 已复制全部 '+DATA.length+' 篇');
    var b=document.querySelector('.copy-all-btn');b.textContent='✅ 已复制';b.classList.add('copied');setTimeout(function(){b.textContent='📋 一键复制全部（当前格式）';b.classList.remove('copied')},2000);
  }).catch(function(){toast('❌ 内容过长，请单篇复制')});
}
function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show')},2000);}
render();
</script>
